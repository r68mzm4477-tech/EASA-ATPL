  {
    id: "gaslaws",
    code: "040·02",
    title: "The Atmosphere & Gas Laws",
    blurb: "Why altitude affects the body: Boyle, Dalton, Henry, respiration.",
    cards: [
      { t: "Oxygen and altitude", b: "The PERCENTAGE of oxygen in the atmosphere stays ~21% at all flight altitudes — what falls is the PARTIAL PRESSURE of oxygen as total pressure drops. The body cares about partial pressure, not percentage: that's why you can breathe 21% oxygen at 35,000 ft and still be unconscious in a minute." },
      { t: "Boyle's law — expanding gas", b: "Gas volume is inversely proportional to pressure: as you climb, trapped gases EXPAND. This explains ear, sinus and tooth pain, gut distension, and why barotrauma happens. Gas roughly doubles in volume by 18,000 ft." },
      { t: "Dalton's law — partial pressures", b: "Total pressure is the sum of the partial pressures of each gas. As altitude increases, the partial pressure of oxygen falls in proportion — the direct cause of HYPOXIC hypoxia. At sea level alveolar oxygen is comfortable; by 10,000 ft saturation starts to slide." },
      { t: "Henry's law — dissolved gas", b: "The amount of gas dissolved in a liquid is proportional to the pressure above it. Reduce the pressure (climb) and dissolved NITROGEN comes out of solution as bubbles — the mechanism of DECOMPRESSION SICKNESS. Think of opening a fizzy drink." },
      { t: "How breathing is controlled", b: "The respiratory centre is driven primarily by CARBON DIOXIDE levels in the blood, not by oxygen. This is why hypoxia is so insidious — low oxygen does not make you feel breathless. CO2 rises → you breathe faster; CO2 falls → the drive to breathe weakens." },
      { t: "Oxygen transport", b: "Oxygen binds to haemoglobin in red blood cells. The oxygen dissociation curve is S-shaped: saturation stays near 97–98% up to about 10,000 ft, then falls away steeply — around 87–90% at 10,000 ft and roughly 65–70% by 20,000 ft. The curve's plateau is why symptoms are mild low down and sudden higher up.", dia: "dissociation" },
    ],
    quiz: [
      { q: "With increasing altitude, the proportion of oxygen in the air:", o: ["Stays at about 21% — but its partial pressure falls", "Falls to about 10% by FL350", "Increases slightly", "Falls in direct proportion to temperature"], a: 0, e: "Composition is constant; it's the falling PARTIAL PRESSURE of O2 (Dalton's law) that causes hypoxia." },
      { q: "Trapped gas pain in the ears, sinuses or gut during climb is explained by:", o: ["Boyle's law", "Henry's law", "Charles's law", "Bernoulli's principle"], a: 0, e: "Boyle: volume inversely proportional to pressure — trapped gas expands as cabin pressure falls." },
      { q: "Decompression sickness is explained by:", o: ["Henry's law — dissolved nitrogen forming bubbles as pressure falls", "Dalton's law — oxygen partial pressure", "Boyle's law — lung expansion", "Osmosis"], a: 0, e: "Henry's law: less pressure means less gas held in solution, so nitrogen bubbles out of tissues and blood." },
      { q: "The breathing rate is normally controlled by the level of:", o: ["Carbon dioxide in the blood", "Oxygen in the blood", "Nitrogen in the tissues", "Haemoglobin"], a: 0, e: "CO2 is the primary stimulus. Low oxygen barely registers — which is exactly why hypoxia creeps up without breathlessness." },
      { q: "Approximate haemoglobin oxygen saturation at 10,000 ft is:", o: ["About 87–90%", "About 100%", "About 60%", "About 40%"], a: 0, e: "The S-shaped dissociation curve holds saturation high to ~10,000 ft, then drops steeply — the basis of the 10,000 ft oxygen rules." },
      { q: "By approximately what altitude has trapped gas doubled in volume?", o: ["18,000 ft", "5,000 ft", "34,000 ft", "50,000 ft"], a: 0, e: "Pressure roughly halves by 18,000 ft, so trapped gas roughly doubles (Boyle's law)." },
    ],
  },
  {
    id: "hypoxia",
    code: "040·02",
    title: "Hypoxia & Hyperventilation",
    blurb: "Types, symptoms, TUC values, and the hyperventilation trap.",
    cards: [
      { t: "The four types of hypoxia", b: "HYPOXIC: low oxygen partial pressure (altitude) — the aviation classic. ANAEMIC: reduced carrying capacity (blood loss, anaemia, CO poisoning). STAGNANT: poor circulation (G-loading, cold, shock). HISTOTOXIC: tissues can't use oxygen (alcohol, cyanide, drugs).", dia: "hypoxiatypes" },
      { t: "Symptoms of hypoxia", b: "Insidious onset: euphoria and overconfidence, impaired judgement, slowed reactions, blue lips/fingertips (cyanosis), tingling, deteriorating vision — NIGHT vision suffers first, degrading from as low as about 5000 ft. The danger: the victim usually feels fine. Personality and symptoms vary between people but are fairly consistent for one individual." },
      { t: "Time of useful consciousness", b: "TUC = time from oxygen loss to inability to act purposefully. Memorise: FL180 ~20–30 min · FL250 ~3–5 min · FL300 ~1–2 min · FL350 ~30–60 sec · FL400 ~15–20 sec. RAPID decompression roughly HALVES these times (lungs vent oxygen outward). Exercise also shortens TUC.", dia: "tuc" },
      { t: "Actions on hypoxia", b: "Oxygen mask on 100%, check connections, descend below 10,000 ft, declare an emergency. Crew oxygen rules: flight crew use masks above cabin altitudes of 10,000 ft; quick-donning masks must go on within 5 seconds with one hand." },
      { t: "Hyperventilation", b: "Over-breathing (usually from anxiety or stress) blows off too much CO2, raising blood pH (respiratory alkalosis). Symptoms: dizziness, tingling in fingers and lips, visual disturbance, muscle spasm (tetany), eventually fainting — which ironically self-corrects the breathing." },
      { t: "Hypoxia vs hyperventilation", b: "The symptoms overlap heavily (tingling, dizziness, poor performance). The exam answer: at altitude, ASSUME HYPOXIA — go on oxygen and descend; that treats both. Hyperventilation is managed by consciously slowing the breathing rate (talking, counted breathing). Cyanosis suggests hypoxia; tetany/spasm suggests hyperventilation." },
    ],
    quiz: [
      { q: "Carbon monoxide poisoning produces which type of hypoxia?", o: ["Anaemic", "Hypoxic", "Stagnant", "Histotoxic"], a: 0, e: "CO binds to haemoglobin far more readily than oxygen, slashing carrying capacity — anaemic hypoxia." },
      { q: "The time of useful consciousness at FL350 after a slow decompression is approximately:", o: ["30–60 seconds", "5–10 minutes", "12 seconds", "3–5 minutes"], a: 0, e: "FL350 ≈ 30–60 s. Rapid decompression would roughly halve it. FL250 = 3–5 min, FL400 = 15–20 s." },
      { q: "A rapid decompression compared with a slow one:", o: ["Roughly halves the TUC", "Doubles the TUC", "Does not change TUC", "Eliminates hypoxia risk"], a: 0, e: "Air (and its oxygen) is sucked OUT of the lungs in a rapid decompression, so useful consciousness time is about halved." },
      { q: "Hyperventilation results in:", o: ["Reduced CO2 and increased blood pH (alkalosis)", "Increased CO2 and reduced pH", "Reduced oxygen percentage in the lungs", "Increased nitrogen absorption"], a: 0, e: "Washing out CO2 makes the blood more alkaline — causing tingling, dizziness and eventually tetany or fainting." },
      { q: "Unsure whether a colleague at altitude is hypoxic or hyperventilating, you should:", o: ["Treat for hypoxia: 100% oxygen and descend", "Tell them to breathe faster", "Wait for cyanosis to confirm", "Give them coffee"], a: 0, e: "Oxygen and descent cure hypoxia and do no harm in hyperventilation — then slow the breathing rate. Always assume hypoxia first at altitude." },
      { q: "The first sense degraded by mild hypoxia, from as low as ~5000 ft, is:", o: ["Night vision", "Hearing", "Touch", "Smell"], a: 0, e: "The retina's rods are extremely oxygen-hungry — night vision degrades at cabin altitudes well below where other symptoms appear." },
    ],
  },
  {
    id: "decompression",
    code: "040·02",
    title: "Pressurisation, DCS & Diving",
    blurb: "Cabin altitude, decompression sickness, flying after diving.",
    cards: [
      { t: "The pressurised cabin", b: "Typical cruise cabin altitude is 6000–8000 ft — a compromise between comfort/physiology and structural fatigue. Maximum certified cabin altitude is normally 8000 ft. Passengers with heart/lung disease, anaemia or recent surgery can still be affected at these levels." },
      { t: "Decompression sickness (DCS)", b: "Nitrogen bubbles forming in tissues and blood (Henry's law), generally a risk above 18,000 ft and increasingly above 25,000 ft. Forms: the BENDS (joint pain — most common), the CREEPS (skin tingling/itching), the CHOKES (chest pain, breathing difficulty — serious), STAGGERS/neurological (CNS — most serious)." },
      { t: "Managing DCS", b: "Descend immediately, 100% oxygen, land as soon as possible, keep the victim still and warm. Severe cases need hyperbaric (recompression) treatment. Symptoms can appear or worsen AFTER landing — medical follow-up is mandatory." },
      { t: "Flying after diving", b: "Diving loads the body with dissolved nitrogen, so flying afterwards multiplies DCS risk. Rules of thumb examined: wait at least 12 hours after a no-decompression-stop dive, and 24–48 hours after a dive REQUIRING decompression stops, before flying (including in a pressurised cabin at typical cabin altitudes)." },
      { t: "Rapid decompression — recognition", b: "Bang, fog/mist in the cabin (cooling air condenses), rushing noise, debris, temperature drop, items flying towards the hole. Immediate actions: oxygen masks on (crew first — you're no use unconscious), establish communication, emergency descent to 10,000 ft or MSA." },
      { t: "Ears, sinuses & barotrauma", b: "Pressure equalises through the eustachian tube, which works easily on CLIMB but poorly on DESCENT — middle-ear barotrauma (otic barotrauma) is therefore a descent problem, made worse by colds. Clear ears with swallowing, jaw movement or the Valsalva manoeuvre. Don't fly with a heavy cold." },
    ],
    quiz: [
      { q: "Typical maximum cabin altitude in a pressurised transport aircraft is:", o: ["8000 ft", "12,000 ft", "2000 ft", "Sea level"], a: 0, e: "Cabins cruise at 6000–8000 ft — high enough to limit structural stress, low enough for passenger physiology." },
      { q: "Joint pain caused by nitrogen bubbles after decompression is called:", o: ["The bends", "The chokes", "The creeps", "The staggers"], a: 0, e: "Bends = joints (most common). Creeps = skin. Chokes = chest/breathing. Staggers = neurological (most serious)." },
      { q: "After a dive requiring decompression stops, you should not fly for at least:", o: ["24–48 hours", "2 hours", "8 hours", "7 days"], a: 0, e: "24–48 hours after decompression-stop dives; at least 12 hours after no-stop dives. Tissue nitrogen needs time to wash out." },
      { q: "Mist or fog filling the cabin immediately after a loud bang indicates:", o: ["Rapid decompression — moisture condensing in cooling air", "An electrical fire", "Engine smoke", "De-icing fluid leak"], a: 0, e: "Sudden expansion cools the cabin air below its dew point — fog plus noise and pressure change = rapid decompression. Masks on first." },
      { q: "Ear (otic) barotrauma is most likely during:", o: ["Descent", "Climb", "Level cruise", "Taxi"], a: 0, e: "The eustachian tube vents expanding air easily on climb but resists inflow on descent — pain, dulled hearing, possible eardrum damage, far worse with a cold." },
      { q: "Decompression sickness generally becomes a significant risk above:", o: ["18,000 ft", "8000 ft", "5000 ft", "40,000 ft only"], a: 0, e: "Risk starts around 18,000 ft and rises sharply above 25,000 ft — and is dramatically increased by recent diving." },
    ],
  },
  {
    id: "circulation",
    code: "040·02",
    title: "Heart, Circulation & G-Forces",
    blurb: "The cardiovascular system, blood pressure, acceleration effects.",
    cards: [
      { t: "The circulatory system", b: "The heart is a double pump: the RIGHT side sends deoxygenated blood to the lungs (pulmonary circulation); the LEFT side pumps oxygenated blood around the body (systemic circulation). Typical resting heart rate 60–80 bpm; blood is about 8% of body weight; red cells live ~120 days." },
      { t: "Blood pressure", b: "Reported as systolic/diastolic — pressure during contraction over pressure during relaxation; a healthy norm is around 120/80 mmHg. Sustained hypertension (high BP) damages heart, vessels, kidneys and eyes, and is a major flag at medicals. Risk factors: smoking, obesity, stress, salt, family history." },
      { t: "Coronary risk factors", b: "Coronary heart disease is a leading cause of licence loss. Controllable factors: smoking, diet/cholesterol, obesity, lack of exercise, stress, hypertension. Uncontrollable: age, sex, family history. The examiner wants you to know smoking is the single biggest controllable factor." },
      { t: "Positive G (+Gz)", b: "Blood is forced towards the feet. Sequence with increasing +Gz: GREY-OUT (peripheral vision loss, ~3.5g), BLACKOUT (total vision loss, ~4.5g — still conscious!), then G-LOC (g-induced loss of consciousness, ~4.5–6g). Tolerance is improved by anti-G straining, anti-G suits, and being reclined; reduced by hypoxia, hypoglycaemia, hyperventilation and fatigue.", dia: "gforce" },
      { t: "Negative G and rapid onset", b: "Negative G (−Gz) pushes blood towards the head: red-out, facial congestion — tolerated far worse (around −2 to −3g limit). Rapid G onset can cause G-LOC with NO grey-out warning, because the visual symptoms need a few seconds to develop." },
      { t: "Donating blood & flying", b: "Blood donation temporarily reduces oxygen-carrying capacity. Guidance examined: crew should not fly for at least 24 hours after donating blood (and should avoid donating during periods of flying duty)." },

    quiz: [
      { q: "The right side of the heart pumps:", o: ["Deoxygenated blood to the lungs", "Oxygenated blood to the body", "Oxygenated blood to the lungs", "Blood directly to the brain"], a: 0, e: "Right side → pulmonary circulation (to lungs); left side → systemic circulation (to body)." },
      { q: "With steadily increasing +Gz, the order of symptoms is:", o: ["Grey-out, blackout, G-LOC", "Blackout, grey-out, red-out", "G-LOC, grey-out, blackout", "Red-out, blackout, G-LOC"], a: 0, e: "Peripheral vision goes first (~3.5g), then all vision (~4.5g, still conscious), then unconsciousness. Rapid onset can skip the warnings." },
      { q: "During blackout under +Gz, the pilot is:", o: ["Still conscious but without vision", "Unconscious", "Asleep", "Hyperventilating"], a: 0, e: "Blackout is loss of VISION only — the retina's blood supply fails before the brain's. G-LOC is the loss of consciousness." },
      { q: "Negative G primarily causes:", o: ["Red-out and facial congestion", "Grey-out", "Tunnel vision", "Improved G tolerance"], a: 0, e: "Blood driven headwards engorges facial and eye vessels — tolerated much worse than positive G (about −2 to −3g)." },
      { q: "The most significant controllable risk factor for coronary heart disease is:", o: ["Smoking", "Age", "Family history", "Sex"], a: 0, e: "Age, sex and family history can't be changed; among the controllable factors, smoking tops the list." },
      { q: "After donating blood, a crew member should not fly for at least:", o: ["24 hours", "1 hour", "7 days", "30 days"], a: 0, e: "Reduced oxygen-carrying capacity needs time to recover — at least 24 hours, and avoid donating during flying periods." },
    ],

  {
    id: "vision",
    code: "040·02",
    title: "Vision & Visual Illusions",
    blurb: "The eye, night vision, scanning, and approach illusions.",
    cards: [
      { t: "The eye — key anatomy", b: "Light passes through the cornea (most of the focusing power), the iris/pupil (light control), and the lens (fine focus/accommodation) onto the retina. The FOVEA contains only CONES: colour and fine detail, daylight, central vision. RODS dominate the periphery: monochrome, motion-sensitive, night vision. The optic nerve exit has no receptors — the blind spot.", dia: "eye" },
      { t: "Night vision", b: "Rods take about 30 MINUTES to fully dark-adapt (cones ~7 minutes) and are destroyed in seconds by bright light. The fovea is rod-free, so at night look 10–15° OFF-CENTRE to put images on the rods. Night vision degrades with hypoxia from ~5000 ft and with smoking (CO)." },
      { t: "Visual scanning & mid-air avoidance", b: "The eye only resolves detail at the fovea, so effective lookout uses short fixations in successive sectors (about 10° at a time, ~1–2 seconds each), not sweeping. An aircraft on a constant relative bearing (collision course) has NO relative movement — exactly what peripheral vision is worst at detecting." },
      { t: "Empty field myopia & defects", b: "With nothing to focus on (haze, IMC, dark), the eye relaxes to ~1–2 m focus — empty field myopia — making distant traffic hard to detect: focus deliberately on a distant object or wingtip. Defects: myopia (short sight), hypermetropia (long sight), presbyopia (age-related near-focus loss), astigmatism (uneven cornea), glaucoma (raised eye pressure, peripheral field loss)." },
      { t: "Runway illusions — width & slope", b: "A NARROWER-than-usual runway or an UPSLOPING runway makes you feel TOO HIGH → you fly a dangerously LOW approach. A wider runway or downslope does the reverse (feel low → fly high). Upslope terrain before the runway adds to the effect. The defence: fly the glideslope/PAPIs, not the picture.", dia: "runwayill" },
      { t: "Black hole, rain & haze", b: "Black-hole approach: featureless dark terrain before bright runway lights at night → strong tendency to fly LOW. Rain on the windscreen: refraction makes lights appear lower/closer and dims them. Haze: objects appear FURTHER away than they are. Shallow fog on the runway can cause an illusion of pitching up just before touchdown. Trust the instruments and approach aids." },
    ],
    quiz: [
      { q: "Fine detail and colour are detected by:", o: ["Cones, concentrated at the fovea", "Rods, concentrated at the fovea", "Rods in the periphery", "The optic disc"], a: 0, e: "Cones = colour/detail/day, packed into the fovea. Rods = night/motion/periphery." },
      { q: "Full dark adaptation of the rods takes approximately:", o: ["30 minutes", "7 minutes", "2 minutes", "2 hours"], a: 0, e: "Rods need ~30 min (cones ~7 min) — and a flash of bright light undoes it in seconds." },
      { q: "To see a dim object at night you should look:", o: ["10–15° off-centre", "Directly at it", "Through the corner of one eye only", "After breathing rapidly"], a: 0, e: "The fovea has no rods, so direct gaze at night sees nothing — offset viewing puts the image on rod-rich retina." },
      { q: "An aircraft on a constant relative bearing is dangerous because it:", o: ["Has no apparent movement, making it hard to detect", "Moves too fast across the canopy", "Is always behind you", "Appears larger than it is"], a: 0, e: "No relative motion = collision course, and stationary objects are what peripheral vision detects worst — hence systematic sector scanning." },
      { q: "Approaching a runway that is narrower than usual, the untrained tendency is to:", o: ["Feel too high and fly a low approach", "Feel too low and fly a high approach", "Land long", "Flare too high"], a: 0, e: "Narrow runway (or upslope) → illusion of being high → dangerously low approach. Wide/downslope is the reverse." },
      { q: "A black-hole approach at night typically results in:", o: ["An approach flown too low", "An approach flown too high", "Perfect glidepath control", "Landing on the wrong runway"], a: 0, e: "With no ground features for reference, pilots consistently underestimate height and drag in low — use the glideslope/PAPIs." },

  {
    id: "vestibular",
    code: "040·02",
    title: "Balance, Hearing & Disorientation",
    blurb: "The vestibular system, the classic illusions, noise & hearing.",
    cards: [
      { t: "The vestibular system", b: "Three SEMICIRCULAR CANALS (one per plane) detect ANGULAR acceleration via fluid moving against sensory hairs. The OTOLITH organs detect LINEAR acceleration and gravity. Both only sense CHANGES — in a prolonged constant-rate turn the fluid catches up and the sensation of turning disappears.", dia: "vestibular" },
      { t: "The leans", b: "The most common illusion. A slow roll below the detection threshold (~2°/sec) goes unnoticed; the correction back to level IS felt — so straight-and-level now feels like a bank, and the pilot leans or rolls back towards the original error. Cure: believe the attitude indicator." },
      { t: "Somatogravic illusion", b: "The otoliths cannot distinguish linear acceleration from tilt. Rapid ACCELERATION (e.g. night/IMC takeoff or go-around) feels like PITCHING UP — the pilot pushes the nose down, potentially into the ground. Deceleration gives the reverse (pitch-down sensation). A killer illusion: trust the ADI on dark takeoffs.", dia: "somatogravic" },
      { t: "Somatogyral & the graveyard spiral", b: "In a prolonged turn the canals stop signalling. Rolling out then feels like a turn in the OPPOSITE direction, so the pilot re-enters the original turn; with attention inside, the descending, tightening turn becomes a graveyard spiral — pulling back only tightens it. Recover with instruments: level the wings FIRST." },
      { t: "Coriolis illusion & vertigo", b: "Moving the head sharply during a turn cross-couples the canals: an overwhelming tumbling sensation (Coriolis illusion). Keep head movements slow and minimal during manoeuvring in IMC. Pressure vertigo (alternobaric) can occur with unequal middle-ear venting during climb/descent. Flicker from rotor blades or strobes can also disorient." },
      { t: "Hearing & noise", b: "Outer ear → eardrum → ossicles (middle ear) → cochlea (inner ear) converts pressure waves to nerve signals. Damage: CONDUCTIVE loss (mechanical — wax, eardrum, ossicles) vs SENSORINEURAL loss (cochlea/nerve — noise-induced and age-related presbycusis, permanent). Prolonged exposure above ~85–90 dB risks noise-induced hearing loss; use hearing protection." },
    ],
    quiz: [
      { q: "The semicircular canals detect:", o: ["Angular accelerations", "Linear accelerations only", "Gravity only", "Sound"], a: 0, e: "Three orthogonal canals sense rotation; the otoliths handle linear acceleration and gravity." },
      { q: "In a prolonged, constant-rate turn, the sensation of turning:", o: ["Disappears as the canal fluid catches up", "Increases steadily", "Reverses every few seconds", "Is replaced by a climbing sensation"], a: 0, e: "Canals detect only CHANGES in rotation — after ~20–30 seconds of constant rate, the turning sensation fades. Rolling out then feels like an opposite turn." },
      { q: "Rapid forward acceleration in IMC or at night produces an illusion of:", o: ["Pitching up", "Pitching down", "Rolling left", "Yawing right"], a: 0, e: "The somatogravic illusion: otoliths read acceleration as backward tilt — pilots respond by pushing the nose down. Fly the ADI on dark takeoffs and go-arounds." },

      { q: "Noise-induced hearing loss is:", o: ["Sensorineural and permanent", "Conductive and reversible", "Only temporary", "Caused by the eustachian tube"], a: 0, e: "Hair cells in the cochlea are destroyed and do not regenerate — permanent sensorineural loss, hence hearing protection above ~85–90 dB." },

  {
    id: "health",
    code: "040·02",
    title: "Fitness, Toxins & Incapacitation",
    blurb: "Alcohol, drugs, CO, hypoglycaemia, and crew incapacitation.",
    cards: [
      { t: "Alcohol", b: "EASA blood alcohol limit for crew: 0.2 g/L (0.02%) — effectively zero. The body eliminates alcohol at a FIXED rate of roughly one unit per hour; nothing (coffee, food, exercise) speeds it up. 'Bottle to throttle' minimums (commonly 8–12 hours) do NOT guarantee zero blood alcohol after heavy drinking, and hangover effects impair performance even at zero BAC. Alcohol also disturbs the inner ear and sleep quality." },
      { t: "Medication & drugs", b: "Self-medication is the hazard: antihistamines (drowsiness), sleeping tablets, strong painkillers and many cold remedies are incompatible with flying. Rule: if you need the medication, ask whether the underlying CONDITION is fit to fly — then check the drug with an AME. Caffeine in moderation is acceptable; nicotine raises CO levels." },
      { t: "Carbon monoxide", b: "Colourless, odourless, tasteless — produced by incomplete combustion (exhaust/heater leaks, smoking). It binds to haemoglobin roughly 200–250 times more strongly than oxygen → anaemic hypoxia. Symptoms: headache, dizziness, deteriorating vision, confusion. Action: stop the source (cabin heat off), ventilate fully, 100% oxygen, land. Recovery is slow — hours, not minutes." },
      { t: "Blood sugar & diet", b: "The brain runs on glucose. Missed meals on long duties cause HYPOGLYCAEMIA: weakness, shakiness, poor concentration, irritability, headache — a genuine performance hazard. Eat regular meals; avoid huge sugar hits that spike then crash. Dehydration similarly degrades concentration — drink water regularly at altitude (very dry cabin air)." },
      { t: "Incapacitation", b: "The most COMMON cause in flight is gastrointestinal upset (food poisoning) — hence crews eating DIFFERENT meals. Subtle incapacitation (the pilot quietly stops functioning) is more dangerous than obvious collapse. Defence: the TWO-COMMUNICATION RULE — suspect incapacitation if a crew member fails to respond appropriately to two communications, or to any communication associated with a significant deviation." },
      { t: "General fitness & medicals", b: "Exercise, weight control, not smoking, sensible alcohol and managing stress protect both health and licence. Crew must not fly when unfit: significant illness, injury, surgery, or when medication/condition is undeclared. When in doubt — consult the AME, and remember anaesthetics: typically 24–48 hours minimum before flying after a general or local anaesthetic, per medical advice." },

    quiz: [

    title: "Stress, Arousal & Fatigue",

    cards: [
      { t: "Stress basics", b: "Stress is the body's response to perceived DEMANDS exceeding perceived ABILITY to cope. Stressors can be physical (heat, noise, vibration), physiological (fatigue, hunger), or psychological/emotional (workload, life events). The response is the same regardless of source — and stress is CUMULATIVE: domestic stress arrives at work with you." },
      { t: "The general adaptation syndrome", b: "Selye's GAS describes the response to sustained stress in three phases: ALARM (fight-or-flight — adrenaline, raised heart rate), RESISTANCE (the body copes, drawing on reserves), EXHAUSTION (reserves depleted — performance collapse, illness). Chronic stress drives people into the exhaustion phase.", dia: "gas" },
      { t: "Arousal & performance", b: "The Yerkes-Dodson inverted-U: performance is poor at LOW arousal (boredom, complacency), best at MODERATE arousal, and poor again at HIGH arousal (panic, tunnelling). Complex tasks are best performed at lower arousal than simple tasks. Overarousal narrows attention — the classic cause of fixating on one instrument in an emergency.", dia: "yerkes" },
      { t: "Coping with stress", b: "Strategies: remove the stressor (action coping), reframe how you think about it (cognitive coping), and manage the symptoms (relaxation techniques, exercise, sleep, talking). Defence mechanisms like denial don't solve anything. Airline answer: identify, then manage — and don't fly during major life crises." },
      { t: "Fatigue", b: "ACUTE fatigue: short-term, from a long duty or poor night — cured by one good sleep. CHRONIC fatigue: accumulated over weeks of inadequate rest — needs extended recovery and is linked to stress and ill health. Symptoms mimic alcohol: slowed reactions, poor judgement, irritability, micro-sleeps, accepting lower standards." },
      { t: "Managing fatigue", b: "Only SLEEP repays sleep debt — not caffeine, willpower or experience. Flight time limitation schemes exist precisely because individuals are poor judges of their own fatigue. Helpful: good sleep hygiene, strategic naps (kept short, ~20–40 min, or a full cycle, avoiding sleep inertia), caffeine used tactically, and honest fatigue reporting." },

    cards: [
      { t: "Sleep architecture", b: "Sleep cycles last roughly 90 minutes, repeating 4–5 times a night. Stages 1–2: light sleep. Stages 3–4 (slow-wave/deep sleep): physical restoration, dominant EARLY in the night. REM ('paradoxical') sleep: dreaming, brain active, body paralysed — mental/memory restoration, dominant LATER in the night. Both types are needed.", dia: "sleepcycle" },
      { t: "REM facts the exam loves", b: "In REM sleep the EEG resembles wakefulness (hence 'paradoxical'), eyes move rapidly, and muscle tone is suppressed. Alcohol before bed suppresses REM and fragments the second half of the night — you sleep, but badly. Sleeping tablets similarly distort sleep architecture." },
      { t: "The body clock", b: "The internal circadian rhythm free-runs at about 25 hours when isolated from time cues, and is normally entrained to 24 hours by ZEITGEBERS — light (the strongest), social cues, meals. Body temperature follows the rhythm, reaching its minimum around 04:00–06:00, when performance is also at its worst.", dia: "circadian" },
      { t: "The WOCL", b: "The Window of Circadian Low — roughly 02:00–06:00 body time — is when alertness, performance and temperature bottom out, and when most fatigue-related errors and accidents cluster. FTL schemes specifically restrict duties that infringe the WOCL." },
      { t: "Jet lag", b: "Crossing time zones desynchronises the body clock from local time: sleep disturbance, fatigue, GI upset, degraded performance. Adjustment takes roughly ONE DAY PER TIME ZONE crossed. EASTWARD travel is harder than westward, because shortening the day fights the body's natural drift towards a longer (≈25 h) cycle." },
      { t: "Sleep credit & naps", b: "A working model: one hour of sleep buys roughly two hours of quality wakefulness, with credit capping out — you cannot stockpile unlimited sleep. Strategic napping genuinely helps, but waking from deep sleep causes SLEEP INERTIA (grogginess for up to ~15–30 min) — so keep naps short or time them to a full cycle, and never nap right before critical duties." },

  {
    id: "infoproc",
    code: "040·03",
    title: "Information Processing & Memory",
    blurb: "How the brain handles data: attention, memory stores, workload.",
    cards: [
      { t: "The processing chain", b: "Stimulus → SENSORY MEMORY → perception (attention filters here) → DECISION (central processing) → response → feedback. The central decision channel is essentially a SINGLE CHANNEL: humans cannot truly make two decisions at once — apparent multitasking is rapid switching." },
      { t: "Sensory & working memory", b: "Sensory stores hold raw input very briefly: iconic (visual) ~0.5–1 s, echoic (sound) ~2–8 s — echoic memory is why you can 'replay' an ATC call you weren't attending to. WORKING (short-term) memory holds about 7 ± 2 items for roughly 10–20 seconds without rehearsal — the reason long clearances get read back wrong.", dia: "memory" },
      { t: "Helping working memory", b: "CHUNKING groups items into meaningful units (a frequency as two chunks, not six digits). Rehearsal keeps items alive; interruption destroys them. Write long clearances down. Similar-sounding items interfere with each other (acoustic confusion) — a known factor in callsign mix-ups." },
      { t: "Long-term memory", b: "Effectively unlimited capacity. Three flavours: SEMANTIC (facts/knowledge), EPISODIC (events you experienced — unreliable, reconstructed each recall), PROCEDURAL (motor skills — very resistant to forgetting, 'like riding a bike'). Episodic memory's reconstructive nature is why eyewitness reports differ." },
      { t: "Attention", b: "SELECTIVE attention: choosing one input among many (the cocktail-party effect — your callsign cuts through). DIVIDED attention: sharing between tasks — capacity is limited and degrades under stress. VIGILANCE: sustained attention to rare events decays significantly after ~30 minutes (a monitoring problem in cruise and for radar operators)." },
      { t: "Perception & expectation", b: "Perception is interpretation, not photography: the brain builds a model from sensory data PLUS expectation (mental set/schema). You tend to perceive what you EXPECT — hearing the clearance you anticipated rather than the one transmitted. Defence: disciplined readback, and treating surprise as information." },
    ],
    quiz: [

      { q: "The ability to mentally replay a radio call you were not attending to is due to:", o: ["Echoic sensory memory", "Procedural memory", "Semantic memory", "Hypnosis"], a: 0, e: "Echoic (auditory sensory) memory holds a few seconds of raw sound — a brief replay buffer." },
      { q: "Motor skills such as control handling are stored in:", o: ["Procedural memory", "Episodic memory", "Echoic memory", "Working memory"], a: 0, e: "Procedural memory — built by practice and very resistant to forgetting, though skills still degrade without recency." },
      { q: "Hearing the clearance you expected rather than the one issued is an error of:", o: ["Perception driven by expectation", "Hearing damage", "Sensory memory", "Vigilance only"], a: 0, e: "Perception is constructive: mental set fills in what's anticipated. Disciplined readback/hearback is the defence." },
      { q: "Human central decision-making is best described as:", o: ["A single channel — one decision at a time", "Fully parallel", "Unlimited under stress", "Two simultaneous channels"], a: 0, e: "We time-share by switching rapidly; true simultaneous decisions are impossible — workload management matters." },
      { q: "Vigilance for rare events during monitoring tasks:", o: ["Declines markedly after about 30 minutes", "Improves steadily with time", "Is constant for 8 hours", "Only declines at night"], a: 0, e: "The vigilance decrement: sustained monitoring degrades within half an hour — a core argument for shared monitoring and automation alerts." },

  {
    id: "error",
    code: "040·03",
    title: "Human Error & Decision Making",
    blurb: "Error types, Reason's model, SHELL, and decision frameworks.",
    cards: [
      { t: "Classifying error", b: "Per James Reason: SLIPS — right plan, wrong execution (selected flaps instead of gear). LAPSES — memory failures (forgot a checklist item). MISTAKES — the PLAN itself was wrong (rule-based: wrong rule applied; knowledge-based: faulty reasoning in a novel situation). VIOLATIONS — intentional deviations from rules (routine, situational or exceptional)." },
      { t: "Skill, rule, knowledge", b: "Rasmussen's levels: SKILL-based behaviour — automatic, practiced actions (prone to slips/lapses). RULE-based — applying stored if-then procedures (prone to picking the wrong rule). KNOWLEDGE-based — reasoning from first principles in novel situations (slow, effortful, most error-prone). Experts operate mostly at skill/rule level." },
      { t: "The Swiss cheese model", b: "Accidents happen when holes in successive defensive layers line up. ACTIVE FAILURES: errors by front-line operators, effects felt immediately. LATENT FAILURES: decisions made far from the flight deck (design, management, rostering, maintenance culture) lying dormant until combined with active failures. Most accidents involve both.", dia: "swisscheese" },
      { t: "The SHELL model", b: "Describes the interfaces between the human (central LIVEWARE) and: SOFTWARE (procedures, checklists, symbology), HARDWARE (controls, displays, seats), ENVIRONMENT (heat, noise, pressure, light), and other LIVEWARE (crew, ATC, ground staff). Mismatches at any interface breed error — the human is never resized; the interfaces must fit the human.", dia: "shell" },
      { t: "Decision making — FORDEC", b: "A structured model for non-time-critical decisions: Facts — what is the situation? Options — what could we do? Risks & benefits of each. Decision — choose. Execution — do it, allocate tasks. Check — did it work, has the situation changed? The loop guards against jumping to the first idea." },
      { t: "Decision traps", b: "CONFIRMATION BIAS: seeking only evidence that supports the existing belief. EXPECTANCY: perceiving what you anticipated. PLAN CONTINUATION ('press-on-itis'/get-home-itis): sticking to the original plan as evidence mounts against it — implicated in many CFIT and weather accidents. Antidotes: actively seek disconfirming evidence, set decision gates, invite challenge from the other pilot." },
    ],
    quiz: [
      { q: "Setting the wrong altitude despite intending the right one — correct plan, faulty execution — is a:", o: ["Slip", "Mistake", "Violation", "Latent failure"], a: 0, e: "Slips are action errors with a good plan. Mistakes are flawed plans; lapses are memory failures; violations are intentional." },
      { q: "Forgetting to complete a checklist item after an interruption is a:", o: ["Lapse", "Slip", "Knowledge-based mistake", "Violation"], a: 0, e: "A memory failure = lapse. Interruptions are the classic trigger — go back and re-enter the checklist properly." },
      { q: "In Reason's model, a maintenance rostering decision that contributes to an accident months later is a:", o: ["Latent failure", "Active failure", "Slip", "Routine violation"], a: 0, e: "Latent conditions lie dormant in the system until they line up with active failures — the deeper holes in the Swiss cheese." },
      { q: "In the SHELL model, the interface between the pilot and checklists or procedures is:", o: ["Liveware–Software", "Liveware–Hardware", "Liveware–Environment", "Liveware–Liveware"], a: 0, e: "Software = the non-physical system elements: procedures, checklists, manuals, symbology." },
      { q: "In FORDEC, the final C stands for:", o: ["Check — review whether the decision is working", "Communicate", "Climb", "Confirm the weather"], a: 0, e: "Facts, Options, Risks & benefits, Decision, Execution, CHECK — closing the loop catches a wrong or outdated decision." },
      { q: "Continuing an approach in deteriorating weather because 'we're nearly there' illustrates:", o: ["Plan continuation bias", "The leans", "A lapse", "Negative transfer"], a: 0, e: "Press-on-itis: commitment to the original plan overrides accumulating contrary evidence — set hard gates and respect them." },
    ],

  {
    id: "crm",
    code: "040·03",
    title: "Personality, Communication & CRM",
    blurb: "Hazardous attitudes, cockpit gradient, assertiveness, groups.",
    cards: [
      { t: "Personality & attitudes", b: "Personality is stable from early adulthood — training changes ATTITUDES and BEHAVIOUR, not personality. The ideal pilot profile is goal-oriented AND group-oriented (high task focus, high people focus). Extreme introversion/dominance combinations cause crew friction; selection screens for it, CRM manages it." },
      { t: "The five hazardous attitudes", b: "ANTI-AUTHORITY ('don't tell me') — antidote: follow the rules, they're usually right. IMPULSIVITY ('do something quickly') — not so fast, think first. INVULNERABILITY ('it won't happen to me') — it could happen to me. MACHO ('I can do it') — taking chances is foolish. RESIGNATION ('what's the use?') — I'm not helpless, I can make a difference.", dia: "attitudes" },
      { t: "Communication", b: "Communication = transmission AND confirmation of meaning. Barriers: ambiguity, jargon, expectation, status differences, language, noise. Aviation defences: standard phraseology, readback/hearback, closed-loop communication. Most communication meaning travels through tone and body language in person — which is exactly what radio strips away, so words must be precise." },
      { t: "The trans-cockpit authority gradient", b: "The command relationship between captain and co-pilot. TOO STEEP: the co-pilot won't challenge errors (many classic accidents). TOO FLAT/SHALLOW: unclear leadership, decisions drift. The target is a moderate gradient: clear command, open challenge. Linked tools: assertiveness training and standard challenge phrases for the junior pilot.", dia: "gradient" },
      { t: "Group decision making", b: "Groups can outperform individuals (more knowledge, error-checking) but suffer: GROUPTHINK — conformity pressure suppresses dissent; RISKY SHIFT — groups accept riskier decisions than individuals would (diffusion of responsibility); social loafing. Defences: the captain states views LAST, actively inviting dissent; structured decision models." },
      { t: "Leadership & synergy", b: "Leadership is influencing the team towards the goal — distinct from mere authority (the position). Effective styles adapt to the situation: directive in emergencies, consultative when time allows. CRM's aim is SYNERGY: the crew performing better than the sum of its members — achieved through briefing, workload management, monitoring and open communication." },
    ],
    quiz: [
      { q: "CRM training is designed to change:", o: ["Attitudes and behaviour, not personality", "Personality permanently", "Intelligence", "Reaction times"], a: 0, e: "Personality is fixed by adulthood; training targets attitudes, knowledge and skills — the things that can move." },
      { q: "The antidote to the hazardous attitude 'it won't happen to me' is:", o: ["It could happen to me", "Not so fast — think first", "Follow the rules", "I'm not helpless"], a: 0, e: "Invulnerability → 'it could happen to me'. Each of the five attitudes has its matched antidote — learn the pairs." },
      { q: "A trans-cockpit authority gradient that is too steep results in:", o: ["The co-pilot failing to challenge the captain's errors", "Constant arguments", "Shared decision paralysis", "Better monitoring"], a: 0, e: "Excessive dominance silences the junior pilot — a recurring factor in accident history. The fix: moderate gradient plus assertiveness." },
      { q: "Groupthink is:", o: ["Conformity pressure suppressing dissenting views in a group", "Faster thinking in groups", "A type of memory", "Two pilots thinking identically by training"], a: 0, e: "The desire for harmony overrides realistic appraisal — countered by leaders inviting dissent and stating their own view last." },
      { q: "The 'risky shift' phenomenon means groups tend to:", o: ["Accept riskier decisions than individuals would alone", "Always choose the safest option", "Avoid all decisions", "Defer to the youngest member"], a: 0, e: "Shared responsibility dilutes individual accountability, nudging groups towards riskier choices." },
      { q: "Effective communication is confirmed by:", o: ["Closed-loop feedback such as readback/hearback", "Speaking louder", "Repetition three times", "Using more technical jargon"], a: 0, e: "Meaning is only transferred when confirmed — the closed loop of message, readback and hearback." },

    cards: [
      { t: "What automation changed", b: "Automation reduced physical workload and routine error, improved precision and economy — and created new error forms: mode confusion, automation complacency, skill degradation, and 'what's it doing now?' surprises. The pilot's role shifted from hands-on operator to systems MONITOR — a role humans are naturally poor at (vigilance decrement)." },
      { t: "Automation complacency", b: "Trust in reliable automation breeds reduced monitoring: crews stop cross-checking what the autoflight system is actually doing. Defences: fly the aircraft mentally at all times (know what it should do next), call out FMA changes, and treat the automation as a crew member whose work must be checked." },
      { t: "Mode awareness", b: "Mode confusion — believing the autoflight is in one mode when it is in another — has caused fatal accidents (e.g. descent-rate vs flight-path-angle mix-ups). The flight mode annunciator (FMA) is the single source of truth: announce and verify every mode change. Automation surprises peak during high-workload phases and reversions." },
      { t: "Out of the loop & skill fade", b: "Long periods of passive monitoring degrade situational awareness AND manual flying skills — the pilot may be slow to detect failures and poorly placed to take over. Countermeasures: appropriate levels of automation for the phase, deliberate manual flying when conditions allow, and robust takeover criteria (if it's not doing what you want — disconnect and fly)." },
      { t: "Levels of automation", b: "Use the level appropriate to workload and situation: full automation for high-workload precision tasks (CAT III), lower levels to stay engaged when conditions permit. Changing levels IS a crew action: announce it. The guiding rule examined: aviate, navigate, communicate — automation status must never displace flying the aeroplane." },
      { t: "Designing for humans", b: "Good flight-deck design follows human factors principles: consistency, feedback for every action, error tolerance (guards, confirmations, undo), alerting hierarchy (warning/caution/advisory), and dark-cockpit philosophy (a quiet panel means all is well). The human is the constant — design must fit the operator (SHELL again)." },

      { q: "The authoritative indication of the current autoflight mode is:", o: ["The flight mode annunciator (FMA)", "The control column position", "The thrust lever angle", "The captain's memory"], a: 0, e: "The FMA is the single source of truth — announce and verify every change to maintain mode awareness." },
      { q: "Long passive monitoring of automation tends to cause:", o: ["Degraded situational awareness and manual skill fade", "Improved hand-flying skills", "Higher arousal", "Faster failure detection"], a: 0, e: "Out-of-the-loop syndrome: the monitor is slow to notice failures and rusty when forced to take over — hence deliberate manual flying practice." },
      { q: "If the autoflight system is not doing what you want during a critical phase, you should:", o: ["Disconnect and fly the aircraft manually", "Wait and observe for a few minutes", "Reprogram the FMS first", "Pull circuit breakers"], a: 0, e: "Aviate first: take over, fly the aeroplane, sort out the automation later — never let troubleshooting displace flying." },
      { q: "Pilots are poorly suited to the pure monitoring role because:", o: ["Human vigilance for rare events decays quickly", "They lack intelligence", "They monitor too closely", "Monitoring needs no training"], a: 0, e: "The vigilance decrement (significant within ~30 min) makes humans weak passive monitors — design and procedures must compensate." },
      { q: "A 'dark cockpit' philosophy means:", o: ["With all systems normal, panels show no lights", "Flying without instrument lighting", "Night operations only", "Hiding failures from the crew"], a: 0, e: "Quiet and dark = normal; anything illuminated demands attention — an alerting design that exploits human attention patterns." },

      { t: "The heart & circulation", b: "A double pump: the RIGHT side drives blood to the lungs (pulmonary circuit), the LEFT side around the body (systemic circuit). Resting rate 60–80 bpm. The coronary arteries feed the heart muscle itself — their narrowing causes angina and heart attacks." },

}

  }
  const overdue = days < 0;
  const pace = days > 0 ? Math.ceil(undone / days) : undone;
  return (
    React.createElement('div', { onClick: () => setEditing(true), style: { cursor: "pointer", background: overdue ? C.warmSoft : C.ink, color: overdue ? C.warm : "#fff", borderRadius: 3, padding: "12px 16px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" },}
      , React.createElement('span', null
        , React.createElement('span', { style: { ...mono, fontSize: 11, letterSpacing: 2, color: overdue ? C.warm : "#9FB3C2", display: "block" },}, "EXAM COUNTDOWN" )
        , React.createElement('span', { style: { fontWeight: 800, fontSize: 20 },}, overdue ? `${Math.abs(days)} days ago` : days === 0 ? "Exam today" : `${days} days to go`)
      )
      , !overdue && days > 0 && undone > 0 && React.createElement('span', { style: { ...mono, fontSize: 12, color: "#9FB3C2", textAlign: "right" },}, undone, " chapters left · ~"    , pace, "/day")
    )
  );
}

function DoneToggle({ topic, progress, save }) {
  const passed = progress.best[topic.id] != null && progress.best[topic.id] >= 75;
  const marked = !!(progress.done && progress.done[topic.id]);
  const done = passed || marked;
  const toggle = () => { const d = { ...(progress.done || {}) }; d[topic.id] = !marked; save({ ...progress, done: d }); };
  return (
    React.createElement('button', { onClick: toggle, style: { ...mono, fontSize: 12.5, padding: "8px 14px", borderRadius: 2, marginBottom: 16, cursor: "pointer", border: `1px solid ${done ? C.good : C.line}`, background: done ? "#E7F2EA" : C.panel, color: done ? C.good : C.sub },}
      , done ? "✓ Completed — tap to unmark" : "○ Mark chapter complete"
    )
  );
}

function LearnControls({ topic, i, card, progress, save }) {
  const [speaking, setSpeaking] = useState(false);
  useEffect(() => { stopSpeak(); setSpeaking(false); }, [i]); // eslint-disable-line
  const bmKey = topic.id + ":" + i;
  const marked = !!(progress.bookmarks && progress.bookmarks[bmKey]);
  const toggleBm = () => { const bm = { ...(progress.bookmarks || {}) }; bm[bmKey] = !marked; save({ ...progress, bookmarks: bm }); };
  const toggleSpeak = () => {
    if (speaking) { stopSpeak(); setSpeaking(false); }
    else { const ok = speak(card.t + ". " + card.b, () => setSpeaking(false)); setSpeaking(ok); }
  };
  return (
    React.createElement('div', { style: { display: "flex", gap: 8, marginTop: 12 },}
      , React.createElement('button', { onClick: toggleSpeak, style: { ...mono, fontSize: 13, padding: "9px 14px", borderRadius: 2, border: `1px solid ${C.line}`, background: speaking ? C.coldSoft : C.panel, color: C.ink, cursor: "pointer" },}, speaking ? "■ Stop" : "▶ Listen")
      , React.createElement('button', { onClick: toggleBm, style: { ...mono, fontSize: 13, padding: "9px 14px", borderRadius: 2, border: `1px solid ${marked ? C.warm : C.line}`, background: marked ? C.warmSoft : C.panel, color: marked ? C.warm : C.ink, cursor: "pointer" },}, marked ? "★ Saved" : "☆ Save card")
    )
  );
}

function Saved({ progress, save, onOpen, onBack }) {
  const bm = progress.bookmarks || {};
  const items = [];
  TOPICS.forEach((t) => t.cards.forEach((c, idx) => { if (bm[t.id + ":" + idx]) items.push({ t, c, idx }); }));
  const unsave = (key) => { const b = { ...bm }; delete b[key]; save({ ...progress, bookmarks: b }); };
  return (
    React.createElement('div', null
      , React.createElement('button', { onClick: onBack, style: { ...mono, background: "none", border: "none", color: C.cold, cursor: "pointer", fontSize: 13, padding: "4px 0", marginBottom: 8 },}, "← ALL MODULES"  )
      , React.createElement('h1', { style: { fontSize: 26, fontWeight: 800, margin: "2px 0 14px" },}, "★ Saved cards"  )
      , items.length === 0 ? (
        React.createElement('p', { style: { color: C.sub, fontSize: 15 },}, "No saved cards yet. Tap “☆ Save card” on any Learn card to keep it here for quick revision."                  )
      ) : (
        React.createElement('div', { style: { display: "grid", gap: 10 },}
          , items.map(({ t, c, idx }) => (
            React.createElement('div', { key: t.id + idx, style: { background: C.panel, border: `1px solid ${C.line}`, borderLeft: `4px solid ${C.warm}`, borderRadius: 2, padding: "12px 14px" },}
              , React.createElement('div', { style: { ...mono, fontSize: 10.5, color: C.cold },}, t.code, " · "  , t.title)
              , React.createElement('div', { style: { fontWeight: 700, fontSize: 15, margin: "3px 0 5px" },}, c.t)
              , React.createElement('p', { style: { fontSize: 13.5, color: C.sub, lineHeight: 1.5, margin: "0 0 8px" },}, c.b)
              , React.createElement('div', { style: { display: "flex", gap: 8 },}
                , React.createElement('button', { onClick: () => onOpen(t.id), style: { ...mono, fontSize: 12, padding: "7px 12px", border: "none", borderRadius: 2, background: C.ink, color: "#fff", cursor: "pointer" },}, "Open chapter →"  )
                , React.createElement('button', { onClick: () => unsave(t.id + ":" + idx), style: { ...mono, fontSize: 12, padding: "7px 12px", border: `1px solid ${C.line}`, borderRadius: 2, background: C.panel, color: C.warm, cursor: "pointer" },}, "Remove")
              )
            )
          ))
        )
      )
    )
  );
}
