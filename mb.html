  {
    id: "definitions",
    code: "031·01",
    title: "Mass Definitions",
    blurb: "The standard masses: empty, operating, zero-fuel, ramp, takeoff, landing.",
    cards: [
      { t: "Mass vs weight", b: "MASS is the quantity of matter (kg) — it never changes. WEIGHT is the force of gravity on that mass (mass × g) and varies slightly with location. In aviation we plan in mass (kg), but 'weight' is used loosely for the same thing. Lift must support weight, so mass directly sets the lift, speeds and performance required." },
      { t: "Basic & dry operating mass", b: "BASIC EMPTY MASS (BEM): the airframe, engines, fixed equipment and unusable fluids — from weighing. DRY OPERATING MASS (DOM): BEM plus everything needed for service but NO fuel and NO traffic load — crew, catering, water, documents. DOM is the operator's standard starting point for load planning." },
      { t: "Zero-fuel & traffic load", b: "TRAFFIC LOAD (payload): passengers, baggage and cargo — the revenue load. ZERO FUEL MASS (ZFM) = DOM + traffic load (everything except usable fuel). The MAXIMUM ZERO FUEL MASS (MZFM) is a STRUCTURAL limit: fuel in the wings relieves wing bending, so the mass NOT in the wings (fuselage load) is capped." },
      { t: "Ramp, take-off & landing mass", b: "RAMP (taxi) MASS: mass at engine start, including taxi fuel. TAKE-OFF MASS (TOM) = ramp mass − taxi fuel. LANDING MASS (LM) = TOM − trip fuel. Each has a maximum: MRM, MTOM and MLM. You must satisfy ALL limits — the most restrictive governs." },
      { t: "The maximum masses", b: "MTOM (max take-off), MLM (max landing), MZFM (max zero fuel) and MRM (max ramp) are CERTIFICATED STRUCTURAL limits from the AFM. Separately, PERFORMANCE-limited masses (runway, climb, obstacle) may be lower on the day. The regulated take-off mass is the LOWEST of the structural and performance limits." },
      { t: "Useful load & relationships", b: "USEFUL LOAD = traffic load + usable fuel = TOM − DOM. Key chain: DOM → (+ traffic load) → ZFM → (+ usable fuel) → TOM → (− trip fuel) → LM. Working up or down this chain, with each maximum, is the heart of mass planning. Remember: MZFM and MLM often limit traffic load before MTOM does." },
    ],
    quiz: [
      { q: "Zero fuel mass is:", o: ["Dry operating mass plus traffic load", "Basic empty mass only", "Take-off mass minus taxi fuel", "Landing mass plus trip fuel"], a: 0, e: "ZFM = DOM + traffic load — everything except usable fuel. MZFM is a structural (wing-bending) limit." },
      { q: "Take-off mass equals:", o: ["Ramp mass minus taxi fuel", "Landing mass minus trip fuel", "DOM plus trip fuel", "ZFM minus reserve fuel"], a: 0, e: "TOM = ramp/taxi mass − taxi fuel. Then LM = TOM − trip fuel." },
      { q: "The maximum zero fuel mass is primarily a:", o: ["Structural limit (wing-bending relief from fuel)", "Performance limit", "Climb limit", "Runway length limit"], a: 0, e: "Fuel in the wings relieves bending, so the non-wing (fuselage) load is structurally capped by MZFM." },
      { q: "Dry operating mass includes:", o: ["Crew, catering and equipment but no fuel or traffic load", "Fuel but no passengers", "Passengers but no crew", "Trip fuel only"], a: 0, e: "DOM = basic empty mass + crew, catering, water, documents — but NO usable fuel and NO payload." },
      { q: "The regulated take-off mass is:", o: ["The lowest of the structural and performance-limited masses", "Always the MTOM", "The ramp mass", "The zero fuel mass"], a: 0, e: "You must meet every limit; the most restrictive (structural or performance) governs the allowed take-off mass." },
      { q: "Useful load is:", o: ["Traffic load plus usable fuel (TOM − DOM)", "Just the passengers", "DOM minus fuel", "The basic empty mass"], a: 0, e: "Useful load = everything added to DOM = traffic load + usable fuel." },

  {
    id: "effects",
    code: "031·01",
    title: "Effects of Mass & Balance",
    blurb: "Why overloading and out-of-limit CG are dangerous.",
    cards: [
      { t: "Effects of excess mass", b: "Greater mass needs more lift, so it raises STALL SPEED, all take-off/landing/manoeuvre speeds, take-off and landing DISTANCES, fuel burn and structural stress, while REDUCING climb gradient/rate, ceiling, range and manoeuvrability. Overweight operation also eats into structural fatigue life." },
      { t: "Why CG position matters", b: "The aircraft balances about its CG. The tailplane provides a balancing force; if the CG moves, the tail load and hence stability and control change. CG must stay between a FORWARD and an AFT limit — the certificated CG envelope — at all masses, throughout the flight as fuel burns and load shifts." },
      { t: "Forward CG effects", b: "A forward CG increases stability but: needs more tail DOWNLOAD (more lift required → higher stall speed, more drag, reduced performance and range), gives HEAVIER stick forces, a higher approach speed, and can reduce elevator authority to flare/rotate. Too far forward: may not be able to raise the nose." },
      { t: "Aft CG effects", b: "An aft CG reduces stability and stick forces — controls become light and SENSITIVE, the aircraft is less inclined to recover from upsets, and stall/spin recovery is harder. Too far aft: the aircraft can become longitudinally UNSTABLE and uncontrollable. Aft CG does slightly improve performance (less tail download) — but safety limits dominate." },
      { t: "CG and the stall", b: "A FORWARD CG raises the stall speed (more lift needed to balance the larger tail download). It also tends to give a more pronounced nose-down at the stall (good). An aft CG lowers stall speed slightly but worsens recovery — the trade is stability and control, which is why the aft limit is conservative." },
      { t: "In-flight CG movement", b: "CG MOVES during flight: fuel burn (wing/tank position), passengers/crew moving, and configuration changes all shift it. Planning must ensure the CG stays within limits for the WHOLE flight — including after fuel burn (which can move CG forward or aft depending on tank layout) and at landing mass." },

    quiz: [

      { q: "A forward CG typically results in:", o: ["Higher stall speed and heavier stick forces", "Lighter, more sensitive controls", "Reduced stability", "Lower approach speed"], a: 0, e: "Forward CG needs more tail download (more lift → higher stall speed), giving heavier stick forces but more stability." },
      { q: "An aft CG beyond the limit makes the aircraft:", o: ["Longitudinally unstable and possibly uncontrollable", "More stable", "Slower to stall", "Heavier on the controls"], a: 0, e: "Reduced stability and light controls; too far aft, recovery from upsets and stalls becomes impossible." },
      { q: "Which CG position gives the lowest stall speed?", o: ["Aft (within limits)", "Forward", "It has no effect", "Exactly at the datum"], a: 0, e: "Aft CG needs less tail download, so slightly less total lift and a marginally lower stall speed — but recovery worsens." },
      { q: "Excess take-off mass will:", o: ["Reduce climb gradient and increase take-off distance", "Improve climb performance", "Shorten the take-off run", "Lower the stall speed"], a: 0, e: "Heavier means more lift/thrust needed: longer runs, shallower climb, reduced ceiling, range and manoeuvrability." },
      { q: "CG must remain within limits:", o: ["Throughout the entire flight, including after fuel burn", "Only at take-off", "Only at landing", "Only on the ground"], a: 0, e: "Fuel burn and load movement shift the CG, so it must stay inside the envelope for the whole flight." },

  {
    id: "moments",
    code: "031·02",
    title: "CG, Datum, Arm & Moments",
    blurb: "Datum, arm, moment = mass × arm, finding the CG.",
    cards: [
      { t: "The datum and arm", b: "The DATUM is an arbitrary reference plane chosen by the manufacturer (often the nose, firewall, or a point ahead of the aircraft). The ARM (balance arm) is the horizontal distance from the datum to an item's CG. Arms behind the datum are positive; ahead are negative (sign convention matters).", dia: "datumarm" },
      { t: "Moment = mass × arm", b: "A MOMENT is the turning effect of a mass about the datum: moment = mass × arm. Units are kg·m (or lb·in). Every item of load has a moment; the aircraft balances when the total moment is accounted for. Moments can be positive or negative depending on the arm's sign." },
      { t: "Finding the CG", b: "The CG is the point where total mass would balance: CG = TOTAL MOMENT ÷ TOTAL MASS. Tabulate each item's mass and arm, compute each moment, sum the masses and sum the moments, then divide. This single relationship underlies every loading calculation." },
      { t: "Worked example", b: "Empty 1000 kg at arm 3.0 m → moment 3000. Pilot 80 kg at 2.0 m → 160. Fuel 120 kg at 3.5 m → 420. Totals: mass 1200 kg, moment 3580 kg·m. CG = 3580 ÷ 1200 = 2.98 m from datum. Compare 2.98 m against the fwd/aft limits to confirm it's in the envelope." },
      { t: "Index units", b: "To keep numbers manageable, airlines use an INDEX: moment scaled by dividing by a constant (and often adding an offset to avoid negatives). The load sheet sums index units instead of raw moments, then reads CG (as %MAC) from a graph or table. The principle is identical — just scaled." },
      { t: "Station numbers", b: "Aircraft positions are given as STATIONS — the arm (distance from datum) of that location, often in inches. Loading a hold or seat row at a known station means you know its arm directly. Combined with the load's mass, that gives its moment for the calculation." },
    ],
    quiz: [
      { q: "A moment is calculated as:", o: ["Mass × arm", "Mass ÷ arm", "Arm ÷ mass", "Mass + arm"], a: 0, e: "Moment = mass × arm (the turning effect about the datum), in kg·m or lb·in." },
      { q: "The centre of gravity is found by:", o: ["Total moment ÷ total mass", "Total mass ÷ total moment", "Total moment × total mass", "The largest single arm"], a: 0, e: "CG = Σmoments ÷ Σmass — the balance point of all the loaded masses." },
      { q: "The datum is:", o: ["An arbitrary reference plane chosen by the manufacturer", "Always at the centre of gravity", "Always at the main wheels", "The aft CG limit"], a: 0, e: "It's a fixed reference for measuring arms; it can even be ahead of the nose." },
      { q: "Total mass 1200 kg, total moment 3580 kg·m. The CG is:", o: ["2.98 m from datum", "4.30 m from datum", "1.98 m from datum", "3580 m from datum"], a: 0, e: "CG = 3580 ÷ 1200 = 2.98 m — then check against the CG limits." },
      { q: "An index system is used to:", o: ["Scale moments into manageable numbers", "Change the CG limits", "Replace the datum", "Measure fuel only"], a: 0, e: "Index = scaled moment (often offset to avoid negatives); the method is identical, just easier to add up." },
      { q: "A 'station' on an aircraft refers to:", o: ["The arm (distance from datum) of a location", "A radio frequency", "A weighing point only", "A fuel tank"], a: 0, e: "Station numbers give the arm of seats, holds and equipment directly for moment calculations." },
    ],

  {
    id: "envelope",
    code: "031·02",
    title: "CG Limits, MAC & the Envelope",
    blurb: "Forward/aft limits, mean aerodynamic chord, %MAC, the CG envelope.",
    cards: [
      { t: "The CG envelope", b: "A graph of MASS (vertical) against CG position (horizontal) bounded by the forward and aft CG limits and the max/min mass lines. A loaded aircraft's CG and mass must plot INSIDE this envelope — at take-off, in flight and at landing. The limits may narrow at higher mass.", dia: "cgenvelope" },
      { t: "Mean aerodynamic chord (MAC)", b: "The MAC is a representative chord of the wing. CG is often expressed as a percentage of MAC: %MAC = (distance of CG aft of MAC leading edge ÷ MAC length) × 100. Using %MAC makes the limits independent of the arbitrary datum and easy to compare across loadings." },
      { t: "Converting CG to %MAC", b: "Given the CG arm, the leading-edge-of-MAC (LEMAC) arm, and the MAC length: %MAC = ((CG arm − LEMAC) ÷ MAC) × 100. Example: CG 12.5 m, LEMAC 11.5 m, MAC 4 m → (1.0 ÷ 4) × 100 = 25% MAC. Loading limits are commonly quoted as, say, 15–35% MAC." },
      { t: "Forward and aft limits", b: "The FORWARD limit is set by elevator authority (must be able to rotate/flare) and acceptable stick forces; the AFT limit by minimum stability. Loading aims to keep CG within these — and many operators target a slightly AFT CG (within limits) for lower trim drag and better fuel efficiency." },
      { t: "Limits can vary with mass & config", b: "The envelope is not a simple box: forward and aft limits can change with mass (and sometimes with flap/gear/configuration). Always read the limit applicable to the actual mass. Some aircraft also have a separate landing-gear or take-off CG restriction." },
      { t: "Why %MAC is used operationally", b: "Load sheets express CG as %MAC because it directly relates CG to the wing and the stability/control limits, and is independent of the datum choice. Trim settings for take-off are derived from the take-off CG in %MAC — a wrong CG/trim entry is a known take-off hazard." },

    quiz: [

      { q: "CG at arm 12.5 m, LEMAC 11.5 m, MAC 4 m. The CG in %MAC is:", o: ["25%", "12.5%", "40%", "11.5%"], a: 0, e: "((12.5 − 11.5) ÷ 4) × 100 = 25% MAC." },

      { q: "Expressing CG as %MAC is useful because it:", o: ["Relates CG to the wing and is independent of the datum", "Changes the aircraft's mass", "Removes the need for limits", "Only applies to fuel"], a: 0, e: "%MAC ties CG directly to the stability/control limits and doesn't depend on the arbitrary datum." },
      { q: "The aft CG limit is set mainly by:", o: ["Minimum acceptable stability", "Elevator authority to flare", "Tyre limits", "Fuel tank position"], a: 0, e: "Too far aft and the aircraft becomes unstable/uncontrollable — the aft limit guards stability." },
      { q: "Many operators load to a slightly aft CG (within limits) to:", o: ["Reduce trim drag and improve fuel efficiency", "Increase stall speed", "Raise stick forces", "Reduce range"], a: 0, e: "An aft-but-legal CG needs less tail download, cutting trim drag — a small efficiency gain." },

    blurb: "Adding, removing and shifting mass — the standard formulas.",
    cards: [
      { t: "Shifting mass already on board", b: "Move a mass that's already loaded and the CG shifts. Formula: CG SHIFT = (mass moved × distance moved) ÷ TOTAL mass. The CG moves in the SAME direction as the load is moved. Total mass is unchanged because nothing was added or removed — only redistributed.", dia: "cgshift" },
      { t: "Shift example", b: "Total mass 5000 kg, move 200 kg of cargo 4 m aft. CG shift = (200 × 4) ÷ 5000 = 0.16 m aft. So the whole-aircraft CG moves 0.16 m toward the tail. Use this to bring an out-of-limits CG back inside by relocating load." },
      { t: "Adding or removing mass", b: "Add/remove a mass and BOTH the CG and total mass change. CG SHIFT = (mass added × (arm of mass − old CG)) ÷ NEW total mass. Adding mass behind the CG moves CG aft; ahead of the CG moves it forward. Removing mass does the opposite. Note the NEW total mass in the denominator." },
      { t: "Add/remove example", b: "Aircraft 4000 kg, CG 3.0 m. Add 500 kg at arm 5.0 m. New mass 4500 kg. CG shift = (500 × (5.0 − 3.0)) ÷ 4500 = 1000 ÷ 4500 = 0.22 m aft → new CG 3.22 m. Always check the new CG against the limits at the new mass." },
      { t: "Loading to achieve a target CG", b: "To find how much mass to move/add to reach a required CG, rearrange the formulas. E.g. to move CG by a required amount: mass to move = (total mass × required CG shift) ÷ distance available. These rearrangements are common exam tasks — know the formula both ways." },
      { t: "Practical use", b: "These tools let you fix an out-of-limits load: redistribute baggage between holds, move passengers, or adjust fuel loading. The direction rule (CG follows the load) plus the shift formula tells you exactly how much movement is needed to bring the CG inside the envelope at every flight phase." },

    quiz: [

      { q: "Total mass 5000 kg; 200 kg moved 4 m aft. CG shift is:", o: ["0.16 m aft", "0.80 m aft", "0.04 m aft", "1.6 m aft"], a: 0, e: "(200 × 4) ÷ 5000 = 0.16 m aft." },
      { q: "When ADDING mass, the denominator of the CG-shift formula is:", o: ["The new total mass", "The old total mass", "The mass added", "The arm"], a: 0, e: "CG shift = (mass added × (arm − old CG)) ÷ NEW total mass." },
      { q: "Aircraft 4000 kg at CG 3.0 m; add 500 kg at arm 5.0 m. New CG is about:", o: ["3.22 m", "3.00 m", "4.00 m", "2.78 m"], a: 0, e: "Shift = (500 × (5.0−3.0)) ÷ 4500 = 0.22 m aft → 3.22 m." },
      { q: "To move the CG by a required amount, the mass to relocate is:", o: ["(total mass × required CG shift) ÷ distance", "(distance × required shift) ÷ total mass", "total mass × distance", "required shift ÷ total mass"], a: 0, e: "Rearrange CG shift = (mass × distance) ÷ total mass to solve for mass." },
      { q: "Removing baggage from a forward hold moves the CG:", o: ["Aft", "Forward", "It cannot change CG", "To the datum"], a: 0, e: "Removing mass ahead of the CG shifts the CG away from that point — i.e. aft." },

  {
    id: "cargo",
    code: "031·03",
    title: "Cargo & Floor Loading Limits",
    blurb: "Running load, area/distribution limits, securing, structural floors.",
    cards: [
      { t: "Why floor limits exist", b: "The cabin/hold floor and structure can only bear so much load per unit area or length. Exceeding floor limits risks structural damage even if the aircraft's total mass and CG are fine. Three limits commonly apply: distribution (running) load, area load, and individual compartment maximums." },
      { t: "Area load limit", b: "The maximum mass per unit FLOOR AREA (e.g. kg/m² or lb/ft²), set by the floor panel strength. Check: load mass ÷ contact area ≤ area limit. A heavy item on small feet/pallets concentrates load — spreading it over a larger area (boards/pallets) reduces the pressure to within limits." },
      { t: "Running (linear) load limit", b: "The maximum mass per unit LENGTH along the hold (e.g. kg/m), set by the floor beams. Check: load mass ÷ length occupied ≤ running-load limit. Long heavy items must be spread along enough length; otherwise the beams are overstressed even within the area limit." },
      { t: "Compartment & total limits", b: "Each hold/compartment has a maximum permitted mass. The sum across compartments must also respect MZFM and CG. So a load can be legal for the whole aircraft yet ILLEGAL in a single compartment — every limit (area, running, compartment, total, CG) must be satisfied simultaneously." },
      { t: "Securing the load", b: "Cargo must be SECURED so it cannot move in flight — load shift changes CG (potentially out of limits) and can damage structure. Lashing points have rated strengths; restraint must withstand the certificated load factors in all directions (forward being the most demanding for emergency deceleration)." },
      { t: "Calculating a safe load", b: "To place a heavy item: confirm (1) it's within the compartment maximum, (2) mass ÷ area ≤ area limit (spread if needed), (3) mass ÷ length ≤ running-load limit, and (4) the resulting CG and ZFM stay in limits. Spreading load over pallets/boards is the usual fix for area or running-load exceedances." },

      { q: "A heavy item exceeds the area limit. The usual fix is to:", o: ["Spread it over a larger area (pallet/boards)", "Add fuel", "Move it forward only", "Increase the total mass"], a: 0, e: "Spreading the contact area reduces pressure (kg/m²) to within the floor limit." },

      { t: "Standard masses", b: "For aircraft with 20+ seats, operators may use EASA STANDARD MASSES instead of weighing each passenger — these INCLUDE hand baggage. Current values (AMC1 CAT.POL.MAB.100, confirmed unchanged at the 2022 EASA review): male 88 kg, female 70 kg, child 35 kg; an 'all-adult' value of 84 kg may be used at 30+ seats. Holiday charters are lower (83 / 69 / 76 kg). Smaller aircraft use higher per-head figures (e.g. 6–9 seats: male 96, female 78) or actual weighing. Operators may also use their own validated survey values." },
      { t: "When standard masses apply", b: "Standard masses are permitted above a minimum number of seats; smaller aircraft generally use ACTUAL masses (passengers and bags weighed, or by declaration). Crew, baggage and special loads have their own standard or actual values. Seasonal/holiday adjustments and seat-count bands change the figures — use the applicable table." },
      { t: "The load sheet", b: "The LOAD SHEET is the master document: it builds from DOM, adds traffic load by compartment and passengers by zone, adds fuel, and computes ZFM, TOM and LM against their maxima, plus the CG (%MAC) and the take-off TRIM setting. It is cross-checked before departure — errors here are a real safety risk." },
      { t: "Take-off trim & stab setting", b: "The take-off CG (%MAC) determines the stabiliser/trim setting for rotation. A wrong CG entry (e.g. transposed figures, wrong ZFM) gives a wrong trim and a mis-rotation — a known cause of tail strikes and near-accidents. The crew sanity-checks the load sheet figures against expectations." },
      { t: "Last-minute changes (LMC)", b: "After the load sheet is produced, small changes (a few passengers or bags) can be handled as a LAST-MINUTE CHANGE noted on the sheet, provided they stay within an allowed LMC limit and don't breach any mass or CG limit. Larger changes require a new load sheet. LMCs are recorded, not just verbal." },

// ===================== CALC DRILL GENERATOR =====================
function rnd(min, max, step = 1) {
  const n = Math.floor(Math.random() * ((max - min) / step + 1));
  return min + n * step;
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function opts(correct, distractors, unit) {
  const set = [correct, ...distractors.filter((d, i, a) => d !== correct && a.indexOf(d) === i).slice(0, 3)];
  const shuffled = shuffle(set);
  return { options: shuffled.map((v) => `${v}${unit}`), answer: shuffled.indexOf(correct) };
}
function genDrill() {
  const type = rnd(0, 5);
  if (type === 0) {
    const fl = rnd(4, 35) * 10;
    const ans = 15 - 2 * (fl / 10);
    const { options, answer } = opts(ans, [ans + 5, ans - 5, ans + 10, -ans], "\u00b0C");
    return { q: `What is the ISA temperature at FL${fl}?`, options, answer, e: `ISA = 15 \u2212 (2 \u00d7 ${fl / 10}) = ${ans}\u00b0C.` };
  }
  if (type === 1) {
    const fl = rnd(8, 35) * 10;
    const isa = 15 - 2 * (fl / 10);
    const dev = rnd(-12, 12, 2);
    const oat = isa + dev;
    const { options, answer } = opts(dev, [dev + 5, dev - 5, -dev, dev + 10], "");
    return { q: `OAT at FL${fl} is ${oat}\u00b0C. What is the ISA deviation?`, options, answer, e: `ISA at FL${fl} = ${isa}\u00b0C. Deviation = ${oat} \u2212 (${isa}) = ISA ${dev >= 0 ? "+" : ""}${dev}.` };
  }
  if (type === 2) {
    const pa = rnd(1, 8) * 1000;
    const isa = 15 - 2 * (pa / 1000);
    const dev = rnd(2, 16, 2);
    const oat = isa + dev;
    const ans = pa + 120 * dev;
    const { options, answer } = opts(ans, [pa + 120 * (dev - 5), pa + 60 * dev, pa - 120 * dev], " ft");
    return { q: `Pressure altitude ${pa} ft, OAT ${oat > 0 ? "+" : ""}${oat}\u00b0C. Density altitude is approximately:`, options, answer, e: `ISA at ${pa} ft = ${isa}\u00b0C \u2192 deviation +${dev}. DA \u2248 ${pa} + (120 \u00d7 ${dev}) = ${ans} ft.` };
  }
  if (type === 3) {
    const spread = rnd(3, 12);
    const ans = 400 * spread;
    const t = rnd(14, 26);
    const { options, answer } = opts(ans, [ans + 800, ans - 800, 100 * spread], " ft");
    return { q: `Surface temperature +${t}\u00b0C, dew point +${t - spread}\u00b0C. Estimated cumulus cloud base:`, options, answer, e: `Base \u2248 400 \u00d7 spread = 400 \u00d7 ${spread} = ${ans} ft AGL.` };
  }
  if (type === 4) {
    const alt = rnd(4, 14) * 1000;
    const dev = rnd(-3, 3, 1) * 10 || 10;
    const ans = Math.round(alt * (1 + 0.04 * (dev / 10)));
    const { options, answer } = opts(ans, [Math.round(alt * (1 - 0.04 * (dev / 10))), alt, ans + 400], " ft");
    return { q: `Indicated altitude ${alt} ft on correct QNH, temperature ISA ${dev > 0 ? "+" : ""}${dev}. Approximate TRUE altitude (4% rule):`, options, answer, e: `4% per 10\u00b0C: ${alt} \u00d7 (1 ${dev > 0 ? "+" : "\u2212"} ${Math.abs(dev) * 0.4}%) \u2248 ${ans} ft. ${dev < 0 ? "Colder \u2192 true altitude LOWER." : "Warmer \u2192 true altitude HIGHER."}` };
  }
  const qnh = rnd(983, 1008);
  const fl = rnd(4, 8) * 10;
  const diff = 1013 - qnh;
  const ans = fl * 100 - diff * 27;
  const { options, answer } = opts(ans, [fl * 100 + diff * 27, fl * 100, ans + 270], " ft");
  return { q: `Flying at FL${fl} (1013 set). QNH is ${qnh} hPa. Approximate altitude AMSL:`, options, answer, e: `1013 \u2212 ${qnh} = ${diff} hPa \u00d7 27 ft = ${diff * 27} ft. QNH is lower, so you are LOWER: ${fl * 100} \u2212 ${diff * 27} = ${ans} ft.` };
}

    )
  );
}

function Drill({ progress, save, onBack }) {
  const [q, setQ] = useState(() => genDrill());
  const [picked, setPicked] = useState(null);
  const [streak, setStreak] = useState(0);
  const [count, setCount] = useState(0);
  const [right, setRight] = useState(0);

  const pick = (k) => {
    if (picked != null) return;
    setPicked(k);
    setCount(count + 1);
    if (k === q.answer) {
      setRight(right + 1);
      const ns = streak + 1;
      setStreak(ns);
      const best = (progress.drill && progress.drill.best) || 0;
      if (ns > best) save({ ...progress, drill: { best: ns } });
    } else {
      setStreak(0);
    }
  };

  return (
    React.createElement('div', null
      , React.createElement('button', { onClick: onBack, style: { ...mono, background: "none", border: "none", color: C.cold, cursor: "pointer", fontSize: 13, padding: "4px 0", marginBottom: 8 },}, "← ALL MODULES"

      )
      , React.createElement('h1', { style: { fontSize: 26, fontWeight: 800, margin: "2px 0 4px" },}, "Numbers Drill" )
      , React.createElement('div', { style: { ...mono, fontSize: 12, color: C.sub, marginBottom: 14 },}, "STREAK "
         , streak, " · SESSION "   , right, "/", count, " · BEST "   , (progress.drill && progress.drill.best) || 0
      )
      , React.createElement('div', { style: { background: C.panel, border: `1px solid ${C.line}`, borderRadius: 2, padding: "18px 20px" },}
        , React.createElement('p', { style: { fontSize: 16.5, fontWeight: 700, lineHeight: 1.5, margin: "0 0 14px" },}, q.q)
        , React.createElement('div', { style: { display: "grid", gap: 8 },}
          , q.options.map((opt, k) => {
            let bg = C.panel, border = C.line;
            if (picked != null) {
              if (k === q.answer) { bg = "#E7F2EA"; border = C.good; }
              else if (k === picked) { bg = C.warmSoft; border = C.warm; }
            }
            return (
              React.createElement('button', { key: k, disabled: picked != null, onClick: () => pick(k),
                style: { textAlign: "left", padding: "11px 14px", fontSize: 15, background: bg, border: `1.5px solid ${border}`, borderRadius: 2, cursor: picked == null ? "pointer" : "default", color: C.ink },}
                , React.createElement('span', { style: { ...mono, color: C.sub, marginRight: 8 },}, "ABCD"[k]), opt
              )
            );
          })
        )
        , picked != null && (
          React.createElement('div', { style: { marginTop: 14, padding: "12px 14px", background: picked === q.answer ? "#E7F2EA" : C.coldSoft, borderLeft: `4px solid ${picked === q.answer ? C.good : C.cold}`, fontSize: 14.5, lineHeight: 1.55 },}
            , React.createElement('b', null, picked === q.answer ? "Correct. " : "Not quite. "), q.e
          )
        )
      )
      , picked != null && (
        React.createElement('div', { style: { display: "flex", justifyContent: "flex-end", marginTop: 14 },}
          , React.createElement(Btn, { onClick: () => { setQ(genDrill()); setPicked(null); },}, "Next question →"  )
        )
      )
    )
  );
}


// ===================== ADDED FEATURES =====================
function speak(text, onEnd) {
  try {
    const s = window.speechSynthesis; if (!s) return false;
    s.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1; u.onend = onEnd; s.speak(u); return true;
  } catch (e) { return false; }
}
function stopSpeak() { try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {} }

function ExamBanner({ progress }) {
  const [date, setDate] = useState("");
  const [editing, setEditing] = useState(false);
  useEffect(() => { try { setDate(localStorage.getItem("atpl-exam-date") || ""); } catch (e) {} }, []);
  const setExam = (v) => { setDate(v); try { v ? localStorage.setItem("atpl-exam-date", v) : localStorage.removeItem("atpl-exam-date"); } catch (e) {} setEditing(false); };
  const undone = TOPICS.filter((t) => !((progress.best[t.id] != null && progress.best[t.id] >= 75) || (progress.done && progress.done[t.id]))).length;
  let days = null;
  if (date) { const d = new Date(date + "T00:00:00"); days = Math.ceil((d - new Date()) / 86400000); }
  if (!date || editing) {
    return (
      React.createElement('div', { style: { background: C.panel, border: `1px solid ${C.line}`, borderRadius: 3, padding: "12px 14px", marginBottom: 14, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" },}
        , React.createElement('span', { style: { ...mono, fontSize: 12, color: C.sub },}, "Exam date:" )
        , React.createElement('input', { type: "date", defaultValue: date, onChange: (e) => setExam(e.target.value), style: { ...mono, fontSize: 13, padding: "6px 8px", border: `1px solid ${C.line}`, borderRadius: 2 },} )
        , date && React.createElement('button', { onClick: () => setExam(""), style: { ...mono, fontSize: 12, background: "none", border: "none", color: C.warm, cursor: "pointer" },}, "clear")
      )
    );
  }
  const overdue = days < 0;
  const pace = days > 0 ? Math.ceil(undone / days) : undone;
  return (
    React.createElement('div', { onClick: () => setEditing(true), style: { cursor: "pointer", background: overdue ? C.warmSoft : C.ink, color: overdue ? C.warm : "#fff", borderRadius: 3, padding: "12px 16px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" },}
      , React.createElement('span', null
        , React.createElement('span', { style: { ...mono, fontSize: 11, letterSpacing: 2, color: overdue ? C.warm : "#9FB3C2", display: "block" },}, "EXAM COUNTDOWN" )
        , React.createElement('span', { style: { fontWeight: 800, fontSize: 20 },}, overdue ? `${Math.abs(days)} days ago` : days === 0 ? "Exam today" : `${days} days to go`)
      )
      , !overdue && days > 0 && undone > 0 && React.createElement('span', { style: { ...mono, fontSize: 12, color: "#9FB3C2", textAlign: "right" },}, undone, " chapters left · ~"    , pace, "/day")
    )
  );
}

function DoneToggle({ topic, progress, save }) {
  const passed = progress.best[topic.id] != null && progress.best[topic.id] >= 75;
  const marked = !!(progress.done && progress.done[topic.id]);
  const done = passed || marked;
  const toggle = () => { const d = { ...(progress.done || {}) }; d[topic.id] = !marked; save({ ...progress, done: d }); };
  return (
    React.createElement('button', { onClick: toggle, style: { ...mono, fontSize: 12.5, padding: "8px 14px", borderRadius: 2, marginBottom: 16, cursor: "pointer", border: `1px solid ${done ? C.good : C.line}`, background: done ? "#E7F2EA" : C.panel, color: done ? C.good : C.sub },}
      , done ? "✓ Completed — tap to unmark" : "○ Mark chapter complete"
    )
  );
}

function LearnControls({ topic, i, card, progress, save }) {
  const [speaking, setSpeaking] = useState(false);
  useEffect(() => { stopSpeak(); setSpeaking(false); }, [i]); // eslint-disable-line
  const bmKey = topic.id + ":" + i;
  const marked = !!(progress.bookmarks && progress.bookmarks[bmKey]);
  const toggleBm = () => { const bm = { ...(progress.bookmarks || {}) }; bm[bmKey] = !marked; save({ ...progress, bookmarks: bm }); };
  const toggleSpeak = () => {
    if (speaking) { stopSpeak(); setSpeaking(false); }
    else { const ok = speak(card.t + ". " + card.b, () => setSpeaking(false)); setSpeaking(ok); }
  };
  return (
    React.createElement('div', { style: { display: "flex", gap: 8, marginTop: 12 },}
      , React.createElement('button', { onClick: toggleSpeak, style: { ...mono, fontSize: 13, padding: "9px 14px", borderRadius: 2, border: `1px solid ${C.line}`, background: speaking ? C.coldSoft : C.panel, color: C.ink, cursor: "pointer" },}, speaking ? "■ Stop" : "▶ Listen")
      , React.createElement('button', { onClick: toggleBm, style: { ...mono, fontSize: 13, padding: "9px 14px", borderRadius: 2, border: `1px solid ${marked ? C.warm : C.line}`, background: marked ? C.warmSoft : C.panel, color: marked ? C.warm : C.ink, cursor: "pointer" },}, marked ? "★ Saved" : "☆ Save card")
    )
  );
}

function Saved({ progress, save, onOpen, onBack }) {
  const bm = progress.bookmarks || {};
  const items = [];
  TOPICS.forEach((t) => t.cards.forEach((c, idx) => { if (bm[t.id + ":" + idx]) items.push({ t, c, idx }); }));
  const unsave = (key) => { const b = { ...bm }; delete b[key]; save({ ...progress, bookmarks: b }); };
  return (
    React.createElement('div', null
      , React.createElement('button', { onClick: onBack, style: { ...mono, background: "none", border: "none", color: C.cold, cursor: "pointer", fontSize: 13, padding: "4px 0", marginBottom: 8 },}, "← ALL MODULES"  )
      , React.createElement('h1', { style: { fontSize: 26, fontWeight: 800, margin: "2px 0 14px" },}, "★ Saved cards"  )
      , items.length === 0 ? (
        React.createElement('p', { style: { color: C.sub, fontSize: 15 },}, "No saved cards yet. Tap “☆ Save card” on any Learn card to keep it here for quick revision."                  )
      ) : (
        React.createElement('div', { style: { display: "grid", gap: 10 },}
          , items.map(({ t, c, idx }) => (
            React.createElement('div', { key: t.id + idx, style: { background: C.panel, border: `1px solid ${C.line}`, borderLeft: `4px solid ${C.warm}`, borderRadius: 2, padding: "12px 14px" },}
              , React.createElement('div', { style: { ...mono, fontSize: 10.5, color: C.cold },}, t.code, " · "  , t.title)
              , React.createElement('div', { style: { fontWeight: 700, fontSize: 15, margin: "3px 0 5px" },}, c.t)
              , React.createElement('p', { style: { fontSize: 13.5, color: C.sub, lineHeight: 1.5, margin: "0 0 8px" },}, c.b)
              , React.createElement('div', { style: { display: "flex", gap: 8 },}
                , React.createElement('button', { onClick: () => onOpen(t.id), style: { ...mono, fontSize: 12, padding: "7px 12px", border: "none", borderRadius: 2, background: C.ink, color: "#fff", cursor: "pointer" },}, "Open chapter →"  )
                , React.createElement('button', { onClick: () => unsave(t.id + ":" + idx), style: { ...mono, fontSize: 12, padding: "7px 12px", border: `1px solid ${C.line}`, borderRadius: 2, background: C.panel, color: C.warm, cursor: "pointer" },}, "Remove")
              )
            )
          ))
        )
      )
    )
  );
}
