<script>const {useState,useEffect}=React;

// ===================== SYLLABUS DATA =====================
const TOPICS = [
  {
    id: "basics",
    code: "081·01",
    title: "Airflow & Basic Aerodynamics",
    blurb: "Air properties, continuity, Bernoulli, dynamic pressure, airspeeds.",
    cards: [
      { t: "Properties of air", b: "Air has mass, exerts static pressure, and is compressible and viscous. At low speeds (below ~M0.4) it is treated as INCOMPRESSIBLE. Density falls with altitude and temperature — and since aerodynamic force depends on density, this directly affects lift, drag and performance." },
      { t: "The continuity equation", b: "In a streamtube, mass flow is constant: density × area × velocity = constant. For incompressible flow, where the tube NARROWS the air SPEEDS UP. This is why air accelerates over the curved upper surface of a wing." },
      { t: "Bernoulli's theorem", b: "In steady flow, total pressure = static pressure + dynamic pressure = constant. So where the air speeds up, its STATIC pressure FALLS. Faster flow over the top of the wing means lower pressure on top — the basis of lift. Dynamic pressure q = ½ρV².", dia: "bernoulli" },
      { t: "Dynamic pressure (½ρV²)", b: "The pressure of moving air, q = ½ρV². It drives every aerodynamic force — lift and drag are both proportional to it. Note it depends on density AND the square of speed: double the TAS and dynamic pressure quadruples." },
      { t: "The airspeeds: IAS, CAS, EAS, TAS", b: "IAS: what the ASI reads (really dynamic pressure). CAS: IAS corrected for position/instrument error. EAS: CAS corrected for compressibility. TAS: EAS corrected for density — TAS exceeds IAS as you climb (thinner air). The aircraft's aerodynamics respond to IAS/EAS; navigation uses TAS." },
      { t: "Why IAS matters", b: "Because lift and drag depend on dynamic pressure, the wing 'feels' IAS, not TAS. The stall always occurs at the same IAS regardless of altitude (ignoring compressibility), which is why limit speeds are given as indicated speeds." },
    ],
    quiz: [
      { q: "By the continuity equation, where a streamtube narrows the airflow:", o: ["Speeds up", "Slows down", "Stops", "Reverses"], a: 0, e: "Mass flow is constant, so a smaller area means higher velocity — air accelerates over the wing's curved upper surface." },
      { q: "According to Bernoulli, where airflow speeds up its static pressure:", o: ["Decreases", "Increases", "Stays constant", "Becomes zero"], a: 0, e: "Total pressure is constant; faster flow means more dynamic pressure and therefore less static pressure — the low pressure that lifts the wing." },
      { q: "Dynamic pressure is given by:", o: ["½ρV²", "ρV", "ρgh", "½ρV"], a: 0, e: "q = ½ρV² — proportional to density and to the SQUARE of speed." },
      { q: "As an aircraft climbs at constant IAS, its TAS:", o: ["Increases", "Decreases", "Stays the same", "Falls to zero"], a: 0, e: "Density falls with altitude, so a given dynamic pressure (constant IAS) corresponds to a higher true airspeed." },
      { q: "The stalling angle of attack corresponds to a stall that occurs at a constant:", o: ["IAS (ignoring compressibility)", "TAS", "Mach number", "Altitude"], a: 0, e: "The wing responds to dynamic pressure ≈ IAS, so the stall IAS is essentially constant with altitude — hence limits in indicated speed." },
      { q: "If TAS doubles, dynamic pressure (at constant density):", o: ["Quadruples", "Doubles", "Halves", "Is unchanged"], a: 0, e: "q ∝ V², so doubling speed multiplies dynamic pressure by four." },
    ],
  },
  {
    id: "lift",
    code: "081·01",
    title: "Lift & The Aerofoil",
    blurb: "Aerofoil terms, angle of attack, the lift formula, CL, CofP.",
    cards: [
      { t: "Aerofoil terminology", b: "CHORD LINE: straight line from leading to trailing edge. CAMBER: curvature of the aerofoil. MEAN CAMBER LINE: midway between upper and lower surfaces. ANGLE OF ATTACK (AoA): the angle between the chord line and the RELATIVE AIRFLOW — not the same as pitch attitude.", dia: "aerofoil" },
      { t: "The lift formula", b: "Lift L = CL × ½ρV² × S, where CL is the lift coefficient, ½ρV² is dynamic pressure, and S is wing area. The pilot controls lift mainly through CL (via angle of attack) and V (speed). At higher altitude, lower ρ must be offset by higher TAS to keep lift constant." },
      { t: "The lift coefficient (CL) and AoA", b: "CL depends on aerofoil shape and angle of attack. CL increases roughly LINEARLY with AoA up to the stalling angle (typically ~16°), where it reaches CLmax and then drops sharply. To maintain level flight as speed reduces, AoA (and CL) must increase.", dia: "clalpha" },
      { t: "Where lift comes from", b: "Faster, lower-pressure flow over the top and slower, higher-pressure flow underneath produce a net upward force. About two-thirds of lift typically comes from the reduced pressure on TOP of the wing, not from pressure underneath." },
      { t: "Centre of pressure (CofP)", b: "The point through which the total lift acts. On a typical cambered aerofoil, as AoA INCREASES the CofP moves FORWARD (towards the leading edge), and it moves rearward as AoA decreases. This movement matters for stability and stick forces." },
      { t: "The aerodynamic centre", b: "The point about which the pitching moment stays essentially CONSTANT with changing AoA — located near the QUARTER-CHORD (25% chord) in subsonic flow. Designers reference moments here because it simplifies stability analysis; in supersonic flow it shifts rearward to ~50% chord." },
    ],
    quiz: [
      { q: "Angle of attack is the angle between the:", o: ["Chord line and the relative airflow", "Wing and the horizon", "Chord line and the longitudinal axis", "Flightpath and the horizon"], a: 0, e: "AoA is chord line vs relative airflow — distinct from pitch attitude, which is relative to the horizon." },
      { q: "In the lift formula L = CL·½ρV²·S, the pilot most directly varies lift through:", o: ["CL (angle of attack) and V", "ρ and S", "S only", "ρ only"], a: 0, e: "Angle of attack (CL) and airspeed (V) are the pilot's controls; wing area changes only with flaps, density with altitude." },
      { q: "As angle of attack increases up to the stall, CL:", o: ["Increases roughly linearly, then drops at the stall", "Decreases steadily", "Stays constant", "Increases indefinitely"], a: 0, e: "CL rises nearly linearly to CLmax at the stalling angle (~16°), then falls away sharply as the flow separates." },
      { q: "On a typical cambered wing, most lift is generated by:", o: ["Reduced pressure over the upper surface", "Increased pressure under the lower surface", "The trailing edge", "Skin friction"], a: 0, e: "Roughly two-thirds of lift comes from the suction (low pressure) on top of the wing." },
      { q: "As AoA increases on a cambered aerofoil, the centre of pressure generally moves:", o: ["Forward", "Rearward", "Stays fixed at 50% chord", "Off the wing"], a: 0, e: "The CofP moves forward toward the leading edge with increasing AoA (within the normal range)." },
      { q: "The subsonic aerodynamic centre is located approximately at:", o: ["25% chord", "5% chord", "50% chord", "The trailing edge"], a: 0, e: "Near the quarter-chord, where the pitching moment is essentially independent of AoA (it moves to ~50% supersonically)." },
    ],
  },
  {
    id: "drag",
    code: "081·01",
    title: "Drag",
    blurb: "Parasite & induced drag, the drag curve, Vmd, aspect ratio, winglets.",
    cards: [
      { t: "The two families of drag", b: "PARASITE drag (form/pressure, skin friction, interference) increases with the SQUARE of speed. INDUCED drag — the by-product of producing lift — DECREASES with speed (it is large and slow, small and fast). TOTAL drag is their sum, giving a U-shaped curve.", dia: "dragcurve" },
      { t: "Induced drag & wingtip vortices", b: "High pressure below the wing spills around the tip to the low pressure above, creating wingtip vortices and downwash. This tilts the lift vector rearward — that rearward component IS induced drag. It is greatest at high AoA / low speed / high weight." },
      { t: "Reducing induced drag", b: "Induced drag is reduced by HIGH ASPECT RATIO (long thin wings — gliders), by winglets/wingtip devices that weaken the vortex, and by tapered or elliptical lift distributions. Induced drag is inversely proportional to the square of speed and to aspect ratio." },
      { t: "Vmd — minimum drag speed", b: "At the bottom of the total drag curve, parasite drag equals induced drag and total drag is least — this is Vmd, the speed for best lift/drag ratio (L/Dmax). It gives maximum glide range and, in jets, relates to maximum endurance / best range references." },
      { t: "Speed stability", b: "Flying FASTER than Vmd is speed-stable: a speed decrease reduces drag, so the aircraft tends to re-accelerate. Flying SLOWER than Vmd (the 'back of the drag curve') is speed-UNSTABLE: slowing increases drag, which slows you further — the region of reversed command, important on approach." },
      { t: "L/D ratio", b: "Lift/drag ratio measures aerodynamic efficiency, maximised at Vmd. A higher L/Dmax means a flatter glide and better range. L/D max occurs at one specific ANGLE OF ATTACK, so best glide is flown at a speed (which varies with weight) corresponding to that AoA." },
    ],
    quiz: [
      { q: "Induced drag varies with speed in what way?", o: ["Decreases as speed increases", "Increases as speed increases", "Independent of speed", "Increases with the square of speed"], a: 0, e: "Induced drag is high at low speed/high AoA and falls as speed rises — opposite to parasite drag." },
      { q: "Parasite drag varies with speed how?", o: ["Increases with the square of speed", "Decreases with speed", "Constant", "Decreases with the square of speed"], a: 0, e: "Parasite drag ∝ V² — it dominates at high speed, induced drag at low speed." },
      { q: "At minimum drag speed (Vmd):", o: ["Induced drag equals parasite drag", "Induced drag is zero", "Parasite drag is zero", "Total drag is greatest"], a: 0, e: "The two curves cross at Vmd — total drag is least and L/D is maximum." },
      { q: "Induced drag is reduced by:", o: ["Higher aspect ratio and winglets", "Lower aspect ratio", "A blunter wing", "Increasing weight"], a: 0, e: "Long thin (high aspect ratio) wings and tip devices weaken the vortices that cause induced drag." },
      { q: "Flying on the 'back of the drag curve' (below Vmd) the aircraft is:", o: ["Speed-unstable", "Speed-stable", "At minimum drag", "At maximum L/D"], a: 0, e: "Below Vmd, slowing increases drag, which slows the aircraft further — reversed command, a trap on slow approaches." },
      { q: "Maximum lift/drag ratio occurs at:", o: ["A specific angle of attack (Vmd)", "The highest possible speed", "Maximum AoA", "Zero AoA"], a: 0, e: "L/Dmax is a fixed AoA; the corresponding speed varies with weight but gives best glide range." },
    ],
  },
  {
    id: "stall",
    code: "081·01",
    title: "The Stall & Spin",
    blurb: "Boundary layer, separation, stall speed factors, spinning.",
    cards: [
      { t: "The boundary layer", b: "The thin layer of air slowed by friction next to the surface. It begins LAMINAR (smooth, low drag) then becomes TURBULENT (thicker, more drag but more energetic and better at resisting separation). The transition point moves forward as speed/roughness increases." },
      { t: "Separation and the stall", b: "As AoA increases, the adverse pressure gradient grows until the boundary layer separates from the upper surface. At the STALLING ANGLE (~16°) the airflow breaks away, CL collapses and drag rises sharply. A stall is always caused by exceeding the critical ANGLE OF ATTACK — at any speed or attitude." },
      { t: "Stall speed factors", b: "Stall IAS INCREASES with: greater weight, increased load factor (turns, pull-ups), forward CG (more download needed from the tail), and contamination (ice/frost). It is unaffected, in IAS terms, by altitude. Stall speed ∝ √(weight) and ∝ √(load factor)." },
      { t: "Load factor and the accelerated stall", b: "In a level turn, load factor n = 1/cos(bank). Stall speed rises with √n: a 60° bank gives n=2, raising stall speed by √2 ≈ 1.41 (about 41% higher). This is the accelerated stall — you can stall at well above the 1g stall speed by manoeuvring." },
      { t: "Stall recognition & wing design", b: "Warnings: buffet, stall warner, high stick force/position, sloppy controls. Wings are designed to stall at the ROOT first (washout — tip has lower incidence) so ailerons stay effective and the stall is gentle. Stall strips and vortex generators tailor the behaviour." },
      { t: "The spin", b: "A stall with yaw: one wing is more deeply stalled than the other (autorotation), giving a descending, rotating, stalled flightpath. Standard recovery (PARE): Power idle, Ailerons neutral, Rudder full OPPOSITE the spin, Elevator forward to break the stall — then recover the dive. A deep/super stall can trap T-tail aircraft with the blanked tailplane." },
    ],
    quiz: [
      { q: "A stall is always caused by exceeding the critical:", o: ["Angle of attack", "Airspeed", "Mach number", "Bank angle"], a: 0, e: "The stall is an AoA phenomenon — it can occur at any speed or attitude if the critical AoA is exceeded." },
      { q: "Stalling speed (IAS) increases with:", o: ["Increased weight and load factor", "Increased altitude", "Aft CG only", "Reduced weight"], a: 0, e: "Stall IAS rises with weight (√W) and load factor (√n); forward CG also raises it. It is essentially unchanged with altitude in IAS." },
      { q: "In a 60° banked level turn, the stall speed increases by a factor of about:", o: ["1.41", "2.0", "1.0", "0.7"], a: 0, e: "n = 1/cos60° = 2, and stall speed rises with √n = √2 ≈ 1.41 (41% higher)." },
      { q: "Wing washout (lower tip incidence) is used so that:", o: ["The root stalls before the tip, keeping ailerons effective", "The tip stalls first", "Induced drag increases", "The CofP moves aft"], a: 0, e: "Root-first stalling preserves roll control and gives gentle stall behaviour with early buffet." },
      { q: "A turbulent boundary layer, compared with a laminar one:", o: ["Has more energy and resists separation better", "Always separates sooner", "Produces less drag", "Cannot exist on a wing"], a: 0, e: "Turbulent flow has higher skin friction but more energy, so it clings to the surface longer and delays the stall." },
      { q: "In the standard spin recovery, the rudder is applied:", o: ["Full, opposite to the direction of rotation", "Full, into the rotation", "Neutral throughout", "In time with the ailerons"], a: 0, e: "PARE: power idle, ailerons neutral, full OPPOSITE rudder, elevator forward to unstall, then recover the dive." },
    ],
  },
  {
    id: "highlift",
    code: "081·01",
    title: "High-Lift & Drag Devices",
    blurb: "Flaps, slats, slots, spoilers — effects on CL, drag and stall.",
    cards: [
      { t: "Why high-lift devices", b: "To fly slower for takeoff and landing you need more CL at low speed. Flaps and slats raise CLmax, lowering the stall speed so approach and landing speeds can be reduced and runway length saved." },
      { t: "Flap types", b: "PLAIN: hinged trailing edge — modest CL gain, lots of drag. SPLIT: lower surface deflects — more drag, little lift gain. SLOTTED: a gap re-energises the boundary layer — large CL gain (most common on airliners). FOWLER: slides aft AND down, increasing both camber AND wing AREA — the biggest CL increase." },
      { t: "What flaps do to the curve", b: "Lowering flaps increases CL at every AoA and raises CLmax, but REDUCES the stalling angle of attack (the curve shifts up and left). Lift increases, but so does drag — and large flap settings give more drag than lift, which is why landing flap is more than takeoff flap.", dia: "flapsslats" },
      { t: "Slats and slots", b: "Leading-edge SLATS (and fixed SLOTS) delay separation by feeding high-energy air over the upper surface. They INCREASE the stalling angle of attack and CLmax — the opposite effect on stall angle from trailing-edge flaps. Often used together: slats extend the stall AoA, flaps boost low-speed lift." },
      { t: "Spoilers & airbrakes", b: "Spoilers raise to DESTROY lift and increase drag. Roles: as airbrakes (both wings, descent/deceleration), as lift dumpers (on touchdown, to put weight on wheels for braking), and as roll spoilers (asymmetric, to assist or replace ailerons). Lift dump after landing dramatically improves braking." },
      { t: "Movement summary", b: "Trailing-edge flaps: ↑CLmax, ↓stall speed, ↑drag, ↓stall AoA, nose-down pitch change is common. Leading-edge slats: ↑CLmax, ↑stall AoA. Use this contrast in exam questions — flaps and slats move the stall ANGLE in opposite directions even though both lower the stall SPEED." },
    ],
    quiz: [
      { q: "The flap type that increases wing area as well as camber is the:", o: ["Fowler flap", "Plain flap", "Split flap", "Krueger flap"], a: 0, e: "Fowler flaps translate aft and down, adding area and camber — the greatest CLmax increase." },
      { q: "Lowering trailing-edge flaps changes the stalling angle of attack how?", o: ["Reduces it", "Increases it", "Leaves it unchanged", "Doubles it"], a: 0, e: "Flaps raise CLmax but the stall now occurs at a LOWER angle of attack (curve shifts up and left)." },
      { q: "Leading-edge slats primarily:", o: ["Increase CLmax and the stalling angle of attack", "Reduce CLmax", "Reduce the stalling angle", "Act as airbrakes"], a: 0, e: "Slats re-energise the boundary layer, delaying separation to a higher AoA and raising CLmax." },
      { q: "On touchdown, spoilers deployed as lift dumpers:", o: ["Destroy lift to put weight on the wheels for braking", "Increase lift for a smoother rollout", "Act as flaps", "Reduce drag"], a: 0, e: "Killing lift transfers weight to the wheels, sharply improving wheel braking effectiveness." },
      { q: "Compared with takeoff flap, full landing flap is used because it gives:", o: ["More drag (steeper, slower approach)", "Less drag", "More wing area only", "A higher stall angle"], a: 0, e: "Large flap settings add a lot of drag for relatively little extra lift — ideal for a controlled, slow descent to land." },
      { q: "Both flaps and slats lower the stall SPEED, but they affect stall ANGLE:", o: ["In opposite directions", "Identically", "Not at all", "Only at high altitude"], a: 0, e: "Trailing-edge flaps reduce the stall angle; leading-edge slats increase it — a classic exam contrast." },
    ],
  },
  {
    id: "stability",
    code: "081·03",
    title: "Stability",
    blurb: "Static & dynamic stability, CG, longitudinal/lateral/directional.",
    cards: [
      { t: "Static vs dynamic stability", b: "STATIC stability is the INITIAL tendency to return to equilibrium after a disturbance (positive = returns, neutral = stays, negative = diverges). DYNAMIC stability describes the motion OVER TIME — the disturbance may damp out (positive), continue undamped, or grow. An aircraft can be statically stable yet dynamically unstable.", dia: "stabilityball" },
      { t: "Longitudinal stability & CG", b: "Stability in pitch, provided mainly by the TAILPLANE. The key is CG position relative to the wing's aerodynamic centre. FORWARD CG = more stable but heavier stick forces and higher stall speed. AFT CG = less stable, lighter controls; too far aft and the aircraft becomes uncontrollable. CG limits exist exactly for this." },
      { t: "The pitch effect of CG", b: "A forward CG needs more nose-up tailplane download, effectively increasing the load the wing carries (higher stall speed, more drag). An aft CG reduces stability and can make pitch control over-sensitive. Loading must keep CG within the certified envelope." },
      { t: "Lateral stability (roll)", b: "Tendency to return to wings-level after a roll disturbance, achieved by DIHEDRAL (wings angled up), high wing position, wing sweepback, and keel surface. A sideslip caused by the roll generates a restoring rolling moment. Too much lateral stability worsens Dutch roll." },
      { t: "Directional stability (yaw)", b: "Tendency to weathercock into the relative airflow after a yaw, provided mainly by the FIN (vertical stabiliser) and fuselage side area behind the CG. Like a weathervane, the aircraft turns to point into the airflow." },
      { t: "Dutch roll & spiral instability", b: "These come from the interaction of lateral and directional stability. DUTCH ROLL: too much lateral relative to directional stability — an oscillating roll/yaw wallow, damped by yaw dampers. SPIRAL instability: too much directional relative to lateral — a slowly tightening descending turn. Designers trade one against the other." },
    ],
    quiz: [
      { q: "Static stability refers to the aircraft's:", o: ["Initial tendency to return to equilibrium", "Motion over a long period", "Cruise speed", "Maximum bank angle"], a: 0, e: "Static = the immediate response to a disturbance; dynamic = how that motion evolves with time." },
      { q: "Moving the CG forward makes an aircraft:", o: ["More longitudinally stable, with heavier stick forces", "Less stable", "Neutrally stable", "Directionally unstable"], a: 0, e: "Forward CG increases pitch stability but raises stick forces, stall speed and drag (tail download)." },
      { q: "Lateral (roll) stability is provided mainly by:", o: ["Wing dihedral", "The fin", "The elevator", "Flaps"], a: 0, e: "Dihedral (plus sweep, high wing, keel area) creates a restoring roll moment when the aircraft sideslips." },
      { q: "Directional stability is provided mainly by the:", o: ["Fin (vertical stabiliser)", "Tailplane", "Ailerons", "Wing dihedral"], a: 0, e: "The fin and rear fuselage make the aircraft weathercock into the airflow after a yaw disturbance." },
      { q: "Dutch roll results from:", o: ["Strong lateral relative to directional stability", "Strong directional relative to lateral stability", "Forward CG", "Too little dihedral"], a: 0, e: "Excess lateral stability gives the oscillating roll/yaw of Dutch roll — countered by yaw dampers. The opposite imbalance gives spiral instability." },
      { q: "An aircraft can be:", o: ["Statically stable but dynamically unstable", "Statically unstable but always dynamically stable", "Neither type of stability at once", "Stable only in cruise"], a: 0, e: "The two are distinct: a stable initial response can still develop into a growing oscillation over time." },
    ],
  },
  {
    id: "controls",
    code: "081·04",
    title: "Controls & Trim",
    blurb: "Three axes, adverse yaw, trim & tabs, mass balance, flutter.",
    cards: [
      { t: "The three axes & primary controls", b: "PITCH about the lateral axis — ELEVATOR. ROLL about the longitudinal axis — AILERONS. YAW about the normal (vertical) axis — RUDDER. Each control alters the camber/lift of its surface to create a moment about the corresponding axis.", dia: "axes" },
      { t: "Adverse yaw", b: "In a roll, the down-going aileron (rising wing) creates more lift AND more induced drag, yawing the aircraft AWAY from the turn — adverse yaw. Cures: DIFFERENTIAL ailerons (up-aileron moves more than down), FRISE ailerons (up-aileron projects into the airflow to add drag), and coordinated rudder." },
      { t: "Trim", b: "Trimming relieves the steady stick force so the pilot needn't hold pressure. A TRIM TAB on the trailing edge of a control deflects the OPPOSITE way to hold the surface in the desired position with zero stick force. Re-trim after any change of speed, power or configuration." },
      { t: "Types of tab", b: "TRIM tab: pilot-set, holds zero stick force. BALANCE tab: moves opposite to the control to lighten the stick force during the input. ANTI-BALANCE (anti-servo) tab: moves the SAME way to HEAVEN the feel and prevent over-controlling. SERVO tab: aerodynamically drives the main surface on large aircraft." },
      { t: "Aerodynamic & mass balancing", b: "AERODYNAMIC balance (horn balance, set-back hinge) reduces the effort to move a control. MASS balance — weight ahead of the hinge line — prevents control-surface FLUTTER by moving the surface's centre of gravity onto or ahead of the hinge. Flutter is a destructive vibration that can fail the structure." },
      { t: "Flutter & Vne", b: "Flutter is a rapidly diverging oscillation from the coupling of aerodynamic, inertial and elastic forces — more likely at high speed. Mass balancing, stiff structures and the never-exceed speed Vne keep the aircraft clear of the flutter regime." },
    ],
    quiz: [
      { q: "Roll about the longitudinal axis is controlled by the:", o: ["Ailerons", "Elevator", "Rudder", "Flaps"], a: 0, e: "Ailerons → roll (longitudinal axis); elevator → pitch (lateral); rudder → yaw (normal)." },
      { q: "Adverse yaw during a roll is caused by:", o: ["Extra induced drag on the rising wing", "The rudder", "The down-going wing's drag", "Dihedral"], a: 0, e: "The up-aileron wing makes more lift and more induced drag, yawing away from the turn — eased by differential/Frise ailerons and rudder." },
      { q: "A trim tab moves:", o: ["Opposite to the control surface to hold zero stick force", "The same way as the control", "Only on the ground", "To increase flutter"], a: 0, e: "It deflects opposite to the surface, holding it in place so the pilot feels no steady force." },
      { q: "An anti-balance (anti-servo) tab:", o: ["Moves the same way as the control to increase feel", "Moves opposite to lighten feel", "Prevents flutter by mass", "Drives the surface aerodynamically"], a: 0, e: "It heavies the controls to stop over-controlling — common on all-moving stabilators." },
      { q: "Mass balancing of a control surface is used to:", o: ["Prevent flutter", "Reduce induced drag", "Increase the stall angle", "Trim the aircraft"], a: 0, e: "A weight ahead of the hinge shifts the surface CG forward, preventing the destructive oscillation called flutter." },
      { q: "Flutter is most likely:", o: ["At high speed", "At low speed", "At high AoA only", "On the ground"], a: 0, e: "The aero-elastic coupling that drives flutter intensifies with speed — Vne keeps the aircraft below it." },
    ],
  },
  {
    id: "mechanics",
    code: "081·01",
    title: "Flight Mechanics",
    blurb: "Forces in level flight, climb, descent, glide and the turn.",
    cards: [
      { t: "Steady level flight", b: "Four forces in balance: LIFT = WEIGHT and THRUST = DRAG. The lift/weight and thrust/drag couples also balance in pitch. If thrust exceeds drag the aircraft accelerates or climbs; if lift exceeds weight it accelerates upward.", dia: "fourforces" },
      { t: "The climb", b: "In a steady climb, thrust must overcome drag PLUS a component of weight acting along the flightpath. Lift is actually slightly LESS than weight (weight's other component is supported by thrust). Climb angle depends on EXCESS THRUST; rate of climb depends on EXCESS POWER. Best angle (Vx) clears obstacles; best rate (Vy) gains height fastest." },
      { t: "The glide / descent", b: "With no thrust, a component of weight provides the forward force. Glide ANGLE depends only on L/D ratio — best glide range is flown at L/Dmax (Vmd), and is INDEPENDENT of weight (a heavier aircraft glides the same distance, just faster). Wind matters: into headwind, increase speed for best range; downwind, reduce it." },
      { t: "The turn", b: "In a level turn the horizontal component of lift provides the CENTRIPETAL force. Lift must increase to keep the vertical component equal to weight, so load factor rises: n = 1/cos(bank). 60° bank → n = 2 (2g) and stall speed up 41%. Steeper turns demand more lift, more thrust and risk the accelerated stall.", dia: "turnforces" },

      { t: "Forces summary", b: "Climb: lift slightly less than weight, thrust > drag. Descent (glide): glide angle = 1/(L/D), independent of weight. Turn: n = 1/cos bank, stall speed × √n. These three relationships answer most flight-mechanics questions." },

// ===================== CALC DRILL GENERATOR =====================
function rnd(min, max, step = 1) {
  const n = Math.floor(Math.random() * ((max - min) / step + 1));
  return min + n * step;
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function opts(correct, distractors, unit) {
  const set = [correct, ...distractors.filter((d, i, a) => d !== correct && a.indexOf(d) === i).slice(0, 3)];
  const shuffled = shuffle(set);
  return { options: shuffled.map((v) => `${v}${unit}`), answer: shuffled.indexOf(correct) };
}
function genDrill() {
  const type = rnd(0, 5);
  if (type === 0) {
    const fl = rnd(4, 35) * 10;
    const ans = 15 - 2 * (fl / 10);
    const { options, answer } = opts(ans, [ans + 5, ans - 5, ans + 10, -ans], "\u00b0C");
    return { q: `What is the ISA temperature at FL${fl}?`, options, answer, e: `ISA = 15 \u2212 (2 \u00d7 ${fl / 10}) = ${ans}\u00b0C.` };
  }
  if (type === 1) {
    const fl = rnd(8, 35) * 10;
    const isa = 15 - 2 * (fl / 10);
    const dev = rnd(-12, 12, 2);
    const oat = isa + dev;
    const { options, answer } = opts(dev, [dev + 5, dev - 5, -dev, dev + 10], "");
    return { q: `OAT at FL${fl} is ${oat}\u00b0C. What is the ISA deviation?`, options, answer, e: `ISA at FL${fl} = ${isa}\u00b0C. Deviation = ${oat} \u2212 (${isa}) = ISA ${dev >= 0 ? "+" : ""}${dev}.` };
  }
  if (type === 2) {
    const pa = rnd(1, 8) * 1000;
    const isa = 15 - 2 * (pa / 1000);
    const dev = rnd(2, 16, 2);
    const oat = isa + dev;
    const ans = pa + 120 * dev;
    const { options, answer } = opts(ans, [pa + 120 * (dev - 5), pa + 60 * dev, pa - 120 * dev], " ft");
    return { q: `Pressure altitude ${pa} ft, OAT ${oat > 0 ? "+" : ""}${oat}\u00b0C. Density altitude is approximately:`, options, answer, e: `ISA at ${pa} ft = ${isa}\u00b0C \u2192 deviation +${dev}. DA \u2248 ${pa} + (120 \u00d7 ${dev}) = ${ans} ft.` };
  }
  if (type === 3) {
    const spread = rnd(3, 12);
    const ans = 400 * spread;
    const t = rnd(14, 26);
    const { options, answer } = opts(ans, [ans + 800, ans - 800, 100 * spread], " ft");
    return { q: `Surface temperature +${t}\u00b0C, dew point +${t - spread}\u00b0C. Estimated cumulus cloud base:`, options, answer, e: `Base \u2248 400 \u00d7 spread = 400 \u00d7 ${spread} = ${ans} ft AGL.` };
  }
  if (type === 4) {
    const alt = rnd(4, 14) * 1000;
    const dev = rnd(-3, 3, 1) * 10 || 10;
    const ans = Math.round(alt * (1 + 0.04 * (dev / 10)));
    const { options, answer } = opts(ans, [Math.round(alt * (1 - 0.04 * (dev / 10))), alt, ans + 400], " ft");
    return { q: `Indicated altitude ${alt} ft on correct QNH, temperature ISA ${dev > 0 ? "+" : ""}${dev}. Approximate TRUE altitude (4% rule):`, options, answer, e: `4% per 10\u00b0C: ${alt} \u00d7 (1 ${dev > 0 ? "+" : "\u2212"} ${Math.abs(dev) * 0.4}%) \u2248 ${ans} ft. ${dev < 0 ? "Colder \u2192 true altitude LOWER." : "Warmer \u2192 true altitude HIGHER."}` };
  }
  const qnh = rnd(983, 1008);
  const fl = rnd(4, 8) * 10;
  const diff = 1013 - qnh;
  const ans = fl * 100 - diff * 27;
  const { options, answer } = opts(ans, [fl * 100 + diff * 27, fl * 100, ans + 270], " ft");
  return { q: `Flying at FL${fl} (1013 set). QNH is ${qnh} hPa. Approximate altitude AMSL:`, options, answer, e: `1013 \u2212 ${qnh} = ${diff} hPa \u00d7 27 ft = ${diff * 27} ft. QNH is lower, so you are LOWER: ${fl * 100} \u2212 ${diff * 27} = ${ans} ft.` };
}

  return (
    React.createElement('div', { style: { display: "flex", gap: 8, marginTop: 12 },}
      , React.createElement('button', { onClick: toggleSpeak, style: { ...mono, fontSize: 13, padding: "9px 14px", borderRadius: 2, border: `1px solid ${C.line}`, background: speaking ? C.coldSoft : C.panel, color: C.ink, cursor: "pointer" },}, speaking ? "■ Stop" : "▶ Listen")
      , React.createElement('button', { onClick: toggleBm, style: { ...mono, fontSize: 13, padding: "9px 14px", borderRadius: 2, border: `1px solid ${marked ? C.warm : C.line}`, background: marked ? C.warmSoft : C.panel, color: marked ? C.warm : C.ink, cursor: "pointer" },}, marked ? "★ Saved" : "☆ Save card")
    )
  );
}

function Saved({ progress, save, onOpen, onBack }) {
  const bm = progress.bookmarks || {};
  const items = [];
  TOPICS.forEach((t) => t.cards.forEach((c, idx) => { if (bm[t.id + ":" + idx]) items.push({ t, c, idx }); }));
  const unsave = (key) => { const b = { ...bm }; delete b[key]; save({ ...progress, bookmarks: b }); };
  return (
    React.createElement('div', null
      , React.createElement('button', { onClick: onBack, style: { ...mono, background: "none", border: "none", color: C.cold, cursor: "pointer", fontSize: 13, padding: "4px 0", marginBottom: 8 },}, "← ALL MODULES"  )
      , React.createElement('h1', { style: { fontSize: 26, fontWeight: 800, margin: "2px 0 14px" },}, "★ Saved cards"  )
      , items.length === 0 ? (
        React.createElement('p', { style: { color: C.sub, fontSize: 15 },}, "No saved cards yet. Tap “☆ Save card” on any Learn card to keep it here for quick revision."                  )
      ) : (
        React.createElement('div', { style: { display: "grid", gap: 10 },}
          , items.map(({ t, c, idx }) => (
            React.createElement('div', { key: t.id + idx, style: { background: C.panel, border: `1px solid ${C.line}`, borderLeft: `4px solid ${C.warm}`, borderRadius: 2, padding: "12px 14px" },}
              , React.createElement('div', { style: { ...mono, fontSize: 10.5, color: C.cold },}, t.code, " · "  , t.title)
              , React.createElement('div', { style: { fontWeight: 700, fontSize: 15, margin: "3px 0 5px" },}, c.t)
              , React.createElement('p', { style: { fontSize: 13.5, color: C.sub, lineHeight: 1.5, margin: "0 0 8px" },}, c.b)
              , React.createElement('div', { style: { display: "flex", gap: 8 },}
                , React.createElement('button', { onClick: () => onOpen(t.id), style: { ...mono, fontSize: 12, padding: "7px 12px", border: "none", borderRadius: 2, background: C.ink, color: "#fff", cursor: "pointer" },}, "Open chapter →"  )
                , React.createElement('button', { onClick: () => unsave(t.id + ":" + idx), style: { ...mono, fontSize: 12, padding: "7px 12px", border: `1px solid ${C.line}`, borderRadius: 2, background: C.panel, color: C.warm, cursor: "pointer" },}, "Remove")
              )
            )
          ))
        )
      )
    )
  );
}
