<script>const {useState,useEffect}=React;

const TOPICS = [
  {
    id: "fundamentals",
    code: "032·01",
    title: "Performance Fundamentals",
    blurb: "Factors affecting performance: weight, density, wind, slope, surface.",
    cards: [
      { t: "What 'performance' covers", b: "Performance is how well the aircraft accelerates, takes off, climbs, cruises, descends and lands — and whether it can do so safely within the available runway and obstacle environment. It's governed by the balance of thrust, drag, lift and weight, and by the air the aircraft operates in." },
      { t: "Effect of mass (weight)", b: "Greater mass = more lift needed = higher speeds, longer take-off and landing distances, shallower climb gradient, lower ceiling and reduced range. Take-off and landing distances rise roughly with the SQUARE of the speed needed, so weight has a strong effect. Mass is usually the dominant performance variable the crew controls." },
      { t: "Effect of density (altitude & temperature)", b: "Low air density (high airport elevation, high temperature, high humidity = high DENSITY ALTITUDE) reduces lift and engine thrust, so take-off/landing distances lengthen and climb degrades. The wing still stalls at the same IAS, but TAS and the ground run are higher. Hot-and-high airfields are performance-critical." },
      { t: "Effect of wind", b: "A HEADWIND shortens the take-off and landing ground run and steepens the climb-out/approach path over the ground; a TAILWIND does the opposite and is heavily penalised. Regulations require factoring: typically only ~50% of a reported headwind may be credited, but 150% of a tailwind must be assumed — conservative both ways." },
      { t: "Effect of runway slope & surface", b: "An UPSLOPE lengthens the take-off run (gravity opposes acceleration) but shortens the landing run; a downslope does the reverse. Surface matters: a wet or contaminated runway reduces braking and increases stopping distance, and contamination (slush/snow/water) also adds drag on take-off." },
      { t: "Pressure altitude & the day's conditions", b: "Performance charts are entered with PRESSURE ALTITUDE (set 1013 to read it) and temperature (giving density altitude), plus mass, wind and slope. The same aircraft can be runway-limited on a hot day at a high, short, upsloping, tailwind runway and unrestricted on a cool day at a long sea-level one." },
    ],
    quiz: [
      { q: "Increasing mass affects take-off distance how?", o: ["Increases it", "Decreases it", "No effect", "Halves it"], a: 0, e: "More mass needs higher speeds and more lift; distances rise (roughly with the square of speed)." },
      { q: "High density altitude (hot, high, humid):", o: ["Reduces thrust and lift, lengthening distances", "Improves climb performance", "Shortens the take-off run", "Lowers the stall IAS"], a: 0, e: "Thin air cuts lift and thrust; TAS and ground run increase even though stall IAS is unchanged." },
      { q: "For take-off performance, regulations typically allow crediting only:", o: ["50% of the headwind, but assume 150% of any tailwind", "100% of the headwind and tailwind", "150% of the headwind", "None of the wind"], a: 0, e: "Conservative factoring: under-credit headwind, over-credit tailwind to build in margin." },
      { q: "An upslope runway, for take-off:", o: ["Lengthens the take-off run", "Shortens the take-off run", "Has no effect", "Reduces the stall speed"], a: 0, e: "Gravity opposes acceleration uphill — longer take-off run (but a shorter landing run)." },
      { q: "Performance charts are entered using:", o: ["Pressure altitude and temperature", "Density only", "Indicated altitude on QNH", "True altitude"], a: 0, e: "Pressure altitude (1013 set) plus temperature gives density altitude; add mass, wind, slope." },
      { q: "A contaminated (slush/snow) runway on take-off:", o: ["Adds drag and reduces braking, worsening performance", "Improves acceleration", "Has no effect if below MTOM", "Shortens stopping distance"], a: 0, e: "Contamination both retards acceleration (impingement drag) and degrades braking/stopping." },
    ],
  },
  {
    id: "classes",
    code: "032·01",
    title: "Performance Classes",
    blurb: "Classes A, B and C; certification basis; why large jets are Class A.",
    cards: [
      { t: "Why performance classes", b: "Aircraft are grouped into PERFORMANCE CLASSES that set the regulatory requirements for take-off, climb, obstacle clearance and landing — scaled to the aircraft's capability and the consequences of an engine failure. The class determines how conservative the planning must be." },
      { t: "Class A", b: "Multi-engine turbojets/large turboprops (broadly, aeroplanes with MTOM > 5700 kg or more than 9 passenger seats with turbine power). Class A demands the most rigorous rules: full account of ENGINE FAILURE at the critical point, net flight-path obstacle clearance, and the V1-based balanced/unbalanced field concept." },
      { t: "Class B", b: "Smaller propeller aeroplanes (generally ≤ 9 passenger seats and MTOM ≤ 5700 kg). Requirements are simpler: single-engine failure after take-off is not guaranteed to be survivable in the same way, so planning uses factored take-off and landing distances and basic climb gradients with safety factors." },
      { t: "Class C", b: "Large aeroplanes with PISTON engines (a small, mostly historical group — big recip airliners). It exists for completeness; few modern types fall here. The principles mirror Class A's rigour adapted to piston powerplants." },
      { t: "Certification vs operating rules", b: "The AFM gives CERTIFIED performance (scheduled data demonstrated by the manufacturer). The OPERATING rules (the performance class requirements) then apply factors and obstacle criteria to that data for dispatch. You plan with the operating rules, reading from certified AFM charts." },
      { t: "The engine-failure philosophy", b: "Class A is built around surviving the FAILURE OF THE CRITICAL ENGINE at the worst moment: the aircraft must be able to either stop or continue the take-off safely from V1, then climb away clearing obstacles on the remaining engine(s). This single idea shapes most Class A take-off rules." },
    ],
    quiz: [
      { q: "Class A applies broadly to:", o: ["Multi-engine turbine aeroplanes > 5700 kg or > 9 seats", "Single-engine pistons only", "Gliders", "Light twins under 2000 kg"], a: 0, e: "Large multi-engine turbine types — the most rigorous engine-failure and obstacle rules." },
      { q: "Class B covers:", o: ["Smaller propeller aeroplanes (≤ 9 seats, ≤ 5700 kg)", "Large jets", "Piston airliners", "All turboprops"], a: 0, e: "Simpler factored distances and climb requirements for small prop aeroplanes." },
      { q: "The central philosophy of Class A take-off planning is:", o: ["Surviving critical engine failure at the worst moment", "Maximising passenger numbers", "Minimising fuel only", "Ignoring obstacles"], a: 0, e: "Stop or go safely from V1, then climb clear on the remaining engines." },
      { q: "Certified performance data comes from the:", o: ["Aircraft Flight Manual (AFM)", "METAR", "Load sheet", "NOTAMs"], a: 0, e: "The AFM holds scheduled, demonstrated performance; operating rules then factor it for dispatch." },
      { q: "Class C aeroplanes are:", o: ["Large piston-engine types (a small group)", "Modern jets", "Microlights", "Helicopters"], a: 0, e: "Large recip airliners — mostly historical; few modern aircraft are Class C." },
      { q: "Operating (dispatch) rules differ from certified data by:", o: ["Applying factors and obstacle criteria to the AFM data", "Ignoring the AFM", "Using only TAS", "Removing all safety margins"], a: 0, e: "You plan by applying the class's factors and obstacle clearance to the certified AFM charts." },
    ],
  },
  {
    id: "takeoffspeeds",
    code: "032·02",
    title: "Take-off Speeds & Distances",
    blurb: "V1, VR, V2, Vmcg/Vmca, TORA/TODA/ASDA, balanced field.",
    cards: [
      { t: "The declared distances", b: "TORA: take-off run available (the runway). TODA: TORA + any CLEARWAY (a clear area beyond the runway the aircraft may fly over while climbing to screen height). ASDA: TORA + any STOPWAY (a paved area beyond the runway able to bear the aircraft during a rejected take-off). These define what's available to go or stop.", dia: "declared" },
      { t: "V1 — the decision speed", b: "V1 is the maximum speed at which the FIRST action to STOP (brakes/thrust levers) must be taken to stop within the ASDA, AND the minimum speed from which the take-off can be CONTINUED to screen height within the TODA after an engine failure. Above V1 you GO; below V1 (and a problem) you STOP." },
      { t: "VR, V2 and screen height", b: "VR (rotate): speed to begin rotation. V2 (take-off safety speed): the climb speed to be achieved by the SCREEN HEIGHT (35 ft dry / 15 ft wet for Class A) and maintained in the climb-out with an engine failed. The ordering is Vmcg ≤ V1 ≤ VR ≤ V2 (with V2 ≥ certain margins above stall/Vmca)." },
      { t: "Vmcg and Vmca", b: "Vmcg (minimum control speed on the GROUND): the lowest speed at which directional control can be kept using the rudder alone after the critical engine fails during the take-off run. Vmca (minimum control speed in the AIR): the airborne equivalent. V1 cannot be below Vmcg; V2 must give a margin above Vmca/stall." },
      { t: "Accelerate-stop & accelerate-go", b: "ACCELERATE-STOP DISTANCE: accelerate to V1, then reject and stop — must fit within ASDA. ACCELERATE-GO DISTANCE: accelerate, lose the critical engine at VEF, continue and reach screen height — must fit within TODA. The take-off must satisfy BOTH for the chosen V1." },
      { t: "Balanced field length", b: "If V1 is chosen so the accelerate-stop distance EQUALS the accelerate-go distance, that common distance is the BALANCED FIELD LENGTH, and the V1 is the balanced V1. Where stopway/clearway differ, an UNBALANCED field may allow a higher mass — but balanced field is the classic concept and often the limiting case.", dia: "balanced" },
    ],
    quiz: [
      { q: "V1 is the speed at/above which, after an engine failure, you must:", o: ["Continue the take-off (go)", "Always stop", "Retract the gear", "Reduce to idle"], a: 0, e: "At or above V1 you GO; below V1 you can STOP within the ASDA. V1 is the go/stop decision speed." },
      { q: "TODA is:", o: ["TORA plus clearway", "TORA plus stopway", "Just the runway", "TORA minus stopway"], a: 0, e: "Take-off distance available = runway + clearway (area to climb over to screen height)." },
      { q: "ASDA is:", o: ["TORA plus stopway", "TORA plus clearway", "TORA only", "TODA plus clearway"], a: 0, e: "Accelerate-stop distance available = runway + stopway (paved area to stop on during a reject)." },
      { q: "The balanced field length occurs when:", o: ["Accelerate-stop distance equals accelerate-go distance", "V1 equals VR", "There is no clearway", "The runway is wet"], a: 0, e: "Choosing V1 so stop distance = go distance gives the balanced field length and balanced V1." },
      { q: "The correct speed ordering is:", o: ["Vmcg ≤ V1 ≤ VR ≤ V2", "V2 ≤ VR ≤ V1", "VR ≤ V1 ≤ Vmcg", "V1 ≤ Vmcg ≤ VR"], a: 0, e: "V1 can't be below Vmcg; rotate at VR; achieve V2 by screen height." },
      { q: "V2 must be achieved by the:", o: ["Screen height (35 ft dry for Class A)", "Start of the roll", "End of the stopway", "Top of climb"], a: 0, e: "V2 is the take-off safety speed reached by screen height (35 ft dry / 15 ft wet) and held in the climb." },
    ],
  },
  {
    id: "climbsegments",
    code: "032·02",
    title: "Climb Segments & Obstacles",
    blurb: "The four take-off climb segments, gross vs net path, gradients.",
    cards: [
      { t: "The net take-off flight path", b: "Class A obstacle clearance uses the NET flight path — the GROSS (actual demonstrated) climb gradient REDUCED by a mandated margin (e.g. 0.8% for a twin) — and the net path must clear obstacles by at least 35 ft. The gross path is what the aircraft really does; the net is the conservative planning path." },
      { t: "First segment", b: "From screen height (35 ft) to gear fully UP. Speed V2, take-off thrust, one engine inoperative. The required gross gradient must simply be POSITIVE (> 0%). It's short — the gear is retracting and drag is high." },
      { t: "Second segment", b: "From gear up to typically 400 ft (minimum) — the MOST DEMANDING segment. Speed V2, take-off thrust, one engine inoperative, flaps at take-off setting. Minimum required GROSS gradient: 2.4% (two-engine), 2.7% (three-engine), 3.0% (four-engine). Often the climb-limiting case for take-off mass.", dia: "segments" },
      { t: "Third (acceleration) segment", b: "A level or shallow segment at/above ~400 ft where the aircraft ACCELERATES from V2 toward flap-retraction speed and the flaps are retracted. Thrust may be reduced to maximum continuous after the time limit on take-off thrust expires. Energy goes into speed rather than height here." },
      { t: "Fourth (final) segment", b: "Clean configuration, flaps up, at final take-off speed, maximum continuous thrust, one engine inoperative, climbing to a safe en-route altitude (≥ 1500 ft). Minimum required gross gradient: 1.2% (two-engine), 1.5% (three-engine), 1.7% (four-engine)." },
      { t: "Gradient, rate & obstacle domain", b: "CLIMB GRADIENT (% = height gained ÷ distance travelled) drives obstacle clearance; RATE of climb (ft/min) = gradient × groundspeed-related factor. Obstacles in the departure splay/domain are assessed against the NET path. If obstacles limit, take-off mass must be reduced until the net path clears them by 35 ft." },
    ],
    quiz: [
      { q: "The most demanding take-off climb segment is the:", o: ["Second segment", "First segment", "Third segment", "Fourth segment"], a: 0, e: "Gear up, V2, take-off flap, one engine out — the steepest required gross gradient (2.4% for a twin)." },
      { q: "The minimum second-segment gross gradient for a TWO-engine aircraft is:", o: ["2.4%", "2.7%", "3.0%", "1.2%"], a: 0, e: "2.4% (twin), 2.7% (three-engine), 3.0% (four-engine)." },
      { q: "Obstacle clearance in Class A is assessed against the:", o: ["Net flight path (gross reduced by a margin)", "Gross flight path", "Cruise ceiling", "Landing path"], a: 0, e: "The net path (gross minus a mandated reduction, e.g. 0.8% twin) must clear obstacles by ≥ 35 ft." },
      { q: "During the first segment the required gross gradient must be:", o: ["Positive (> 0%)", "At least 2.4%", "At least 3.0%", "Zero or negative"], a: 0, e: "From 35 ft to gear up the gradient need only be positive — drag is high with the gear retracting." },
      { q: "The third (acceleration) segment is where the aircraft:", o: ["Accelerates and retracts flaps, often near-level", "Climbs steepest", "Lands", "Rotates"], a: 0, e: "Energy goes into speed: accelerate from V2 to flap-retract speed and clean up, around 400 ft." },
      { q: "If obstacles limit the departure, the response is to:", o: ["Reduce take-off mass until the net path clears them", "Increase V2 only", "Ignore them below 1500 ft", "Use the gross path instead"], a: 0, e: "Lowering mass steepens the climb so the conservative net path clears the obstacle by 35 ft." },
    ],
  },
  {
    id: "climbcruise",
    code: "032·03",
    title: "Climb & Cruise Performance",
    blurb: "Climb gradient vs rate, ceilings, drift-down, range & endurance.",
    cards: [
      { t: "Gradient vs rate of climb", b: "CLIMB GRADIENT (% — height per distance) depends on EXCESS THRUST and matters for obstacle clearance and terrain. RATE of climb (ft/min) depends on EXCESS POWER and matters for time to height. Vx (best angle) gives the steepest gradient; Vy (best rate) gives the fastest height gain. Both excesses shrink with altitude." },
      { t: "Ceilings", b: "As you climb, excess thrust/power falls until climb performance runs out. ABSOLUTE ceiling: rate of climb = 0. SERVICE ceiling: rate falls to ~100 ft/min (jets often defined at 500 ft/min). Higher mass, higher temperature and (for some) humidity all LOWER the achievable ceiling and reduce climb performance." },
      { t: "Optimum & maximum altitude", b: "OPTIMUM altitude gives the best fuel efficiency (best specific range) for the current mass — and RISES as fuel burns off and mass reduces (hence step climbs). MAXIMUM altitude is limited by climb capability or buffet (coffin corner). Cruising too high for the mass risks buffet and poor manoeuvre margin." },
      { t: "Specific range & cruise techniques", b: "SPECIFIC RANGE = distance per unit fuel. It's maximised near the best-L/D speed (adjusted for engine efficiency and wind). LONG-RANGE CRUISE (LRC) trades a small range loss for more speed. Wind matters hugely: a strong headwind favours a higher cruise speed; tailwind favours slower." },
      { t: "Endurance vs range", b: "MAX ENDURANCE (most time airborne, e.g. holding) is flown near minimum FUEL FLOW — for a jet roughly at Vmd; for a prop a bit slower. MAX RANGE is flown faster, near best specific range. They are different speeds — holding speed is slower than best-range cruise speed." },
      { t: "Drift-down", b: "After an engine failure in the cruise, a twin may be unable to hold altitude, so it DRIFTS DOWN at the engine-out driftdown speed to a level it can maintain — which must clear terrain en route (the net driftdown path) and reach a suitable aerodrome. ETOPS and terrain planning hinge on driftdown capability." },
    ],
    quiz: [
      { q: "Best climb GRADIENT (steepest angle) is flown at:", o: ["Vx", "Vy", "Vne", "Vmd only at sea level"], a: 0, e: "Vx (best angle, from excess thrust) clears obstacles; Vy (best rate, excess power) gains height fastest." },
      { q: "The optimum cruise altitude for fuel efficiency:", o: ["Rises as fuel burns and mass reduces", "Falls as fuel burns", "Is fixed for the type", "Equals the absolute ceiling"], a: 0, e: "Lower mass → higher optimum altitude, which is why long flights use step climbs." },
      { q: "Maximum endurance (longest time airborne) for a jet is flown:", o: ["Near Vmd (minimum drag / low fuel flow)", "At maximum speed", "At Vne", "At the stall"], a: 0, e: "Minimum fuel flow gives most time aloft — slower than the best-range speed." },
      { q: "Service ceiling is conventionally where the rate of climb falls to:", o: ["About 100 ft/min (often 500 ft/min for jets)", "Zero", "1000 ft/min", "2000 ft/min"], a: 0, e: "Absolute ceiling is 0 ft/min; service ceiling uses a small residual rate." },
      { q: "After an engine failure in cruise, an aircraft unable to hold level will:", o: ["Drift down to a maintainable altitude clearing terrain", "Climb to the ceiling", "Maintain altitude indefinitely", "Stall immediately"], a: 0, e: "Driftdown at the engine-out speed to a sustainable level — the net path must clear terrain and reach an aerodrome." },
      { q: "Climb gradient depends primarily on:", o: ["Excess thrust", "Excess power", "Wing area", "CG position"], a: 0, e: "Excess THRUST sets gradient (angle); excess POWER sets rate of climb." },
    ],
  },
  {
    id: "landing",
    code: "032·04",
    title: "Landing Performance",
    blurb: "Vref, landing distances, dispatch factors, wet & contaminated runways.",
    cards: [
      { t: "Approach & landing speeds", b: "VREF is the reference landing speed at the threshold, typically about 1.23 × the stall speed in landing configuration (Vs0/Vsr). It rises with mass. The approach is flown at Vref plus a wind/gust additive. A higher Vref (heavy, contaminated, gusty) lengthens the landing distance." },
      { t: "Landing distance required", b: "The LANDING DISTANCE is measured from the screen height (50 ft for Class A) over the threshold, through the flare and touchdown, to a full stop. It increases with mass, density altitude, tailwind, upslope (no — DOWNslope lengthens landing), and a wet/contaminated surface that reduces braking." },
      { t: "Dispatch factors (the 60/70 rule)", b: "For dispatch, the required landing distance must fit within a FACTORED portion of the landing distance available (LDA). Class A turbojets: the demonstrated landing distance must be ≤ 60% of LDA on a DRY runway (i.e. ÷ 0.6); turboprops ≤ 70%. This builds a large margin for the actual day." },
      { t: "Wet & contaminated runways", b: "On a WET runway, the required landing distance is increased — commonly by a further 15% over the dry factored figure (unless type-specific wet data shows otherwise). CONTAMINATED runways (standing water, slush, snow, ice) use specific contaminated landing data with much longer distances and AQUAPLANING risk." },
      { t: "Aquaplaning", b: "On standing water the tyres can ride up on a water film, losing braking and steering. Dynamic aquaplaning onset speed ≈ 9 × √(tyre pressure in psi). Above it, braking is largely lost — a major wet-runway landing hazard, mitigated by grooved runways, good tyres and not landing fast/long." },
      { t: "Factors at the destination & alternate", b: "Landing performance is assessed for the planned landing mass at destination and alternates, using forecast conditions. A change in wind, a wet runway, or a higher landing mass (e.g. an overweight diversion) can make a runway that was adequate become limiting — re-check whenever conditions change." },
    ],
    quiz: [
      { q: "Vref is typically about:", o: ["1.23 × the landing-configuration stall speed", "1.0 × the stall speed", "2.0 × the stall speed", "Equal to V2"], a: 0, e: "Reference landing speed ≈ 1.23 Vs0/Vsr; it rises with mass and adds a wind/gust margin." },
      { q: "For a Class A turbojet, the landing distance must fit within what fraction of the LDA on a dry runway?", o: ["60%", "100%", "70%", "85%"], a: 0, e: "Dry dispatch: demonstrated landing distance ≤ 60% of LDA (÷ 0.6) for turbojets; 70% for turboprops." },
      { q: "On a wet runway the required landing distance is typically increased by a further:", o: ["15%", "60%", "5%", "0%"], a: 0, e: "Commonly +15% on the dry factored distance unless approved wet data shows otherwise." },
      { q: "Dynamic aquaplaning onset speed is approximately:", o: ["9 × √(tyre pressure in psi)", "Tyre pressure ÷ 9", "Equal to Vref", "9 × tyre pressure"], a: 0, e: "≈ 9√P (psi) — above it the tyre rides on water with little braking or steering." },
      { q: "The Class A landing distance is measured from a screen height of:", o: ["50 ft", "35 ft", "15 ft", "100 ft"], a: 0, e: "Landing distance is from 50 ft over the threshold to a full stop (take-off screen is 35 ft dry)." },
      { q: "Landing distance required increases with:", o: ["Higher mass, density altitude, tailwind and a wet surface", "Lower mass and a headwind", "Cooler temperature only", "Upslope only"], a: 0, e: "All of mass, density altitude, tailwind, downslope and reduced braking lengthen the landing." },
    ],
  },
  {
    id: "classb",
    code: "032·05",
    title: "Class B & Practical Application",
    blurb: "Light-aircraft performance, factors, charts, and putting it together.",
    cards: [
      { t: "Class B framework", b: "For small propeller aeroplanes (≤ 9 seats, ≤ 5700 kg), performance planning is simpler but still factored. Take-off and landing distances from the AFM are multiplied by SAFETY FACTORS, and basic climb gradients must be met. There's no V1/balanced-field machinery, but obstacle and field-length checks still apply." },
      { t: "Class B take-off & landing factors", b: "Typical factors (vary by reg/operation): take-off distance × 1.25; landing distance × 1.43 (i.e. ÷ 0.7) for public transport. Further multipliers apply for grass (e.g. ×1.15), slope, and wet conditions. The factored distance must fit the runway available — these stack multiplicatively." },
      { t: "Class B climb requirements", b: "Minimum climb gradients are specified for the take-off and the balked-landing/go-around cases (e.g. a minimum gradient at a defined configuration and speed). Multi-engine Class B aircraft also have an engine-out climb consideration, though it's less demanding than Class A's segment structure." },
      { t: "Reading performance charts", b: "Charts are entered with pressure altitude and temperature (often via a carpet/grid), then mass, then wind, then slope — following the chart's reference lines step by step in order. Read conservatively, interpolate carefully, and apply the regulatory factors AFTER the chart figure unless the chart already includes them." },
      { t: "Common chart pitfalls", b: "Mistakes that cost marks (and safety): using indicated instead of pressure altitude, forgetting the wind/slope corrections, applying the wind credit the wrong way, missing the surface or contamination factor, and forgetting to apply the dispatch safety factor at the end. Always sanity-check the final distance against the runway." },
      { t: "Putting it together", b: "A full check: compute the limiting take-off mass (lowest of field-length, climb, obstacle and structural limits); confirm en-route/driftdown capability; and confirm landing distance at destination and alternate for the forecast conditions. The most restrictive limit governs — performance is only adequate if EVERY check passes." },
    ],
    quiz: [
      { q: "Class B applies to:", o: ["Small propeller aeroplanes (≤ 9 seats, ≤ 5700 kg)", "Large jets", "Piston airliners", "All multi-engine turbines"], a: 0, e: "Simpler factored planning than Class A, but field-length, climb and obstacle checks still apply." },
      { q: "A typical Class B public-transport take-off distance factor is:", o: ["× 1.25", "× 0.6", "× 1.0", "× 2.0"], a: 0, e: "Take-off ×1.25; landing ×1.43 (÷0.7), with further factors for grass, slope and wet." },
      { q: "Performance charts should be entered using:", o: ["Pressure altitude and temperature", "Indicated altitude on QNH", "True altitude", "Density only, ignoring temperature"], a: 0, e: "Pressure altitude + temperature give density altitude; then apply mass, wind and slope in order." },
      { q: "The limiting take-off mass is:", o: ["The lowest of field, climb, obstacle and structural limits", "Always the structural MTOM", "The highest of all limits", "Set by fuel only"], a: 0, e: "Every limit must be met; the most restrictive governs the allowed take-off mass." },
      { q: "A common chart error is to:", o: ["Use indicated instead of pressure altitude", "Use pressure altitude", "Apply the correct wind credit", "Interpolate carefully"], a: 0, e: "Wrong altitude input, mis-applied wind/slope, or forgetting the dispatch factor all corrupt the result." },
      { q: "Performance for a flight is adequate only when:", o: ["Every required check passes", "The take-off check passes", "The landing check passes", "Just the climb check passes"], a: 0, e: "Take-off, climb, obstacle, en-route/driftdown and landing must ALL be satisfied — the most restrictive wins." },
    ],
  },
  {
    id: "tomlimits",
    code: "032·02",
    title: "Take-off Mass Limits",

// ===================== CALC DRILL GENERATOR =====================
function rnd(min, max, step = 1) {
  const n = Math.floor(Math.random() * ((max - min) / step + 1));
  return min + n * step;
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function opts(correct, distractors, unit) {
  const set = [correct, ...distractors.filter((d, i, a) => d !== correct && a.indexOf(d) === i).slice(0, 3)];
  const shuffled = shuffle(set);
  return { options: shuffled.map((v) => `${v}${unit}`), answer: shuffled.indexOf(correct) };
}
function genDrill() {
  const type = rnd(0, 5);
  if (type === 0) {
    const fl = rnd(4, 35) * 10;
    const ans = 15 - 2 * (fl / 10);
    const { options, answer } = opts(ans, [ans + 5, ans - 5, ans + 10, -ans], "\u00b0C");
    return { q: `What is the ISA temperature at FL${fl}?`, options, answer, e: `ISA = 15 \u2212 (2 \u00d7 ${fl / 10}) = ${ans}\u00b0C.` };
  }
  if (type === 1) {
    const fl = rnd(8, 35) * 10;
    const isa = 15 - 2 * (fl / 10);
    const dev = rnd(-12, 12, 2);
    const oat = isa + dev;
    const { options, answer } = opts(dev, [dev + 5, dev - 5, -dev, dev + 10], "");
    return { q: `OAT at FL${fl} is ${oat}\u00b0C. What is the ISA deviation?`, options, answer, e: `ISA at FL${fl} = ${isa}\u00b0C. Deviation = ${oat} \u2212 (${isa}) = ISA ${dev >= 0 ? "+" : ""}${dev}.` };
  }
  if (type === 2) {
    const pa = rnd(1, 8) * 1000;
    const isa = 15 - 2 * (pa / 1000);
    const dev = rnd(2, 16, 2);
    const oat = isa + dev;
    const ans = pa + 120 * dev;
    const { options, answer } = opts(ans, [pa + 120 * (dev - 5), pa + 60 * dev, pa - 120 * dev], " ft");
    return { q: `Pressure altitude ${pa} ft, OAT ${oat > 0 ? "+" : ""}${oat}\u00b0C. Density altitude is approximately:`, options, answer, e: `ISA at ${pa} ft = ${isa}\u00b0C \u2192 deviation +${dev}. DA \u2248 ${pa} + (120 \u00d7 ${dev}) = ${ans} ft.` };
  }
  if (type === 3) {
    const spread = rnd(3, 12);
    const ans = 400 * spread;
    const t = rnd(14, 26);
    const { options, answer } = opts(ans, [ans + 800, ans - 800, 100 * spread], " ft");
    return { q: `Surface temperature +${t}\u00b0C, dew point +${t - spread}\u00b0C. Estimated cumulus cloud base:`, options, answer, e: `Base \u2248 400 \u00d7 spread = 400 \u00d7 ${spread} = ${ans} ft AGL.` };
  }
  if (type === 4) {
    const alt = rnd(4, 14) * 1000;
    const dev = rnd(-3, 3, 1) * 10 || 10;
    const ans = Math.round(alt * (1 + 0.04 * (dev / 10)));
    const { options, answer } = opts(ans, [Math.round(alt * (1 - 0.04 * (dev / 10))), alt, ans + 400], " ft");
    return { q: `Indicated altitude ${alt} ft on correct QNH, temperature ISA ${dev > 0 ? "+" : ""}${dev}. Approximate TRUE altitude (4% rule):`, options, answer, e: `4% per 10\u00b0C: ${alt} \u00d7 (1 ${dev > 0 ? "+" : "\u2212"} ${Math.abs(dev) * 0.4}%) \u2248 ${ans} ft. ${dev < 0 ? "Colder \u2192 true altitude LOWER." : "Warmer \u2192 true altitude HIGHER."}` };
  }
  const qnh = rnd(983, 1008);
  const fl = rnd(4, 8) * 10;
  const diff = 1013 - qnh;
  const ans = fl * 100 - diff * 27;
  const { options, answer } = opts(ans, [fl * 100 + diff * 27, fl * 100, ans + 270], " ft");
  return { q: `Flying at FL${fl} (1013 set). QNH is ${qnh} hPa. Approximate altitude AMSL:`, options, answer, e: `1013 \u2212 ${qnh} = ${diff} hPa \u00d7 27 ft = ${diff * 27} ft. QNH is lower, so you are LOWER: ${fl * 100} \u2212 ${diff * 27} = ${ans} ft.` };
}

function speak(text, onEnd) {
  try {
    const s = window.speechSynthesis; if (!s) return false;
    s.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1; u.onend = onEnd; s.speak(u); return true;
  } catch (e) { return false; }
}
function stopSpeak() { try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {} }
