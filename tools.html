ith warming/wind; haze is dry particles and needs a change of air mass or rain to clear."},{"t":"Fog, mist and haze thresholds","b":"FOG (FG): visibility below 1000 m, water droplets, high humidity. MIST (BR): 1000–5000 m with humidity ≥ ~95%. HAZE (HZ): dry particles reducing visibility, lower humidity. The humidity distinction separates mist (near-saturated) from haze (dry) at similar visibilities."},{"t":"Precipitation & blowing obscurations","b":"Heavy rain, drizzle and especially SNOW sharply reduce visibility; wet snow is worst. BLOWING snow/sand/dust (raised by strong wind to eye level) can reduce visibility to near zero. Smoke and industrial haze concentrate under inversions, often worst in winter anticyclones (anticyclonic gloom)."},{"t":"RVR measurement & slant range","b":"RVR is assessed by TRANSMISSOMETERS or FORWARD-SCATTER sensors near the runway, or by counting lights. On approach the pilot's SLANT visual range to the runway can differ from the reported (horizontal) RVR — shallow fog can give good RVR yet a poor slant view, and vice versa."},{"t":"Diurnal & practical factors","b":"Visibility is often worst around dawn (radiation fog, peak humidity) and can improve as the sun lifts the fog. Looking into a low sun, into precipitation, or over water can all reduce perceived visibility. Always plan for the forecast trend, not just the current value."}],"quiz":[{"q":"Fog is reported when visibility falls below:","o":["1000 m","5000 m","1500 m","3000 m"],"a":0,"e":"FG below 1000 m; 1000–5000 m with high humidity is mist (BR)."},{"q":"Haze (HZ) is caused by:","o":["Dry particles (lithometeors)","Water droplets","Supercooled rain","Melting snow"],"a":0,"e":"Haze is dry particulate (dust, smoke); it needs an air-mass change or rain to clear, unlike water fog."},{"q":"The distinction between mist and haze at similar visibility is mainly:","o":["Humidity (mist is near-saturated, haze is dry)","Temperature","Wind speed","Pressure"],"a":0,"e":"Mist (BR) occurs at high humidity (~95%+); haze (HZ) is the dry-particle equivalent."},{"q":"RVR is typically measured by:","o":["Transmissometers or forward-scatter sensors near the runway","Radiosondes","Satellite imagery","The altimeter"],"a":0,"e":"Instruments beside the runway (or light-counting) give RVR when visibility is low."},{"q":"Reported (horizontal) RVR may differ from the pilot's slant view because:","o":["Shallow fog can give good RVR but a poor slant range","RVR is always lower than slant range","Slant range ignores fog","They are identical by definition"],"a":0,"e":"Fog depth and the approach geometry make slant visual range differ from horizontal RVR."},{"q":"Visibility from blowing snow or sand can be reduced because the particles are:","o":["Raised to eye level by strong wind","Always falling as precipitation","Confined above an inversion","Only present at night"],"a":0,"e":"Wind lifts surface particles into the line of sight, sometimes to near-zero visibility."}]},{"id":"satradar","title":"Satellite & Radar Basics","cards":[{"t":"Weather radar — what it detects","b":"Radar transmits pulses and times the echoes from PRECIPITATION-sized water particles — it shows rain, wet hail and heavy showers, NOT cloud itself or clear-air turbulence. Returns indicate intensity, so radar maps the wet cores of storms to be avoided."},{"t":"Radar limitations","b":"Radar does NOT see turbulence, icing or dry hail directly, and the beam can be ATTENUATED — a near, heavy cell can hide ('shadow') a worse cell behind it. Dry snow and small droplets give weak returns. Tilt management and interpreting the strongest gradients (tight intensity changes) are key skills."},{"t":"Satellite — visible imagery","b":"VISIBLE imagery shows reflected sunlight: thick cloud and snow appear bright, the surface dark. It gives excellent cloud-structure detail but only works in DAYLIGHT and can't easily separate high thin cloud from low cloud by brightness alone."},{"t":"Satellite — infrared imagery","b":"INFRARED (IR) imagery senses temperature, so it works DAY AND NIGHT. Cold surfaces appear bright/white, warm surfaces dark — so high, cold cloud tops (CB) show up bright white. IR is the workhorse for spotting deep convection and tracking systems around the clock."},{"t":"Water-vapour imagery","b":"WATER-VAPOUR channels show moisture in the mid/upper troposphere even where there is no cloud — useful for locating jet streams, dry slots and developing systems. Together, visible + IR + water vapour let forecasters build a 3-D picture of the atmosphere."},{"t":"Using imagery operationally","b":"Satellite shows the big picture (fronts, storm systems, fog banks, convection); airborne/ground radar gives the close-in precipitation detail for tactical avoidance. Neither directly shows turbulence — both are interpreted alongside SIGWX charts and SIGMETs, not in isolation."}],"quiz":[{"q":"Weather radar primarily detects:","o":["Precipitation-sized water particles","Cloud droplets and clear-air turbulence","Temperature of cloud tops","Wind direction"],"a":0,"e":"It echoes off rain and wet hail — it does not show cloud itself, turbulence or icing directly."},{"q":"On infrared satellite imagery, high cold cloud tops appear:","o":["Bright white","Dark","Invisible","Red"],"a":0,"e":"IR maps temperature; cold (high) tops show bright white, which is why CB stand out day and night."},{"q":"Visible satellite imagery has the limitation that it:","o":["Only works in daylight","Cannot show thick cloud","Works only at night","Detects turbulence"],"a":0,"e":"Visible imagery relies on reflected sunlight, so it is unavailable at night (unlike IR)."},{"q":"Radar 'attenuation' or shadowing means:","o":["A near heavy cell can hide a worse cell behind it","The radar over-reads turbulence","Dry hail shows strongly","The image is always brightest far away"],"a":0,"e":"The beam is absorbed by the first heavy cell, leaving a radar shadow that can conceal worse weather."},{"q":"Water-vapour satellite imagery is especially useful for:","o":["Locating jet streams and dry slots in cloud-free air","Measuring runway RVR","Detecting hail size","Reading surface pressure"],"a":0,"e":"It reveals mid/upper-level moisture even without cloud, helping identify jets and developing systems."},{"q":"Neither satellite nor radar directly shows:","o":["Turbulence","Precipitation","Cloud-top temperature","Cloud structure"],"a":0,"e":"Turbulence is inferred, not imaged — both are read alongside SIGWX charts and SIGMETs."}]}]},{"id":"hp","key":"atpl-hpl-v1","title":"Human Performance","code":"040","modules":[{"id":"gaslaws","title":"The Atmosphere & Gas Laws","cards":[{"t":"Oxygen and altitude","b":"The PERCENTAGE of oxygen in the atmosphere stays ~21% at all flight altitudes — what falls is the PARTIAL PRESSURE of oxygen as total pressure drops. The body cares about partial pressure, not percentage: that's why you can breathe 21% oxygen at 35,000 ft and still be unconscious in a minute."},{"t":"Boyle's law — expanding gas","b":"Gas volume is inversely proportional to pressure: as you climb, trapped gases EXPAND. This explains ear, sinus and tooth pain, gut distension, and why barotrauma happens. Gas roughly doubles in volume by 18,000 ft."},{"t":"Dalton's law — partial pressures","b":"Total pressure is the sum of the partial pressures of each gas. As altitude increases, the partial pressure of oxygen falls in proportion — the direct cause of HYPOXIC hypoxia. At sea level alveolar oxygen is comfortable; by 10,000 ft saturation starts to slide."},{"t":"Henry's law — dissolved gas","b":"The amount of gas dissolved in a liquid is proportional to the pressure above it. Reduce the pressure (climb) and dissolved NITROGEN comes out of solution as bubbles — the mechanism of DECOMPRESSION SICKNESS. Think of opening a fizzy drink."},{"t":"How breathing is controlled","b":"The respiratory centre is driven primarily by CARBON DIOXIDE levels in the blood, not by oxygen. This is why hypoxia is so insidious — low oxygen does not make you feel breathless. CO2 rises → you breathe faster; CO2 falls → the drive to breathe weakens."},{"t":"Oxygen transport","b":"Oxygen binds to haemoglobin in red blood cells. The oxygen dissociation curve is S-shaped: saturation stays near 97–98% up to about 10,000 ft, then falls away steeply — around 87–90% at 10,000 ft and roughly 65–70% by 20,000 ft. The curve's plateau is why symptoms are mild low down and sudden higher up."}],"quiz":[{"q":"With increasing altitude, the proportion of oxygen in the air:","o":["Stays at about 21% — but its partial pressure falls","Falls to about 10% by FL350","Increases slightly","Falls in direct proportion to temperature"],"a":0,"e":"Composition is constant; it's the falling PARTIAL PRESSURE of O2 (Dalton's law) that causes hypoxia."},{"q":"Trapped gas pain in the ears, sinuses or gut during climb is explained by:","o":["Boyle's law","Henry's law","Charles's law","Bernoulli's principle"],"a":0,"e":"Boyle: volume inversely proportional to pressure — trapped gas expands as cabin pressure falls."},{"q":"Decompression sickness is explained by:","o":["Henry's law — dissolved nitrogen forming bubbles as pressure falls","Dalton's law — oxygen partial pressure","Boyle's law — lung expansion","Osmosis"],"a":0,"e":"Henry's law: less pressure means less gas held in solution, so nitrogen bubbles out of tissues and blood."},{"q":"The breathing rate is normally controlled by the level of:","o":["Carbon dioxide in the blood","Oxygen in the blood","Nitrogen in the tissues","Haemoglobin"],"a":0,"e":"CO2 is the primary stimulus. Low oxygen barely registers — which is exactly why hypoxia creeps up without breathlessness."},{"q":"Approximate haemoglobin oxygen saturation at 10,000 ft is:","o":["About 87–90%","About 100%","About 60%","About 40%"],"a":0,"e":"The S-shaped dissociation curve holds saturation high to ~10,000 ft, then drops steeply — the basis of the 10,000 ft oxygen rules."},{"q":"By approximately what altitude has trapped gas doubled in volume?","o":["18,000 ft","5,000 ft","34,000 ft","50,000 ft"],"a":0,"e":"Pressure roughly halves by 18,000 ft, so trapped gas roughly doubles (Boyle's law)."}]},{"id":"hypoxia","title":"Hypoxia & Hyperventilation","cards":[{"t":"The four types of hypoxia","b":"HYPOXIC: low oxygen partial pressure (altitude) — the aviation classic. ANAEMIC: reduced carrying capacity (blood loss, anaemia, CO poisoning). STAGNANT: poor circulation (G-loading, cold, shock). HISTOTOXIC: tissues can't use oxygen (alcohol, cyanide, drugs)."},{"t":"Symptoms of hypoxia","b":"Insidious onset: euphoria and overconfidence, impaired judgement, slowed reactions, blue lips/fingertips (cyanosis), tingling, deteriorating vision — NIGHT vision suffers first, degrading from as low as about 5000 ft. The danger: the victim usually feels fine. Personality and symptoms vary between people but are fairly consistent for one individual."},{"t":"Time of useful consciousness","b":"TUC = time from oxygen loss to inability to act purposefully. Memorise: FL180 ~20–30 min · FL250 ~3–5 min · FL300 ~1–2 min · FL350 ~30–60 sec · FL400 ~15–20 sec. RAPID decompression roughly HALVES these times (lungs vent oxygen outward). Exercise also shortens TUC."},{"t":"Actions on hypoxia","b":"Oxygen mask on 100%, check connections, descend below 10,000 ft, declare an emergency. Crew oxygen rules: flight crew use masks above cabin altitudes of 10,000 ft; quick-donning masks must go on within 5 seconds with one hand."},{"t":"Hyperventilation","b":"Over-breathing (usually from anxiety or stress) blows off too much CO2, raising blood pH (respiratory alkalosis). Symptoms: dizziness, tingling in fingers and lips, visual disturbance, muscle spasm (tetany), eventually fainting — which ironically self-corrects the breathing."},{"t":"Hypoxia vs hyperventilation","b":"The symptoms overlap heavily (tingling, dizziness, poor performance). The exam answer: at altitude, ASSUME HYPOXIA — go on oxygen and descend; that treats both. Hyperventilation is managed by consciously slowing the breathing rate (talking, counted breathing). Cyanosis suggests hypoxia; tetany/spasm suggests hyperventilation."}],"quiz":[{"q":"Carbon monoxide poisoning produces which type of hypoxia?","o":["Anaemic","Hypoxic","Stagnant","Histotoxic"],"a":0,"e":"CO binds to haemoglobin far more readily than oxygen, slashing carrying capacity — anaemic hypoxia."},{"q":"The time of useful consciousness at FL350 after a slow decompression is approximately:","o":["30–60 seconds","5–10 minutes","12 seconds","3–5 minutes"],"a":0,"e":"FL350 ≈ 30–60 s. Rapid decompression would roughly halve it. FL250 = 3–5 min, FL400 = 15–20 s."},{"q":"A rapid decompression compared with a slow one:","o":["Roughly halves the TUC","Doubles the TUC","Does not change TUC","Eliminates hypoxia risk"],"a":0,"e":"Air (and its oxygen) is sucked OUT of the lungs in a rapid decompression, so useful consciousness time is about halved."},{"q":"Hyperventilation results in:","o":["Reduced CO2 and increased blood pH (alkalosis)","Increased CO2 and reduced pH","Reduced oxygen percentage in the lungs","Increased nitrogen absorption"],"a":0,"e":"Washing out CO2 makes the blood more alkaline — causing tingling, dizziness and eventually tetany or fainting."},{"q":"Unsure whether a colleague at altitude is hypoxic or hyperventilating, you should:","o":["Treat for hypoxia: 100% oxygen and descend","Tell them to breathe faster","Wait for cyanosis to confirm","Give them coffee"],"a":0,"e":"Oxygen and descent cure hypoxia and do no harm in hyperventilation — then slow the breathing rate. Always assume hypoxia first at altitude."},{"q":"The first sense degraded by mild hypoxia, from as low as ~5000 ft, is:","o":["Night vision","Hearing","Touch","Smell"],"a":0,"e":"The retina's rods are extremely oxygen-hungry — night vision degrades at cabin altitudes well below where other symptoms appear."}]},{"id":"decompression","title":"Pressurisation, DCS & Diving","cards":[{"t":"The pressurised cabin","b":"Typical cruise cabin altitude is 6000–8000 ft — a compromise between comfort/physiology and structural fatigue. Maximum certified cabin altitude is normally 8000 ft. Passengers with heart/lung disease, anaemia or recent surgery can still be affected at these levels."},{"t":"Decompression sickness (DCS)","b":"Nitrogen bubbles forming in tissues and blood (Henry's law), generally a risk above 18,000 ft and increasingly above 25,000 ft. Forms: the BENDS (joint pain — most common), the CREEPS (skin tingling/itching), the CHOKES (chest pain, breathing difficulty — serious), STAGGERS/neurological (CNS — most serious)."},{"t":"Managing DCS","b":"Descend immediately, 100% oxygen, land as soon as possible, keep the victim still and warm. Severe cases need hyperbaric (recompression) treatment. Symptoms can appear or worsen AFTER landing — medical follow-up is mandatory."},{"t":"Flying after diving","b":"Diving loads the body with dissolved nitrogen, so flying afterwards multiplies DCS risk. Rules of thumb examined: wait at least 12 hours after a no-decompression-stop dive, and 24–48 hours after a dive REQUIRING decompression stops, before flying (including in a pressurised cabin at typical cabin altitudes)."},{"t":"Rapid decompression — recognition","b":"Bang, fog/mist in the cabin (cooling air condenses), rushing noise, debris, temperature drop, items flying towards the hole. Immediate actions: oxygen masks on (crew first — you're no use unconscious), establish communication, emergency descent to 10,000 ft or MSA."},{"t":"Ears, sinuses & barotrauma","b":"Pressure equalises through the eustachian tube, which works easily on CLIMB but poorly on DESCENT — middle-ear barotrauma (otic barotrauma) is therefore a descent problem, made worse by colds. Clear ears with swallowing, jaw movement or the Valsalva manoeuvre. Don't fly with a heavy cold."}],"quiz":[{"q":"Typical maximum cabin altitude in a pressurised transport aircraft is:","o":["8000 ft","12,000 ft","2000 ft","Sea level"],"a":0,"e":"Cabins cruise at 6000–8000 ft — high enough to limit structural stress, low enough for passenger physiology."},{"q":"Joint pain caused by nitrogen bubbles after decompression is called:","o":["The bends","The chokes","The creeps","The staggers"],"a":0,"e":"Bends = joints (most common). Creeps = skin. Chokes = chest/breathing. Staggers = neurological (most serious)."},{"q":"After a dive requiring decompression stops, you should not fly for at least:","o":["24–48 hours","2 hours","8 hours","7 days"],"a":0,"e":"24–48 hours after decompression-stop dives; at least 12 hours after no-stop dives. Tissue nitrogen needs time to wash out."},{"q":"Mist or fog filling the cabin immediately after a loud bang indicates:","o":["Rapid decompression — moisture condensing in cooling air","An electrical fire","Engine smoke","De-icing fluid leak"],"a":0,"e":"Sudden expansion cools the cabin air below its dew point — fog plus noise and pressure change = rapid decompression. Masks on first."},{"q":"Ear (otic) barotrauma is most likely during:","o":["Descent","Climb","Level cruise","Taxi"],"a":0,"e":"The eustachian tube vents expanding air easily on climb but resists inflow on descent — pain, dulled hearing, possible eardrum damage, far worse with a cold."},{"q":"Decompression sickness generally becomes a significant risk above:","o":["18,000 ft","8000 ft","5000 ft","40,000 ft only"],"a":0,"e":"Risk starts around 18,000 ft and rises sharply above 25,000 ft — and is dramatically increased by recent diving."}]},{"id":"circulation","title":"Heart, Circulation & G-Forces","cards":[{"t":"The circulatory system","b":"The heart is a double pump: the RIGHT side sends deoxygenated blood to the lungs (pulmonary circulation); the LEFT side pumps oxygenated blood around the body (systemic circulation). Typical resting heart rate 60–80 bpm; blood is about 8% of body weight; red cells live ~120 days."},{"t":"Blood pressure","b":"Reported as systolic/diastolic — pressure during contraction over pressure during relaxation; a healthy norm is around 120/80 mmHg. Sustained hypertension (high BP) damages heart, vessels, kidneys and eyes, and is a major flag at medicals. Risk factors: smoking, obesity, stress, salt, family history."},{"t":"Coronary risk factors","b":"Coronary heart disease is a leading cause of licence loss. Controllable factors: smoking, diet/cholesterol, obesity, lack of exercise, stress, hypertension. Uncontrollable: age, sex, family history. The examiner wants you to know smoking is the single biggest controllable factor."},{"t":"Positive G (+Gz)","b":"Blood is forced towards the feet. Sequence with increasing +Gz: GREY-OUT (peripheral vision loss, ~3.5g), BLACKOUT (total vision loss, ~4.5g — still conscious!), then G-LOC (g-induced loss of consciousness, ~4.5–6g). Tolerance is improved by anti-G straining, anti-G suits, and being reclined; reduced by hypoxia, hypoglycaemia, hyperventilation and fatigue."},{"t":"Negative G and rapid onset","b":"Negative G (−Gz) pushes blood towards the head: red-out, facial congestion — tolerated far worse (around −2 to −3g limit). Rapid G onset can cause G-LOC with NO grey-out warning, because the visual symptoms need a few seconds to develop."},{"t":"Donating blood & flying","b":"Blood donation temporarily reduces oxygen-carrying capacity. Guidance examined: crew should not fly for at least 24 hours after donating blood (and should avoid donating during periods of flying duty)."}],"quiz":[{"q":"The right side of the heart pumps:","o":["Deoxygenated blood to the lungs","Oxygenated blood to the body","Oxygenated blood to the lungs","Blood directly to the brain"],"a":0,"e":"Right side → pulmonary circulation (to lungs); left side → systemic circulation (to body)."},{"q":"With steadily increasing +Gz, the order of symptoms is:","o":["Grey-out, blackout, G-LOC","Blackout, grey-out, red-out","G-LOC, grey-out, blackout","Red-out, blackout, G-LOC"],"a":0,"e":"Peripheral vision goes first (~3.5g), then all vision (~4.5g, still conscious), then unconsciousness. Rapid onset can skip the warnings."},{"q":"During blackout under +Gz, the pilot is:","o":["Still conscious but without vision","Unconscious","Asleep","Hyperventilating"],"a":0,"e":"Blackout is loss of VISION only — the retina's blood supply fails before the brain's. G-LOC is the loss of consciousness."},{"q":"Negative G primarily causes:","o":["Red-out and facial congestion","Grey-out","Tunnel vision","Improved G tolerance"],"a":0,"e":"Blood driven headwards engorges facial and eye vessels — tolerated much worse than positive G (about −2 to −3g)."},{"q":"The most significant controllable risk factor for coronary heart disease is:","o":["Smoking","Age","Family history","Sex"],"a":0,"e":"Age, sex and family history can't be changed; among the controllable factors, smoking tops the list."},{"q":"After donating blood, a crew member should not fly for at least:","o":["24 hours","1 hour","7 days","30 days"],"a":0,"e":"Reduced oxygen-carrying capacity needs time to recover — at least 24 hours, and avoid donating during flying periods."}]},{"id":"vision","title":"Vision & Visual Illusions","cards":[{"t":"The eye — key anatomy","b":"Light passes through the cornea (most of the focusing power), the iris/pupil (light control), and the lens (fine focus/accommodation) onto the retina. The FOVEA contains only CONES: colour and fine detail, daylight, central vision. RODS dominate the periphery: monochrome, motion-sensitive, night vision. The optic nerve exit has no receptors — the blind spot."},{"t":"Night vision","b":"Rods take about 30 MINUTES to fully dark-adapt (cones ~7 minutes) and are destroyed in seconds by bright light. The fovea is rod-free, so at night look 10–15° OFF-CENTRE to put images on the rods. Night vision degrades with hypoxia from ~5000 ft and with smoking (CO)."},{"t":"Visual scanning & mid-air avoidance","b":"The eye only resolves detail at the fovea, so effective lookout uses short fixations in successive sectors (about 10° at a time, ~1–2 seconds each), not sweeping. An aircraft on a constant relative bearing (collision course) has NO relative movement — exactly what peripheral vision is worst at detecting."},{"t":"Empty field myopia & defects","b":"With nothing to focus on (haze, IMC, dark), the eye relaxes to ~1–2 m focus — empty field myopia — making distant traffic hard to detect: focus deliberately on a distant object or wingtip. Defects: myopia (short sight), hypermetropia (long sight), presbyopia (age-related near-focus loss), astigmatism (uneven cornea), glaucoma (raised eye pressure, peripheral field loss)."},{"t":"Runway illusions — width & slope","b":"A NARROWER-than-usual runway or an UPSLOPING runway makes you feel TOO HIGH → you fly a dangerously LOW approach. A wider runway or downslope does the reverse (feel low → fly high). Upslope terrain before the runway adds to the effect. The defence: fly the glideslope/PAPIs, not the picture."},{"t":"Black hole, rain & haze","b":"Black-hole approach: featureless dark terrain before bright runway lights at night → strong tendency to fly LOW. Rain on the windscreen: refraction makes lights appear lower/closer and dims them. Haze: objects appear FURTHER away than they are. Shallow fog on the runway can cause an illusion of pitching up just before touchdown. Trust the instruments and approach aids."}],"quiz":[{"q":"Fine detail and colour are detected by:","o":["Cones, concentrated at the fovea","Rods, concentrated at the fovea","Rods in the periphery","The optic disc"],"a":0,"e":"Cones = colour/detail/day, packed into the fovea. Rods = night/motion/periphery."},{"q":"Full dark adaptation of the rods takes approximately:","o":["30 minutes","7 minutes","2 minutes","2 hours"],"a":0,"e":"Rods need ~30 min (cones ~7 min) — and a flash of bright light undoes it in seconds."},{"q":"To see a dim object at night you should look:","o":["10–15° off-centre","Directly at it","Through the corner of one eye only","After breathing rapidly"],"a":0,"e":"The fovea has no rods, so direct gaze at night sees nothing — offset viewing puts the image on rod-rich retina."},{"q":"An aircraft on a constant relative bearing is dangerous because it:","o":["Has no apparent movement, making it hard to detect","Moves too fast across the canopy","Is always behind you","Appears larger than it is"],"a":0,"e":"No relative motion = collision course, and stationary objects are what peripheral vision detects worst — hence systematic sector scanning."},{"q":"Approaching a runway that is narrower than usual, the untrained tendency is to:","o":["Feel too high and fly a low approach","Feel too low and fly a high approach","Land long","Flare too high"],"a":0,"e":"Narrow runway (or upslope) → illusion of being high → dangerously low approach. Wide/downslope is the reverse."},{"q":"A black-hole approach at night typically results in:","o":["An approach flown too low","An approach flown too high","Perfect glidepath control","Landing on the wrong runway"],"a":0,"e":"With no ground features for reference, pilots consistently underestimate height and drag in low — use the glideslope/PAPIs."}]},{"id":"vestibular","title":"Balance, Hearing & Disorientation","cards":[{"t":"The vestibular system","b":"Three SEMICIRCULAR CANALS (one per plane) detect ANGULAR acceleration via fluid moving against sensory hairs. The OTOLITH organs detect LINEAR acceleration and gravity. Both only sense CHANGES — in a prolonged constant-rate turn the fluid catches up and the sensation of turning disappears."},{"t":"The leans","b":"The most common illusion. A slow roll below the detection threshold (~2°/sec) goes unnoticed; the correction back to level IS felt — so straight-and-level now feels like a bank, and the pilot leans or rolls back towards the original error. Cure: believe the attitude indicator."},{"t":"Somatogravic illusion","b":"The otoliths cannot distinguish linear acceleration from tilt. Rapid ACCELERATION (e.g. night/IMC takeoff or go-around) feels like PITCHING UP — the pilot pushes the nose down, potentially into the ground. Deceleration gives the reverse (pitch-down sensation). A killer illusion: trust the ADI on dark takeoffs."},{"t":"Somatogyral & the graveyard spiral","b":"In a prolonged turn the canals stop signalling. Rolling out then feels like a turn in the OPPOSITE direction, so the pilot re-enters the original turn; with attention inside, the descending, tightening turn becomes a graveyard spiral — pulling back only tightens it. Recover with instruments: level the wings FIRST."},{"t":"Coriolis illusion & vertigo","b":"Moving the head sharply during a turn cross-couples the canals: an overwhelming tumbling sensation (Coriolis illusion). Keep head movements slow and minimal during manoeuvring in IMC. Pressure vertigo (alternobaric) can occur with unequal middle-ear venting during climb/descent. Flicker from rotor blades or strobes can also disorient."},{"t":"Hearing & noise","b":"Outer ear → eardrum → ossicles (middle ear) → cochlea (inner ear) converts pressure waves to nerve signals. Damage: CONDUCTIVE loss (mechanical — wax, eardrum, ossicles) vs SENSORINEURAL loss (cochlea/nerve — noise-induced and age-related presbycusis, permanent). Prolonged exposure above ~85–90 dB risks noise-induced hearing loss; use hearing protection."}],"quiz":[{"q":"The semicircular canals detect:","o":["Angular accelerations","Linear accelerations only","Gravity only","Sound"],"a":0,"e":"Three orthogonal canals sense rotation; the otoliths handle linear acceleration and gravity."},{"q":"In a prolonged, constant-rate turn, the sensation of turning:","o":["Disappears as the canal fluid catches up","Increases steadily","Reverses every few seconds","Is replaced by a climbing sensation"],"a":0,"e":"Canals detect only CHANGES in rotation — after ~20–30 seconds of constant rate, the turning sensation fades. Rolling out then feels like an opposite turn."},{"q":"Rapid forward acceleration in IMC or at night produces an illusion of:","o":["Pitching up","Pitching down","Rolling left","Yawing right"],"a":0,"e":"The somatogravic illusion: otoliths read acceleration as backward tilt — pilots respond by pushing the nose down. Fly the ADI on dark takeoffs and go-arounds."},{"q":"The most common form of spatial disorientation is:","o":["The leans","The Coriolis illusion","The graveyard spiral","Red-out"],"a":0,"e":"A sub-threshold roll followed by a detected correction leaves a false sensation of bank — the leans."},{"q":"A sudden head movement during a prolonged turn in IMC may cause:","o":["The Coriolis illusion — a tumbling sensation","Improved orientation","The somatogravic illusion","Empty field myopia"],"a":0,"e":"Cross-coupling of the canals produces violent tumbling vertigo — keep head movements slow and small when manoeuvring in IMC."},{"q":"Noise-induced hearing loss is:","o":["Sensorineural and permanent","Conductive and reversible","Only temporary","Caused by the eustachian tube"],"a":0,"e":"Hair cells in the cochlea are destroyed and do not regenerate — permanent sensorineural loss, hence hearing protection above ~85–90 dB."}]},{"id":"health","title":"Fitness, Toxins & Incapacitation","cards":[{"t":"Alcohol","b":"EASA blood alcohol limit for crew: 0.2 g/L (0.02%) — effectively zero. The body eliminates alcohol at a FIXED rate of roughly one unit per hour; nothing (coffee, food, exercise) speeds it up. 'Bottle to throttle' minimums (commonly 8–12 hours) do NOT guarantee zero blood alcohol after heavy drinking, and hangover effects impair performance even at zero BAC. Alcohol also disturbs the inner ear and sleep quality."},{"t":"Medication & drugs","b":"Self-medication is the hazard: antihistamines (drowsiness), sleeping tablets, strong painkillers and many cold remedies are incompatible with flying. Rule: if you need the medication, ask whether the underlying CONDITION is fit to fly — then check the drug with an AME. Caffeine in moderation is acceptable; nicotine raises CO levels."},{"t":"Carbon monoxide","b":"Colourless, odourless, tasteless — produced by incomplete combustion (exhaust/heater leaks, smoking). It binds to haemoglobin roughly 200–250 times more strongly than oxygen → anaemic hypoxia. Symptoms: headache, dizziness, deteriorating vision, confusion. Action: stop the source (cabin heat off), ventilate fully, 100% oxygen, land. Recovery is slow — hours, not minutes."},{"t":"Blood sugar & diet","b":"The brain runs on glucose. Missed meals on long duties cause HYPOGLYCAEMIA: weakness, shakiness, poor concentration, irritability, headache — a genuine performance hazard. Eat regular meals; avoid huge sugar hits that spike then crash. Dehydration similarly degrades concentration — drink water regularly at altitude (very dry cabin air)."},{"t":"Incapacitation","b":"The most COMMON cause in flight is gastrointestinal upset (food poisoning) — hence crews eating DIFFERENT meals. Subtle incapacitation (the pilot quietly stops functioning) is more dangerous than obvious collapse. Defence: the TWO-COMMUNICATION RULE — suspect incapacitation if a crew member fails to respond appropriately to two communications, or to any communication associated with a significant deviation."},{"t":"General fitness & medicals","b":"Exercise, weight control, not smoking, sensible alcohol and managing stress protect both health and licence. Crew must not fly when unfit: significant illness, injury, surgery, or when medication/condition is undeclared. When in doubt — consult the AME, and remember anaesthetics: typically 24–48 hours minimum before flying after a general or local anaesthetic, per medical advice."}],"quiz":[{"q":"The EASA blood alcohol limit for flight crew is:","o":["0.2 g/L","0.5 g/L","0.8 g/L","Zero is not specified"],"a":0,"e":"0.2 g/L (0.02%) — effectively zero, far stricter than driving limits. Hangover impairment exists even below the limit."},{"q":"The elimination rate of alcohol from the blood:","o":["Is fixed at roughly one unit per hour and cannot be accelerated","Doubles with strong coffee","Depends mainly on exercise","Is instant after a meal"],"a":0,"e":"Metabolism is constant; coffee, food, cold showers and exercise change nothing — only time works."},{"q":"Carbon monoxide is dangerous because it:","o":["Binds to haemoglobin ~200–250 times more readily than oxygen","Smells strongly, causing panic","Expands in the gut","Only affects passengers"],"a":0,"e":"CO is undetectable by the senses and monopolises haemoglobin — anaemic hypoxia with headache and confusion. Heater leaks are the classic source."},{"q":"The most common cause of in-flight pilot incapacitation is:","o":["Gastrointestinal upset","Heart attack","Stroke","Hypoxia"],"a":0,"e":"Acute gastro/food poisoning leads the statistics — the reason multi-crew members eat different meals."},{"q":"The two-communication rule states that incapacitation should be suspected when a pilot:","o":["Fails to respond appropriately to two verbal communications","Speaks twice on the wrong frequency","Asks for coffee twice","Misses two waypoints"],"a":0,"e":"No appropriate response to two communications — or to one linked with a significant flight deviation — triggers the take-over drill."},{"q":"Symptoms of hypoglycaemia from missed meals include:","o":["Weakness, shakiness and poor concentration","Improved alertness","Enhanced night vision","Slow heart rate only"],"a":0,"e":"The brain is glucose-dependent: low blood sugar means degraded thinking, irritability and weakness — eat regularly on duty."}]},{"id":"stress","title":"Stress, Arousal & Fatigue","cards":[{"t":"Stress basics","b":"Stress is the body's response to perceived DEMANDS exceeding perceived ABILITY to cope. Stressors can be physical (heat, noise, vibration), physiological (fatigue, hunger), or psychological/emotional (workload, life events). The response is the same regardless of source — and stress is CUMULATIVE: domestic stress arrives at work with you."},{"t":"The general adaptation syndrome","b":"Selye's GAS describes the response to sustained stress in three phases: ALARM (fight-or-flight — adrenaline, raised heart rate), RESISTANCE (the body copes, drawing on reserves), EXHAUSTION (reserves depleted — performance collapse, illness). Chronic stress drives people into the exhaustion phase."},{"t":"Arousal & performance","b":"The Yerkes-Dodson inverted-U: performance is poor at LOW arousal (boredom, complacency), best at MODERATE arousal, and poor again at HIGH arousal (panic, tunnelling). Complex tasks are best performed at lower arousal than simple tasks. Overarousal narrows attention — the classic cause of fixating on one instrument in an emergency."},{"t":"Coping with stress","b":"Strategies: remove the stressor (action coping), reframe how you think about it (cognitive coping), and manage the symptoms (relaxation techniques, exercise, sleep, talking). Defence mechanisms like denial don't solve anything. Airline answer: identify, then manage — and don't fly during major life crises."},{"t":"Fatigue","b":"ACUTE fatigue: short-term, from a long duty or poor night — cured by one good sleep. CHRONIC fatigue: accumulated over weeks of inadequate rest — needs extended recovery and is linked to stress and ill health. Symptoms mimic alcohol: slowed reactions, poor judgement, irritability, micro-sleeps, accepting lower standards."},{"t":"Managing fatigue","b":"Only SLEEP repays sleep debt — not caffeine, willpower or experience. Flight time limitation schemes exist precisely because individuals are poor judges of their own fatigue. Helpful: good sleep hygiene, strategic naps (kept short, ~20–40 min, or a full cycle, avoiding sleep inertia), caffeine used tactically, and honest fatigue reporting."}],"quiz":[{"q":"The three phases of the general adaptation syndrome are:","o":["Alarm, resistance, exhaustion","Stimulus, response, recovery","Arousal, overload, sleep","Denial, anger, acceptance"],"a":0,"e":"Selye's GAS: alarm (fight-or-flight), resistance (coping on reserves), exhaustion (reserves gone)."},{"q":"According to the Yerkes-Dodson relationship, performance is best at:","o":["Moderate arousal","Maximum arousal","Minimum arousal","Any arousal if trained"],"a":0,"e":"The inverted-U: both boredom and panic degrade performance; complex tasks favour the lower end of moderate."},{"q":"A typical effect of overarousal in an emergency is:","o":["Narrowing of attention onto one item","Broader, calmer scanning","Improved long-term memory","Reduced heart rate"],"a":0,"e":"High stress tunnels attention — fixation on a single instrument or problem while the bigger picture (like flying the aircraft) is lost."},{"q":"Chronic fatigue differs from acute fatigue in that it:","o":["Builds over weeks and is not cured by one night's sleep","Follows a single long duty","Is cured by caffeine","Only affects cabin crew"],"a":0,"e":"Acute fatigue clears with a good sleep; chronic fatigue from sustained inadequate rest needs prolonged recovery."},{"q":"Stress from domestic problems:","o":["Adds to occupational stress — stress is cumulative","Is irrelevant to flying performance","Improves concentration at work","Only matters for single pilots"],"a":0,"e":"The stress response is common to all stressors and they stack — a major life event degrades flight-deck performance."},{"q":"The only true remedy for sleep debt is:","o":["Sleep","Caffeine","Oxygen","Exercise"],"a":0,"e":"Stimulants mask fatigue briefly; only sleep repays the debt — the basis of flight time limitations."}]},{"id":"sleep","title":"Sleep & Circadian Rhythms","cards":[{"t":"Sleep architecture","b":"Sleep cycles last roughly 90 minutes, repeating 4–5 times a night. Stages 1–2: light sleep. Stages 3–4 (slow-wave/deep sleep): physical restoration, dominant EARLY in the night. REM ('paradoxical') sleep: dreaming, brain active, body paralysed — mental/memory restoration, dominant LATER in the night. Both types are needed."},{"t":"REM facts the exam loves","b":"In REM sleep the EEG resembles wakefulness (hence 'paradoxical'), eyes move rapidly, and muscle tone is suppressed. Alcohol before bed suppresses REM and fragments the second half of the night — you sleep, but badly. Sleeping tablets similarly distort sleep architecture."},{"t":"The body clock","b":"The internal circadian rhythm free-runs at about 25 hours when isolated from time cues, and is normally entrained to 24 hours by ZEITGEBERS — light (the strongest), social cues, meals. Body temperature follows the rhythm, reaching its minimum around 04:00–06:00, when performance is also at its worst."},{"t":"The WOCL","b":"The Window of Circadian Low — roughly 02:00–06:00 body time — is when alertness, performance and temperature bottom out, and when most fatigue-related errors and accidents cluster. FTL schemes specifically restrict duties that infringe the WOCL."},{"t":"Jet lag","b":"Crossing time zones desynchronises the body clock from local time: sleep disturbance, fatigue, GI upset, degraded performance. Adjustment takes roughly ONE DAY PER TIME ZONE crossed. EASTWARD travel is harder than westward, because shortening the day fights the body's natural drift towards a longer (≈25 h) cycle."},{"t":"Sleep credit & naps","b":"A working model: one hour of sleep buys roughly two hours of quality wakefulness, with credit capping out — you cannot stockpile unlimited sleep. Strategic napping genuinely helps, but waking from deep sleep causes SLEEP INERTIA (grogginess for up to ~15–30 min) — so keep naps short or time them to a full cycle, and never nap right before critical duties."}],"quiz":[{"q":"A complete sleep cycle lasts approximately:","o":["90 minutes","8 hours","20 minutes","4 hours"],"a":0,"e":"Cycles of ~90 min repeat through the night, with deep sleep early and REM-rich cycles later."},{"q":"REM sleep is associated mainly with:","o":["Mental restoration and dreaming, with an awake-like EEG","Physical restoration and slow brain waves","Sleepwalking","Maximum muscle tone"],"a":0,"e":"Paradoxical sleep: brain active, eyes moving, body paralysed — vital for memory and mental recovery."},{"q":"Isolated from all time cues, the human circadian rhythm runs at about:","o":["25 hours","24 hours exactly","12 hours","28 hours"],"a":0,"e":"The free-running rhythm is ~25 h, entrained daily to 24 h by zeitgebers — light being the most powerful."},{"q":"Body temperature and performance are lowest at around:","o":["04:00–06:00 body time","12:00–14:00","18:00–20:00","22:00–24:00"],"a":0,"e":"The circadian trough — the heart of the WOCL (02:00–06:00), where fatigue errors cluster."},{"q":"Adapting to a new time zone takes roughly:","o":["One day per time zone crossed","One hour per time zone","No time if you sleep on the plane","One week regardless of zones"],"a":0,"e":"About a day per zone, and eastward shifts are harder — compressing the day opposes the body's ~25 h drift."},{"q":"Sleep inertia is:","o":["Grogginess and degraded performance just after waking, worst from deep sleep","The inability to fall asleep","Excessive REM","A type of insomnia"],"a":0,"e":"Performance can be markedly impaired for up to ~15–30 minutes after waking from slow-wave sleep — time naps accordingly."}]},{"id":"infoproc","title":"Information Processing & Memory","cards":[{"t":"The processing chain","b":"Stimulus → SENSORY MEMORY → perception (attention filters here) → DECISION (central processing) → response → feedback. The central decision channel is essentially a SINGLE CHANNEL: humans cannot truly make two decisions at once — apparent multitasking is rapid switching."},{"t":"Sensory & working memory","b":"Sensory stores hold raw input very briefly: iconic (visual) ~0.5–1 s, echoic (sound) ~2–8 s — echoic memory is why you can 'replay' an ATC call you weren't attending to. WORKING (short-term) memory holds about 7 ± 2 items for roughly 10–20 seconds without rehearsal — the reason long clearances get read back wrong."},{"t":"Helping working memory","b":"CHUNKING groups items into meaningful units (a frequency as two chunks, not six digits). Rehearsal keeps items alive; interruption destroys them. Write long clearances down. Similar-sounding items interfere with each other (acoustic confusion) — a known factor in callsign mix-ups."},{"t":"Long-term memory","b":"Effectively unlimited capacity. Three flavours: SEMANTIC (facts/knowledge), EPISODIC (events you experienced — unreliable, reconstructed each recall), PROCEDURAL (motor skills — very resistant to forgetting, 'like riding a bike'). Episodic memory's reconstructive nature is why eyewitness reports differ."},{"t":"Attention","b":"SELECTIVE attention: choosing one input among many (the cocktail-party effect — your callsign cuts through). DIVIDED attention: sharing between tasks — capacity is limited and degrades under stress. VIGILANCE: sustained attention to rare events decays significantly after ~30 minutes (a monitoring problem in cruise and for radar operators)."},{"t":"Perception & expectation","b":"Perception is interpretation, not photography: the brain builds a model from sensory data PLUS expectation (mental set/schema). You tend to perceive what you EXPECT — hearing the clearance you anticipated rather than the one transmitted. Defence: disciplined readback, and treating surprise as information."}],"quiz":[{"q":"Working (short-term) memory typically holds:","o":["About 7 ± 2 items for 10–20 seconds","Unlimited items for one minute","3 items permanently","100 items for an hour"],"a":0,"e":"7 ± 2 chunks, fading within ~20 s without rehearsal — write long clearances down and chunk what you can."},{"q":"The ability to mentally replay a radio call you were not attending to is due to:","o":["Echoic sensory memory","Procedural memory","Semantic memory","Hypnosis"],"a":0,"e":"Echoic (auditory sensory) memory holds a few seconds of raw sound — a brief replay buffer."},{"q":"Motor skills such as control handling are stored in:","o":["Procedural memory","Episodic memory","Echoic memory","Working memory"],"a":0,"e":"Procedural memory — built by practice and very resistant to forgetting, though skills still degrade without recency."},{"q":"Hearing the clearance you expected rather than the one issued is an error of:","o":["Perception driven by expectation","Hearing damage","Sensory memory","Vigilance only"],"a":0,"e":"Perception is constructive: mental set fills in what's anticipated. Disciplined readback/hearback is the defence."},{"q":"Human central decision-making is best described as:","o":["A single channel — one decision at a time","Fully parallel","Unlimited under stress","Two simultaneous channels"],"a":0,"e":"We time-share by switching rapidly; true simultaneous decisions are impossible — workload management matters."},{"q":"Vigilance for rare events during monitoring tasks:","o":["Declines markedly after about 30 minutes","Improves steadily with time","Is constant for 8 hours","Only declines at night"],"a":0,"e":"The vigilance decrement: sustained monitoring degrades within half an hour — a core argument for shared monitoring and automation alerts."}]},{"id":"error","title":"Human Error & Decision Making","cards":[{"t":"Classifying error","b":"Per James Reason: SLIPS — right plan, wrong execution (selected flaps instead of gear). LAPSES — memory failures (forgot a checklist item). MISTAKES — the PLAN itself was wrong (rule-based: wrong rule applied; knowledge-based: faulty reasoning in a novel situation). VIOLATIONS — intentional deviations from rules (routine, situational or exceptional)."},{"t":"Skill, rule, knowledge","b":"Rasmussen's levels: SKILL-based behaviour — automatic, practiced actions (prone to slips/lapses). RULE-based — applying stored if-then procedures (prone to picking the wrong rule). KNOWLEDGE-based — reasoning from first principles in novel situations (slow, effortful, most error-prone). Experts operate mostly at skill/rule level."},{"t":"The Swiss cheese model","b":"Accidents happen when holes in successive defensive layers line up. ACTIVE FAILURES: errors by front-line operators, effects felt immediately. LATENT FAILURES: decisions made far from the flight deck (design, management, rostering, maintenance culture) lying dormant until combined with active failures. Most accidents involve both."},{"t":"The SHELL model","b":"Describes the interfaces between the human (central LIVEWARE) and: SOFTWARE (procedures, checklists, symbology), HARDWARE (controls, displays, seats), ENVIRONMENT (heat, noise, pressure, light), and other LIVEWARE (crew, ATC, ground staff). Mismatches at any interface breed error — the human is never resized; the interfaces must fit the human."},{"t":"Decision making — FORDEC","b":"A structured model for non-time-critical decisions: Facts — what is the situation? Options — what could we do? Risks & benefits of each. Decision — choose. Execution — do it, allocate tasks. Check — did it work, has the situation changed? The loop guards against jumping to the first idea."},{"t":"Decision traps","b":"CONFIRMATION BIAS: seeking only evidence that supports the existing belief. EXPECTANCY: perceiving what you anticipated. PLAN CONTINUATION ('press-on-itis'/get-home-itis): sticking to the original plan as evidence mounts against it — implicated in many CFIT and weather accidents. Antidotes: actively seek disconfirming evidence, set decision gates, invite challenge from the other pilot."}],"quiz":[{"q":"Setting the wrong altitude despite intending the right one — correct plan, faulty execution — is a:","o":["Slip","Mistake","Violation","Latent failure"],"a":0,"e":"Slips are action errors with a good plan. Mistakes are flawed plans; lapses are memory failures; violations are intentional."},{"q":"Forgetting to complete a checklist item after an interruption is a:","o":["Lapse","Slip","Knowledge-based mistake","Violation"],"a":0,"e":"A memory failure = lapse. Interruptions are the classic trigger — go back and re-enter the checklist properly."},{"q":"In Reason's model, a maintenance rostering decision that contributes to an accident months later is a:","o":["Latent failure","Active failure","Slip","Routine violation"],"a":0,"e":"Latent conditions lie dormant in the system until they line up with active failures — the deeper holes in the Swiss cheese."},{"q":"In the SHELL model, the interface between the pilot and checklists or procedures is:","o":["Liveware–Software","Liveware–Hardware","Liveware–Environment","Liveware–Liveware"],"a":0,"e":"Software = the non-physical system elements: procedures, checklists, manuals, symbology."},{"q":"In FORDEC, the final C stands for:","o":["Check — review whether the decision is working","Communicate","Climb","Confirm the weather"],"a":0,"e":"Facts, Options, Risks & benefits, Decision, Execution, CHECK — closing the loop catches a wrong or outdated decision."},{"q":"Continuing an approach in deteriorating weather because 'we're nearly there' illustrates:","o":["Plan continuation bias","The leans","A lapse","Negative transfer"],"a":0,"e":"Press-on-itis: commitment to the original plan overrides accumulating contrary evidence — set hard gates and respect them."}]},{"id":"crm","title":"Personality, Communication & CRM","cards":[{"t":"Personality & attitudes","b":"Personality is stable from early adulthood — training changes ATTITUDES and BEHAVIOUR, not personality. The ideal pilot profile is goal-oriented AND group-oriented (high task focus, high people focus). Extreme introversion/dominance combinations cause crew friction; selection screens for it, CRM manages it."},{"t":"The five hazardous attitudes","b":"ANTI-AUTHORITY ('don't tell me') — antidote: follow the rules, they're usually right. IMPULSIVITY ('do something quickly') — not so fast, think first. INVULNERABILITY ('it won't happen to me') — it could happen to me. MACHO ('I can do it') — taking chances is foolish. RESIGNATION ('what's the use?') — I'm not helpless, I can make a difference."},{"t":"Communication","b":"Communication = transmission AND confirmation of meaning. Barriers: ambiguity, jargon, expectation, status differences, language, noise. Aviation defences: standard phraseology, readback/hearback, closed-loop communication. Most communication meaning travels through tone and body language in person — which is exactly what radio strips away, so words must be precise."},{"t":"The trans-cockpit authority gradient","b":"The command relationship between captain and co-pilot. TOO STEEP: the co-pilot won't challenge errors (many classic accidents). TOO FLAT/SHALLOW: unclear leadership, decisions drift. The target is a moderate gradient: clear command, open challenge. Linked tools: assertiveness training and standard challenge phrases for the junior pilot."},{"t":"Group decision making","b":"Groups can outperform individuals (more knowledge, error-checking) but suffer: GROUPTHINK — conformity pressure suppresses dissent; RISKY SHIFT — groups accept riskier decisions than individuals would (diffusion of responsibility); social loafing. Defences: the captain states views LAST, actively inviting dissent; structured decision models."},{"t":"Leadership & synergy","b":"Leadership is influencing the team towards the goal — distinct from mere authority (the position). Effective styles adapt to the situation: directive in emergencies, consultative when time allows. CRM's aim is SYNERGY: the crew performing better than the sum of its members — achieved through briefing, workload management, monitoring and open communication."}],"quiz":[{"q":"CRM training is designed to change:","o":["Attitudes and behaviour, not personality","Personality permanently","Intelligence","Reaction times"],"a":0,"e":"Personality is fixed by adulthood; training targets attitudes, knowledge and skills — the things that can move."},{"q":"The antidote to the hazardous attitude 'it won't happen to me' is:","o":["It could happen to me","Not so fast — think first","Follow the rules","I'm not helpless"],"a":0,"e":"Invulnerability → 'it could happen to me'. Each of the five attitudes has its matched antidote — learn the pairs."},{"q":"A trans-cockpit authority gradient that is too steep results in:","o":["The co-pilot failing to challenge the captain's errors","Constant arguments","Shared decision paralysis","Better monitoring"],"a":0,"e":"Excessive dominance silences the junior pilot — a recurring factor in accident history. The fix: moderate gradient plus assertiveness."},{"q":"Groupthink is:","o":["Conformity pressure suppressing dissenting views in a group","Faster thinking in groups","A type of memory","Two pilots thinking identically by training"],"a":0,"e":"The desire for harmony overrides realistic appraisal — countered by leaders inviting dissent and stating their own view last."},{"q":"The 'risky shift' phenomenon means groups tend to:","o":["Accept riskier decisions than individuals would alone","Always choose the safest option","Avoid all decisions","Defer to the youngest member"],"a":0,"e":"Shared responsibility dilutes individual accountability, nudging groups towards riskier choices."},{"q":"Effective communication is confirmed by:","o":["Closed-loop feedback such as readback/hearback","Speaking louder","Repetition three times","Using more technical jargon"],"a":0,"e":"Meaning is only transferred when confirmed — the closed loop of message, readback and hearback."}]},{"id":"automation","title":"Automation & The Modern Flight Deck","cards":[{"t":"What automation changed","b":"Automation reduced physical workload and routine error, improved precision and economy — and created new error forms: mode confusion, automation complacency, skill degradation, and 'what's it doing now?' surprises. The pilot's role shifted from hands-on operator to systems MONITOR — a role humans are naturally poor at (vigilance decrement)."},{"t":"Automation complacency","b":"Trust in reliable automation breeds reduced monitoring: crews stop cross-checking what the autoflight system is actually doing. Defences: fly the aircraft mentally at all times (know what it should do next), call out FMA changes, and treat the automation as a crew member whose work must be checked."},{"t":"Mode awareness","b":"Mode confusion — believing the autoflight is in one mode when it is in another — has caused fatal accidents (e.g. descent-rate vs flight-path-angle mix-ups). The flight mode annunciator (FMA) is the single source of truth: announce and verify every mode change. Automation surprises peak during high-workload phases and reversions."},{"t":"Out of the loop & skill fade","b":"Long periods of passive monitoring degrade situational awareness AND manual flying skills — the pilot may be slow to detect failures and poorly placed to take over. Countermeasures: appropriate levels of automation for the phase, deliberate manual flying when conditions allow, and robust takeover criteria (if it's not doing what you want — disconnect and fly)."},{"t":"Levels of automation","b":"Use the level appropriate to workload and situation: full automation for high-workload precision tasks (CAT III), lower levels to stay engaged when conditions permit. Changing levels IS a crew action: announce it. The guiding rule examined: aviate, navigate, communicate — automation status must never displace flying the aeroplane."},{"t":"Designing for humans","b":"Good flight-deck design follows human factors principles: consistency, feedback for every action, error tolerance (guards, confirmations, undo), alerting hierarchy (warning/caution/advisory), and dark-cockpit philosophy (a quiet panel means all is well). The human is the constant — design must fit the operator (SHELL again)."}],"quiz":[{"q":"Automation complacency refers to:","o":["Reduced monitoring caused by trust in reliable automation","Fear of using the autopilot","Automatic checklist completion","The autopilot becoming complacent"],"a":0,"e":"Reliable systems train crews out of checking them — until the day the automation does something unexpected."},{"q":"The authoritative indication of the current autoflight mode is:","o":["The flight mode annunciator (FMA)","The control column position","The thrust lever angle","The captain's memory"],"a":0,"e":"The FMA is the single source of truth — announce and verify every change to maintain mode awareness."},{"q":"Long passive monitoring of automation tends to cause:","o":["Degraded situational awareness and manual skill fade","Improved hand-flying skills","Higher arousal","Faster failure detection"],"a":0,"e":"Out-of-the-loop syndrome: the monitor is slow to notice failures and rusty when forced to take over — hence deliberate manual flying practice."},{"q":"If the autoflight system is not doing what you want during a critical phase, you should:","o":["Disconnect and fly the aircraft manually","Wait and observe for a few minutes","Reprogram the FMS first","Pull circuit breakers"],"a":0,"e":"Aviate first: take over, fly the aeroplane, sort out the automation later — never let troubleshooting displace flying."},{"q":"Pilots are poorly suited to the pure monitoring role because:","o":["Human vigilance for rare events decays quickly","They lack intelligence","They monitor too closely","Monitoring needs no training"],"a":0,"e":"The vigilance decrement (significant within ~30 min) makes humans weak passive monitors — design and procedures must compensate."},{"q":"A 'dark cockpit' philosophy means:","o":["With all systems normal, panels show no lights","Flying without instrument lighting","Night operations only","Hiding failures from the crew"],"a":0,"e":"Quiet and dark = normal; anything illuminated demands attention — an alerting design that exploits human attention patterns."}]},{"id":"respcardio","title":"Respiration & Circulation (In Depth)","cards":[{"t":"The respiratory pathway","b":"Air travels trachea → bronchi → bronchioles → ALVEOLI, the tiny sacs where gas exchange occurs. Oxygen diffuses into the blood and CO2 diffuses out, across a huge, thin surface area. Anything reducing alveolar oxygen partial pressure (altitude) or the exchange surface (disease, smoking) impairs oxygenation."},{"t":"Control of breathing","b":"The respiratory centre in the brainstem sets breathing rate, driven mainly by blood CO2 (and acidity), NOT by oxygen. This is why hypoxia produces no breathlessness — and why hyperventilation, by washing out CO2, removes the urge to breathe and causes alkalosis (tingling, dizziness, tetany)."},{"t":"Blood & its job","b":"Blood carries oxygen (on haemoglobin in red cells), CO2, nutrients, heat and hormones, and fights infection (white cells) and clots (platelets). Anything reducing haemoglobin or its function — anaemia, blood loss, carbon monoxide — causes ANAEMIC hypoxia regardless of altitude."},{"t":"The heart & circulation","b":"A double pump: the RIGHT side drives blood to the lungs (pulmonary circuit), the LEFT side around the body (systemic circuit). Resting rate 60–80 bpm. The coronary arteries feed the heart muscle itself — their narrowing causes angina and heart attacks."},{"t":"Blood pressure","b":"Quoted as systolic/diastolic (contraction/relaxation), healthy norm ~120/80 mmHg. HYPERTENSION (sustained high BP) silently damages heart, vessels, kidneys and eyes and is a major medical-certificate concern. Controllable factors: weight, salt, smoking, alcohol, stress, inactivity."},{"t":"Coronary heart disease & fitness","b":"CHD is a leading cause of licence loss. Risk factors split into controllable (smoking — the biggest, diet/cholesterol, obesity, inactivity, hypertension, stress) and uncontrollable (age, sex, family history). Regular aerobic exercise, healthy weight and not smoking protect both health and licence."}],"quiz":[{"q":"Gas exchange between air and blood takes place in the:","o":["Alveoli","Trachea","Bronchi","Larynx"],"a":0,"e":"The alveoli provide a vast thin surface for oxygen and CO2 to diffuse across."},{"q":"Breathing rate is controlled mainly by the level of:","o":["Carbon dioxide in the blood","Oxygen in the blood","Nitrogen in the tissues","Glucose"],"a":0,"e":"The CO2-driven respiratory centre means low oxygen causes no breathlessness — the insidious danger of hypoxia."},{"q":"Carbon monoxide causes hypoxia by:","o":["Binding to haemoglobin and reducing oxygen carriage","Lowering cabin pressure","Blocking the alveoli physically","Cooling the blood"],"a":0,"e":"CO binds haemoglobin ~200–250× more readily than oxygen — anaemic hypoxia, with headache and confusion."},{"q":"The left side of the heart pumps blood to the:","o":["Body (systemic circulation)","Lungs (pulmonary circulation)","Liver only","Brain only"],"a":0,"e":"Left → body, right → lungs; the coronary arteries separately feed the heart muscle."},{"q":"A healthy resting blood pressure is approximately:","o":["120/80 mmHg","200/120 mmHg","80/40 mmHg","60/30 mmHg"],"a":0,"e":"Systolic/diastolic ~120/80; sustained hypertension is a key medical flag."},{"q":"The single biggest CONTROLLABLE risk factor for coronary heart disease is:","o":["Smoking","Age","Family history","Sex"],"a":0,"e":"Age, sex and family history can't be changed; of the controllable factors, smoking leads."}]},{"id":"lifestyle","title":"Health, Lifestyle & Toxicology","cards":[{"t":"Diet, blood sugar & hydration","b":"The brain runs on glucose; missed meals on long duties cause HYPOGLYCAEMIA (weakness, poor concentration, irritability). Eat regular balanced meals, avoid big sugar spikes. Dehydration — easy in dry cabin air — also degrades concentration; drink water regularly. Obesity and poor diet raise cardiovascular risk."},{"t":"Alcohol","b":"EASA crew limit 0.2 g/L (≈ zero). Eliminated at a FIXED ~1 unit/hour — nothing speeds it up. 'Bottle to throttle' minimums (often 8–12 h) don't guarantee zero BAC after heavy drinking, and HANGOVER effects impair performance even at zero. Alcohol also disturbs the inner ear and degrades sleep quality (suppresses REM)."},{"t":"Medication & drugs","b":"Self-medication is the trap: antihistamines, sleeping tablets, strong painkillers and many cold remedies cause drowsiness or impairment. Rule: if you need the medication, consider whether the CONDITION itself is fit to fly, then clear the drug with an AME. After general or local anaesthetic, typically wait 24–48 h before flying."},{"t":"Carbon monoxide","b":"Colourless, odourless, tasteless — from exhaust/heater leaks and smoking. Binds haemoglobin ~200–250× more than oxygen → anaemic hypoxia: headache, dizziness, vision loss, confusion. Action: source off (cabin heat off), ventilate, 100% oxygen, land. Recovery takes hours, not minutes."},{"t":"Diving, donation & pressure","b":"After diving, dissolved nitrogen makes flying risky: wait ≥12 h after a no-stop dive, 24–48 h after decompression-stop dives, before flying (even in a pressurised cabin). After donating BLOOD, don't fly for ≥24 h (reduced oxygen carriage). Recent surgery, anaemia and pregnancy also reduce altitude tolerance."},{"t":"Tropical & travel health","b":"Long-haul crews face tropical disease risk: malaria (prophylaxis and bite avoidance), waterborne infections (food/water hygiene), and vaccination needs. Jet lag, fatigue and disturbed sleep compound these. Deep-vein thrombosis risk rises with immobility — hydrate and move on long sectors."}],"quiz":[{"q":"Alcohol is eliminated from the blood at:","o":["A fixed rate of about one unit per hour","A rate doubled by coffee","A rate set by exercise","Instantly after eating"],"a":0,"e":"Metabolism is constant; only time reduces blood alcohol — coffee, food and showers don't."},{"q":"Symptoms of hypoglycaemia from missed meals include:","o":["Weakness and poor concentration","Improved alertness","Better night vision","A slow, steady pulse"],"a":0,"e":"The brain is glucose-dependent; low blood sugar degrades thinking and mood — eat regularly on duty."},{"q":"After a dive requiring decompression stops, the minimum wait before flying is:","o":["24–48 hours","2 hours","8 hours","None if pressurised"],"a":0,"e":"24–48 h after decompression dives, ≥12 h after no-stop dives — tissue nitrogen must wash out."},{"q":"Carbon monoxide is especially dangerous because it is:","o":["Undetectable by the senses","Strongly smelly","Heavier than the airframe","Only a risk to passengers"],"a":0,"e":"Colourless and odourless, it silently monopolises haemoglobin — heater leaks are the classic source."},{"q":"After donating blood, crew should not fly for at least:","o":["24 hours","1 hour","7 days","30 days"],"a":0,"e":"Oxygen-carrying capacity is temporarily reduced — at least 24 hours, and avoid donating during flying periods."},{"q":"Following a general anaesthetic, the typical minimum before flying is:","o":["24–48 hours","1 hour","2 weeks","No restriction"],"a":0,"e":"Anaesthetic and the underlying procedure impair performance — 24–48 h minimum, per medical advice."}]},{"id":"sa","title":"Situational Awareness & Workload","cards":[{"t":"Situational awareness (SA)","b":"SA is knowing what is going on around you: Level 1 PERCEIVING the elements (traffic, weather, fuel, systems), Level 2 UNDERSTANDING what they mean, Level 3 PROJECTING what will happen next. Most SA failures are at Level 1 — not noticing — often from distraction, fatigue or fixation."},{"t":"Loss of SA — the warning signs","b":"Red flags: confusion or a 'gut' unease, fixation on one problem, unresolved discrepancies, nobody flying the aircraft, missed checklists/calls, undershooting/overshooting targets, and breaking SOPs. Recovery: aviate first, get the big picture, use the other crew member, and don't proceed while confused."},{"t":"Workload management","b":"Performance suffers at very LOW workload (boredom, complacency, poor monitoring) and very HIGH workload (overload, tunnelling, shedding tasks). Manage it by planning and briefing ahead, prioritising (aviate–navigate–communicate), delegating, and using quiet phases to prepare for busy ones. Automation can both reduce and (via mode confusion) increase workload."},{"t":"Attention & distraction","b":"Attention is limited and largely single-channel — true multitasking is rapid switching, which is error-prone under load. Distraction and interruption are leading causes of missed actions; the defence is to consciously return to and re-confirm the interrupted task, and to protect critical phases (sterile flight deck below 10,000 ft)."},{"t":"Threat & Error Management (TEM)","b":"A safety model: THREATS (weather, terrain, traffic, time pressure, fatigue) and ERRORS (slips, lapses, mistakes, violations) are expected. The goal is to ANTICIPATE, TRAP and MITIGATE them before they become an UNDESIRED AIRCRAFT STATE. Good briefings, monitoring and cross-checking are the everyday TEM tools."},{"t":"SOPs & monitoring","b":"Standard Operating Procedures make actions predictable so the other pilot can monitor and challenge effectively — the foundation of multi-crew safety. Active MONITORING and cross-checking catch errors early; effective challenge (assertiveness, standard call-outs) closes the loop. Deviating from SOPs removes the safety net."}],"quiz":[{"q":"Level 1 situational awareness is:","o":["Perceiving the relevant elements","Understanding their meaning","Projecting the future state","Making the decision"],"a":0,"e":"L1 perceive, L2 comprehend, L3 project. Most SA failures are L1 — simply not noticing something."},{"q":"A classic sign of lost situational awareness is:","o":["Fixation on one problem while no one flies the aircraft","Calm, shared monitoring","Completing checklists on time","Following SOPs"],"a":0,"e":"Fixation, unresolved discrepancies and an unflown aircraft are red flags — aviate first and rebuild the picture."},{"q":"Human performance is typically WORST at:","o":["Very high and very low workload","Moderate workload","Only high workload","Only low workload"],"a":0,"e":"Overload causes tunnelling and task-shedding; underload causes complacency and poor monitoring."},{"q":"In Threat and Error Management, the aim is to:","o":["Anticipate, trap and mitigate threats and errors","Eliminate all human error","Assign blame after events","Avoid using checklists"],"a":0,"e":"TEM accepts threats/errors as normal and manages them before they become an undesired aircraft state."},{"q":"Standard Operating Procedures primarily improve safety by:","o":["Making actions predictable so the other pilot can monitor and challenge","Removing the need to monitor","Speeding up checklists only","Allowing more improvisation"],"a":0,"e":"Predictability is what makes effective cross-monitoring and challenge possible — the multi-crew safety net."},{"q":"The main defence against interruption-induced errors is to:","o":["Consciously return to and re-confirm the interrupted task","Work faster","Ignore the interruption","Skip the checklist"],"a":0,"e":"Interruptions wipe working memory; deliberately resuming and re-checking the task prevents missed actions."}]},{"id":"nervous","title":"Nervous System & Physiology Foundations","cards":[{"t":"Cells & homeostasis","b":"The body is built of cells needing oxygen and glucose and a stable internal environment. HOMEOSTASIS is the maintenance of steady internal conditions (temperature, blood gases, pH, blood sugar). Stressors — altitude, acceleration, heat, fatigue — challenge homeostasis, and the body's compensations have limits."},{"t":"The nervous system layout","b":"The CENTRAL nervous system (brain and spinal cord) processes and decides; the PERIPHERAL nervous system carries signals to and from the body. Sensory nerves bring information in; motor nerves carry commands out. Reaction time is the delay through this loop — lengthened by fatigue, alcohol, hypoxia and age."},{"t":"The autonomic nervous system","b":"Runs automatic functions. The SYMPATHETIC branch is 'fight or flight' — adrenaline, raised heart rate and breathing, pupils dilate, ready for action (the stress/alarm response). The PARASYMPATHETIC branch is 'rest and digest', conserving energy. Stress tips the balance sympathetic."},{"t":"Proprioception — the 'seat of the pants'","b":"Position sense from receptors in muscles, joints and tendons, plus the vestibular system, tells you your body's orientation. In flight WITHOUT external visual reference these signals are UNRELIABLE and cause illusions — which is why instrument flight must override seat-of-the-pants sensations."},{"t":"Energy, digestion & hydration","b":"The digestive system converts food to glucose (brain fuel) and nutrients; the kidneys regulate water and waste. Missed meals cause hypoglycaemia (poor concentration); dehydration (easy in dry cabins) degrades performance. Steady blood sugar and good hydration sustain mental performance on long duties."},{"t":"Hormones & the stress response","b":"The endocrine system uses hormones for slower, sustained control. ADRENALINE drives the acute stress response; CORTISOL sustains it. Chronic stress keeps these elevated, contributing to fatigue, poor sleep, suppressed immunity and the exhaustion phase of the general adaptation syndrome."}],"quiz":[{"q":"Homeostasis is:","o":["Maintenance of a stable internal environment","The fight-or-flight response","A type of illusion","Loss of consciousness"],"a":0,"e":"Steady temperature, blood gases, pH and sugar — challenged by altitude, heat, fatigue and acceleration."},{"q":"The 'fight or flight' response is driven by the:","o":["Sympathetic nervous system","Parasympathetic nervous system","Central nervous system only","Digestive system"],"a":0,"e":"Sympathetic activation releases adrenaline, raising heart rate and breathing for action."},{"q":"Proprioception (position sense) in flight is:","o":["Unreliable without external visual reference","More accurate than instruments","Unaffected by acceleration","Located in the eyes"],"a":0,"e":"Seat-of-the-pants cues mislead in IMC — instruments must override them."},{"q":"Reaction time through the nervous system is lengthened by:","o":["Fatigue, alcohol, hypoxia and age","Good hydration","Moderate arousal","Regular meals"],"a":0,"e":"All degrade the sensory–processing–motor loop, slowing responses."},{"q":"Missed meals on a long duty cause hypoglycaemia, which:","o":["Impairs concentration and judgement","Improves alertness","Raises night vision","Has no effect on the brain"],"a":0,"e":"The brain depends on glucose; low blood sugar degrades mental performance."},{"q":"The acute stress 'alarm' hormone is:","o":["Adrenaline","Insulin","Melatonin","Haemoglobin"],"a":0,"e":"Adrenaline drives the immediate fight-or-flight response; cortisol sustains longer stress."}]},{"id":"learning","title":"Learning & Skill Acquisition","cards":[{"t":"Types of learning","b":"CLASSICAL conditioning: association between a stimulus and a response. OPERANT conditioning: behaviour shaped by its consequences — reinforcement (reward) strengthens it, punishment weakens it. OBSERVATIONAL learning: copying others. Most training blends these, with reinforcement central to building good habits."},{"t":"Stages of skill acquisition","b":"COGNITIVE stage: understanding what to do, slow and error-prone, heavy mental effort. ASSOCIATIVE stage: practising, errors reducing, becoming smoother. AUTONOMOUS stage: the skill is automatic, freeing mental capacity for other tasks. Stress can cause regression to an earlier, more effortful stage."},{"t":"Mental models & schemas","b":"A SCHEMA is an organised mental model that lets you handle situations efficiently and anticipate what comes next. Experts hold rich, accurate schemas; they 'chunk' information and recognise patterns. A wrong or incomplete schema (expectation) is also how perception errors and surprises arise."},{"t":"Transfer of learning","b":"POSITIVE transfer: prior learning helps a new task (e.g. one aircraft type easing another). NEGATIVE transfer: an old habit interferes with the new one (a reversed switch, a different procedure) — a real risk when changing type or operator. Training design tries to maximise positive and minimise negative transfer."},{"t":"Retention, recency & overlearning","b":"Skills and knowledge DECAY without use; RECENCY requirements exist because of this. OVERLEARNING (practising beyond bare competence) makes a skill robust under stress and slows forgetting. Spaced practice beats cramming; meaningful, understood material is retained far better than rote."},{"t":"Motivation to learn & KSA","b":"Learning is far more effective when the learner is motivated and the material is relevant. Modern training assesses KNOWLEDGE, SKILLS and ATTITUDES (KSA) — not just technical ability but the behaviours and mindset of a safe professional. Active involvement beats passive listening."}],"quiz":[{"q":"Behaviour shaped by reward and punishment is:","o":["Operant conditioning","Classical conditioning","Observational learning","Negative transfer"],"a":0,"e":"Consequences shape behaviour — reinforcement strengthens, punishment weakens."},{"q":"In which stage of skill acquisition is the skill automatic, freeing mental capacity?","o":["Autonomous","Cognitive","Associative","Reinforcement"],"a":0,"e":"Cognitive → associative → autonomous; the autonomous skill needs little conscious effort."},{"q":"When an old habit interferes with learning a new procedure, this is:","o":["Negative transfer","Positive transfer","Overlearning","A schema"],"a":0,"e":"Negative transfer — a real hazard on type or operator changes (e.g. reversed switches)."},{"q":"Overlearning a skill primarily:","o":["Makes it robust under stress and slows forgetting","Wastes time with no benefit","Causes negative transfer","Removes the need for recency"],"a":0,"e":"Practice beyond bare competence keeps the skill reliable when workload and stress rise."},{"q":"A schema is best described as:","o":["An organised mental model that aids anticipation","A type of fatigue","A reflex","A breathing pattern"],"a":0,"e":"Schemas let experts chunk information and predict — though a faulty schema also drives expectation errors."},{"q":"Skill retention is improved by:","o":["Spaced practice and meaningful, understood material","Cramming once","Passive listening only","Avoiding recency practice"],"a":0,"e":"Spaced, active, meaningful practice is retained far better than rote cramming."}]},{"id":"communication","title":"Communication","cards":[{"t":"The communication model","b":"A sender encodes a MESSAGE, transmits it through a medium, and a receiver decodes it — communication only succeeds when the received meaning matches the intended meaning, confirmed by FEEDBACK. Many flight-deck errors are really communication failures, not technical ones."},{"t":"Verbal and non-verbal","b":"Face to face, much of the meaning is carried by tone, emphasis and body language, not just words. RADIO strips all of that away, leaving only words and tone — so phraseology must be precise and unambiguous. Written communication loses tone entirely and is easily misread."},{"t":"Barriers to communication","b":"Noise, ambiguity, jargon, accent and language differences, status/authority gradient (reluctance to speak up), expectation (hearing what you expect), workload and fatigue. Each can distort or block the message — good communicators actively counter them."},{"t":"The closed loop","b":"Aviation confirms meaning with the CLOSED LOOP: message → readback → hearback. Standard PHRASEOLOGY removes ambiguity; readback lets the sender catch errors. Skipping the loop ('I'm sure they heard me') is where misunderstandings and level/runway busts creep in."},{"t":"Active listening & feedback","b":"Listening is active, not passive: attending fully, checking understanding, and giving feedback. Good feedback is timely, specific and behaviour-focused, not personal. Asking open questions and confirming back ('so we're cleared to…') turns a one-way transmission into shared understanding."},{"t":"Assertiveness & advocacy","b":"Effective crews state concerns clearly and persist if unresolved — advocacy. Models like the PACE escalation (Probe, Alert, Challenge, Emergency) or standard challenge phrases give a junior crew member a structured way to speak up against a steep authority gradient before a situation deteriorates."}],"quiz":[{"q":"Communication is only successful when:","o":["The received meaning matches the intended meaning","The message is transmitted","The sender stops speaking","It is written down"],"a":0,"e":"Transmission isn't enough — meaning must be received and confirmed, which is what feedback checks."},{"q":"Radio communication is demanding because it:","o":["Strips away body language, leaving only words and tone","Adds non-verbal cues","Removes the need for phraseology","Guarantees understanding"],"a":0,"e":"Without visual cues, precise standard phraseology and readback carry the whole message."},{"q":"The aviation 'closed loop' consists of:","o":["Message, readback and hearback","Sender and noise","Two simultaneous messages","Silence and assumption"],"a":0,"e":"Readback/hearback confirms the message was received correctly — the core defence against mishearing."},{"q":"A communication barrier created by reluctance to question a senior is the:","o":["Authority gradient","Closed loop","Schema","Feedback channel"],"a":0,"e":"A steep trans-cockpit authority gradient discourages the junior pilot from speaking up — a known accident factor."},{"q":"Good feedback is:","o":["Timely, specific and behaviour-focused","Vague and personal","Delayed indefinitely","Always written"],"a":0,"e":"Specific, behaviour-focused, timely feedback improves performance without attacking the person."},{"q":"Structured escalation phrases (e.g. PACE) help a junior crew member to:","o":["Advocate a concern against a steep authority gradient","Avoid speaking at all","Increase ambiguity","Skip the readback"],"a":0,"e":"They give a graded, assertive way to raise and escalate a concern before things deteriorate."}]},{"id":"culture","title":"Motiva
