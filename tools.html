"The DATUM is an arbitrary reference plane chosen by the manufacturer (often the nose, firewall, or a point ahead of the aircraft). The ARM (balance arm) is the horizontal distance from the datum to an item's CG. Arms behind the datum are positive; ahead are negative (sign convention matters)."},{"t":"Moment = mass × arm","b":"A MOMENT is the turning effect of a mass about the datum: moment = mass × arm. Units are kg·m (or lb·in). Every item of load has a moment; the aircraft balances when the total moment is accounted for. Moments can be positive or negative depending on the arm's sign."},{"t":"Finding the CG","b":"The CG is the point where total mass would balance: CG = TOTAL MOMENT ÷ TOTAL MASS. Tabulate each item's mass and arm, compute each moment, sum the masses and sum the moments, then divide. This single relationship underlies every loading calculation."},{"t":"Worked example","b":"Empty 1000 kg at arm 3.0 m → moment 3000. Pilot 80 kg at 2.0 m → 160. Fuel 120 kg at 3.5 m → 420. Totals: mass 1200 kg, moment 3580 kg·m. CG = 3580 ÷ 1200 = 2.98 m from datum. Compare 2.98 m against the fwd/aft limits to confirm it's in the envelope."},{"t":"Index units","b":"To keep numbers manageable, airlines use an INDEX: moment scaled by dividing by a constant (and often adding an offset to avoid negatives). The load sheet sums index units instead of raw moments, then reads CG (as %MAC) from a graph or table. The principle is identical — just scaled."},{"t":"Station numbers","b":"Aircraft positions are given as STATIONS — the arm (distance from datum) of that location, often in inches. Loading a hold or seat row at a known station means you know its arm directly. Combined with the load's mass, that gives its moment for the calculation."}],"quiz":[{"q":"A moment is calculated as:","o":["Mass × arm","Mass ÷ arm","Arm ÷ mass","Mass + arm"],"a":0,"e":"Moment = mass × arm (the turning effect about the datum), in kg·m or lb·in."},{"q":"The centre of gravity is found by:","o":["Total moment ÷ total mass","Total mass ÷ total moment","Total moment × total mass","The largest single arm"],"a":0,"e":"CG = Σmoments ÷ Σmass — the balance point of all the loaded masses."},{"q":"The datum is:","o":["An arbitrary reference plane chosen by the manufacturer","Always at the centre of gravity","Always at the main wheels","The aft CG limit"],"a":0,"e":"It's a fixed reference for measuring arms; it can even be ahead of the nose."},{"q":"Total mass 1200 kg, total moment 3580 kg·m. The CG is:","o":["2.98 m from datum","4.30 m from datum","1.98 m from datum","3580 m from datum"],"a":0,"e":"CG = 3580 ÷ 1200 = 2.98 m — then check against the CG limits."},{"q":"An index system is used to:","o":["Scale moments into manageable numbers","Change the CG limits","Replace the datum","Measure fuel only"],"a":0,"e":"Index = scaled moment (often offset to avoid negatives); the method is identical, just easier to add up."},{"q":"A 'station' on an aircraft refers to:","o":["The arm (distance from datum) of a location","A radio frequency","A weighing point only","A fuel tank"],"a":0,"e":"Station numbers give the arm of seats, holds and equipment directly for moment calculations."}]},{"id":"envelope","title":"CG Limits, MAC & the Envelope","cards":[{"t":"The CG envelope","b":"A graph of MASS (vertical) against CG position (horizontal) bounded by the forward and aft CG limits and the max/min mass lines. A loaded aircraft's CG and mass must plot INSIDE this envelope — at take-off, in flight and at landing. The limits may narrow at higher mass."},{"t":"Mean aerodynamic chord (MAC)","b":"The MAC is a representative chord of the wing. CG is often expressed as a percentage of MAC: %MAC = (distance of CG aft of MAC leading edge ÷ MAC length) × 100. Using %MAC makes the limits independent of the arbitrary datum and easy to compare across loadings."},{"t":"Converting CG to %MAC","b":"Given the CG arm, the leading-edge-of-MAC (LEMAC) arm, and the MAC length: %MAC = ((CG arm − LEMAC) ÷ MAC) × 100. Example: CG 12.5 m, LEMAC 11.5 m, MAC 4 m → (1.0 ÷ 4) × 100 = 25% MAC. Loading limits are commonly quoted as, say, 15–35% MAC."},{"t":"Forward and aft limits","b":"The FORWARD limit is set by elevator authority (must be able to rotate/flare) and acceptable stick forces; the AFT limit by minimum stability. Loading aims to keep CG within these — and many operators target a slightly AFT CG (within limits) for lower trim drag and better fuel efficiency."},{"t":"Limits can vary with mass & config","b":"The envelope is not a simple box: forward and aft limits can change with mass (and sometimes with flap/gear/configuration). Always read the limit applicable to the actual mass. Some aircraft also have a separate landing-gear or take-off CG restriction."},{"t":"Why %MAC is used operationally","b":"Load sheets express CG as %MAC because it directly relates CG to the wing and the stability/control limits, and is independent of the datum choice. Trim settings for take-off are derived from the take-off CG in %MAC — a wrong CG/trim entry is a known take-off hazard."}],"quiz":[{"q":"The CG envelope is a plot of:","o":["Mass against CG position, bounded by the limits","Speed against altitude","Fuel against time","Thrust against drag"],"a":0,"e":"Loaded mass and CG must plot inside the forward/aft limits and mass lines — for take-off, flight and landing."},{"q":"CG at arm 12.5 m, LEMAC 11.5 m, MAC 4 m. The CG in %MAC is:","o":["25%","12.5%","40%","11.5%"],"a":0,"e":"((12.5 − 11.5) ÷ 4) × 100 = 25% MAC."},{"q":"The forward CG limit is set mainly by:","o":["Elevator authority and stick forces","Minimum stability","Fuel capacity","Maximum landing mass"],"a":0,"e":"Far-forward CG can leave too little elevator power to rotate/flare and gives heavy stick forces."},{"q":"Expressing CG as %MAC is useful because it:","o":["Relates CG to the wing and is independent of the datum","Changes the aircraft's mass","Removes the need for limits","Only applies to fuel"],"a":0,"e":"%MAC ties CG directly to the stability/control limits and doesn't depend on the arbitrary datum."},{"q":"The aft CG limit is set mainly by:","o":["Minimum acceptable stability","Elevator authority to flare","Tyre limits","Fuel tank position"],"a":0,"e":"Too far aft and the aircraft becomes unstable/uncontrollable — the aft limit guards stability."},{"q":"Many operators load to a slightly aft CG (within limits) to:","o":["Reduce trim drag and improve fuel efficiency","Increase stall speed","Raise stick forces","Reduce range"],"a":0,"e":"An aft-but-legal CG needs less tail download, cutting trim drag — a small efficiency gain."}]},{"id":"shifts","title":"Loading Changes & CG Shift","cards":[{"t":"Shifting mass already on board","b":"Move a mass that's already loaded and the CG shifts. Formula: CG SHIFT = (mass moved × distance moved) ÷ TOTAL mass. The CG moves in the SAME direction as the load is moved. Total mass is unchanged because nothing was added or removed — only redistributed."},{"t":"Shift example","b":"Total mass 5000 kg, move 200 kg of cargo 4 m aft. CG shift = (200 × 4) ÷ 5000 = 0.16 m aft. So the whole-aircraft CG moves 0.16 m toward the tail. Use this to bring an out-of-limits CG back inside by relocating load."},{"t":"Adding or removing mass","b":"Add/remove a mass and BOTH the CG and total mass change. CG SHIFT = (mass added × (arm of mass − old CG)) ÷ NEW total mass. Adding mass behind the CG moves CG aft; ahead of the CG moves it forward. Removing mass does the opposite. Note the NEW total mass in the denominator."},{"t":"Add/remove example","b":"Aircraft 4000 kg, CG 3.0 m. Add 500 kg at arm 5.0 m. New mass 4500 kg. CG shift = (500 × (5.0 − 3.0)) ÷ 4500 = 1000 ÷ 4500 = 0.22 m aft → new CG 3.22 m. Always check the new CG against the limits at the new mass."},{"t":"Loading to achieve a target CG","b":"To find how much mass to move/add to reach a required CG, rearrange the formulas. E.g. to move CG by a required amount: mass to move = (total mass × required CG shift) ÷ distance available. These rearrangements are common exam tasks — know the formula both ways."},{"t":"Practical use","b":"These tools let you fix an out-of-limits load: redistribute baggage between holds, move passengers, or adjust fuel loading. The direction rule (CG follows the load) plus the shift formula tells you exactly how much movement is needed to bring the CG inside the envelope at every flight phase."}],"quiz":[{"q":"When a loaded mass is moved aft, the CG:","o":["Moves aft (same direction)","Moves forward","Stays the same","Moves to the datum"],"a":0,"e":"The CG always shifts in the same direction as the load is moved."},{"q":"Total mass 5000 kg; 200 kg moved 4 m aft. CG shift is:","o":["0.16 m aft","0.80 m aft","0.04 m aft","1.6 m aft"],"a":0,"e":"(200 × 4) ÷ 5000 = 0.16 m aft."},{"q":"When ADDING mass, the denominator of the CG-shift formula is:","o":["The new total mass","The old total mass","The mass added","The arm"],"a":0,"e":"CG shift = (mass added × (arm − old CG)) ÷ NEW total mass."},{"q":"Aircraft 4000 kg at CG 3.0 m; add 500 kg at arm 5.0 m. New CG is about:","o":["3.22 m","3.00 m","4.00 m","2.78 m"],"a":0,"e":"Shift = (500 × (5.0−3.0)) ÷ 4500 = 0.22 m aft → 3.22 m."},{"q":"To move the CG by a required amount, the mass to relocate is:","o":["(total mass × required CG shift) ÷ distance","(distance × required shift) ÷ total mass","total mass × distance","required shift ÷ total mass"],"a":0,"e":"Rearrange CG shift = (mass × distance) ÷ total mass to solve for mass."},{"q":"Removing baggage from a forward hold moves the CG:","o":["Aft","Forward","It cannot change CG","To the datum"],"a":0,"e":"Removing mass ahead of the CG shifts the CG away from that point — i.e. aft."}]},{"id":"cargo","title":"Cargo & Floor Loading Limits","cards":[{"t":"Why floor limits exist","b":"The cabin/hold floor and structure can only bear so much load per unit area or length. Exceeding floor limits risks structural damage even if the aircraft's total mass and CG are fine. Three limits commonly apply: distribution (running) load, area load, and individual compartment maximums."},{"t":"Area load limit","b":"The maximum mass per unit FLOOR AREA (e.g. kg/m² or lb/ft²), set by the floor panel strength. Check: load mass ÷ contact area ≤ area limit. A heavy item on small feet/pallets concentrates load — spreading it over a larger area (boards/pallets) reduces the pressure to within limits."},{"t":"Running (linear) load limit","b":"The maximum mass per unit LENGTH along the hold (e.g. kg/m), set by the floor beams. Check: load mass ÷ length occupied ≤ running-load limit. Long heavy items must be spread along enough length; otherwise the beams are overstressed even within the area limit."},{"t":"Compartment & total limits","b":"Each hold/compartment has a maximum permitted mass. The sum across compartments must also respect MZFM and CG. So a load can be legal for the whole aircraft yet ILLEGAL in a single compartment — every limit (area, running, compartment, total, CG) must be satisfied simultaneously."},{"t":"Securing the load","b":"Cargo must be SECURED so it cannot move in flight — load shift changes CG (potentially out of limits) and can damage structure. Lashing points have rated strengths; restraint must withstand the certificated load factors in all directions (forward being the most demanding for emergency deceleration)."},{"t":"Calculating a safe load","b":"To place a heavy item: confirm (1) it's within the compartment maximum, (2) mass ÷ area ≤ area limit (spread if needed), (3) mass ÷ length ≤ running-load limit, and (4) the resulting CG and ZFM stay in limits. Spreading load over pallets/boards is the usual fix for area or running-load exceedances."}],"quiz":[{"q":"The area load limit is the maximum mass per:","o":["Unit floor area","Unit length","Compartment","Aircraft"],"a":0,"e":"kg/m² (or lb/ft²) set by floor-panel strength; spread load over a larger area to comply."},{"q":"A heavy item exceeds the area limit. The usual fix is to:","o":["Spread it over a larger area (pallet/boards)","Add fuel","Move it forward only","Increase the total mass"],"a":0,"e":"Spreading the contact area reduces pressure (kg/m²) to within the floor limit."},{"q":"The running load limit is the maximum mass per:","o":["Unit length along the hold","Unit area","Passenger","Engine"],"a":0,"e":"kg/m set by the floor beams — long heavy items must occupy enough length."},{"q":"A load can be within total mass and CG limits yet still illegal because:","o":["It exceeds a single compartment or floor limit","It is too light","The datum moved","The fuel is in the wings"],"a":0,"e":"Every limit applies at once: compartment max, area, running load, plus total and CG."},{"q":"Cargo must be secured chiefly because unrestrained load can:","o":["Shift in flight, moving the CG and damaging structure","Increase lift","Reduce fuel burn","Lower the stall speed"],"a":0,"e":"A shifting load can push CG out of limits and harm the structure — restraint must meet certificated load factors."},{"q":"The most demanding direction for cargo restraint is usually:","o":["Forward (emergency deceleration)","Upward","Sideways only","Rearward only"],"a":0,"e":"Restraint must withstand high forward load factors from a sudden stop/crash deceleration."}]},{"id":"loadsheet","title":"Standard Masses, Load Sheet & LMC","cards":[{"t":"Standard masses","b":"For aircraft with 20+ seats, operators may use EASA STANDARD MASSES instead of weighing each passenger — these INCLUDE hand baggage. Current values (AMC1 CAT.POL.MAB.100, confirmed unchanged at the 2022 EASA review): male 88 kg, female 70 kg, child 35 kg; an 'all-adult' value of 84 kg may be used at 30+ seats. Holiday charters are lower (83 / 69 / 76 kg). Smaller aircraft use higher per-head figures (e.g. 6–9 seats: male 96, female 78) or actual weighing. Operators may also use their own validated survey values."},{"t":"When standard masses apply","b":"Standard masses are permitted above a minimum number of seats; smaller aircraft generally use ACTUAL masses (passengers and bags weighed, or by declaration). Crew, baggage and special loads have their own standard or actual values. Seasonal/holiday adjustments and seat-count bands change the figures — use the applicable table."},{"t":"The load sheet","b":"The LOAD SHEET is the master document: it builds from DOM, adds traffic load by compartment and passengers by zone, adds fuel, and computes ZFM, TOM and LM against their maxima, plus the CG (%MAC) and the take-off TRIM setting. It is cross-checked before departure — errors here are a real safety risk."},{"t":"Take-off trim & stab setting","b":"The take-off CG (%MAC) determines the stabiliser/trim setting for rotation. A wrong CG entry (e.g. transposed figures, wrong ZFM) gives a wrong trim and a mis-rotation — a known cause of tail strikes and near-accidents. The crew sanity-checks the load sheet figures against expectations."},{"t":"Last-minute changes (LMC)","b":"After the load sheet is produced, small changes (a few passengers or bags) can be handled as a LAST-MINUTE CHANGE noted on the sheet, provided they stay within an allowed LMC limit and don't breach any mass or CG limit. Larger changes require a new load sheet. LMCs are recorded, not just verbal."},{"t":"Cross-checks & responsibility","b":"The commander is responsible for ensuring the aircraft is loaded within limits and the load sheet is correct. Practical checks: do the masses look sensible, is ZFM ≤ MZFM, TOM ≤ MTOM (and performance limit), LM ≤ MLM, and is the CG within the envelope at every phase? Catch gross errors before they fly."}],"quiz":[{"q":"Standard passenger masses:","o":["Are defined in the regulations and depend on seat count/category — confirm current values","Are the same for every aircraft worldwide and never change","Are chosen freely by the crew","Apply only to cargo"],"a":0,"e":"They're regulatory, seat-band and category dependent, include hand baggage, and are periodically revised — always use the applicable current table."},{"q":"Smaller aircraft generally must use:","o":["Actual masses","Standard masses only","No mass data","Fuel mass only"],"a":0,"e":"Standard masses are permitted above a minimum seat count; smaller aircraft use actual (weighed/declared) masses."},{"q":"The take-off CG (%MAC) is used to set the:","o":["Stabiliser/trim setting for rotation","Fuel quantity","Flap limit speed","Landing gear position"],"a":0,"e":"A wrong CG entry gives a wrong trim and mis-rotation — a known tail-strike cause."},{"q":"A last-minute change (LMC) is acceptable when it:","o":["Stays within the allowed limit and breaches no mass/CG limit","Is any size at all","Is only spoken, not recorded","Always requires a new load sheet"],"a":0,"e":"Small changes within the LMC limit are noted on the sheet; larger changes need a new load sheet."},{"q":"Ultimate responsibility for correct loading rests with the:","o":["Commander","Catering team","Passengers","Air traffic control"],"a":0,"e":"The commander ensures the aircraft is within limits and the load sheet is correct before flight."},{"q":"A sensible load-sheet cross-check is to confirm:","o":["ZFM ≤ MZFM, TOM ≤ MTOM, LM ≤ MLM and CG in envelope","Only the fuel figure","Only the passenger count","The cabin temperature"],"a":0,"e":"Check every limiting mass and the CG at each phase to catch gross errors before departure."}]},{"id":"weighing","title":"Weighing & Mass Records","cards":[{"t":"Why and when to weigh","b":"An aircraft's BASIC EMPTY MASS and CG are established by actual WEIGHING, because accumulated changes (paint, repairs, equipment, dirt/moisture) drift the figures over time. New aircraft are weighed before entry to service, and re-weighed periodically or after major modifications."},{"t":"Weighing conditions","b":"Weigh in a clean, level, draught-free hangar with the aircraft in a defined configuration: specified equipment fitted, unusable fuel/oil accounted for, and usable fuel normally DRAINED (or precisely known). Scales under each wheel/jack point give the reaction at each, and the arms of those points give the CG."},{"t":"Finding mass and CG from weighing","b":"Total mass = sum of the scale readings. CG = total moment ÷ total mass, where each reaction's moment = reaction × its arm from the datum. The result is the basic empty mass and its CG — the foundation for all later loading calculations."},{"t":"Fleet (mean) masses","b":"An operator with several IDENTICAL aircraft may use a FLEET MEAN basic mass and CG, provided individual aircraft stay within defined tolerances of the mean (and the fleet is re-evaluated periodically). If an individual drifts outside tolerance it must be weighed and removed from the fleet figures."},{"t":"Reweighing intervals","b":"Aircraft using individual masses are typically re-weighed at intervals (commonly every 4 years), or after modifications/repairs that change mass or CG significantly, or when the accumulated changes recorded on the mass-change record exceed set limits. Fleet aircraft are re-evaluated on their own schedule."},{"t":"Mass and balance records","b":"Every change in equipment or modification is logged on a MASS-CHANGE record with its mass and arm, keeping the basic empty mass and CG current between weighings. The current weighing report and these records together give the up-to-date DOM and CG used for load planning."}],"quiz":[{"q":"Basic empty mass and CG are primarily established by:","o":["Actual weighing","Calculation from the load sheet","The fuel gauge","ATC"],"a":0,"e":"Weighing measures the real mass and CG, which drift over time with modifications, repairs and accumulation."},{"q":"When weighing, usable fuel is normally:","o":["Drained (or its mass precisely known)","Filled to full","Ignored entirely","Replaced with water"],"a":0,"e":"A defined configuration with unusable fluids accounted for and usable fuel drained gives a clean basic empty mass."},{"q":"CG from weighing is found by:","o":["Total moment ÷ total mass of the wheel reactions","Largest reaction × arm","Total mass ÷ total moment","The nose reaction only"],"a":0,"e":"Each scale reaction × its arm gives a moment; sum the moments and divide by total mass."},{"q":"A fleet mean mass may be used when aircraft are:","o":["Identical and within defined tolerances of the mean","Of any type","Never re-weighed","Loaded identically every flight"],"a":0,"e":"Identical configuration and individual masses within tolerance of the fleet mean, re-evaluated periodically."},{"q":"Individually-weighed aircraft are typically re-weighed at intervals of about:","o":["4 years (or after significant change)","Every flight","Every 6 months","Never"],"a":0,"e":"Commonly 4-yearly, or sooner after modifications/repairs or when recorded changes exceed limits."},{"q":"Between weighings, the basic empty mass is kept current by:","o":["A mass-change record of equipment changes","Re-weighing each flight","Estimating from fuel burn","The load sheet alone"],"a":0,"e":"Each modification's mass and arm are logged so DOM and CG stay accurate until the next weighing."}]},{"id":"fuelcg","title":"Fuel, Density & CG Movement","cards":[{"t":"Mass vs volume","b":"Fuel is loaded by VOLUME (litres/gallons) but planned by MASS (kg). Mass = volume × DENSITY. Jet A-1 density is around 0.79–0.80 kg/L but varies with temperature — warmer fuel is less dense, so a given volume is less mass. Always convert using the actual fuel density, not a fixed assumption."},{"t":"Density and the load","b":"If actual density is LOWER than assumed, a planned fuel MASS needs more VOLUME — which may not fit the tanks (a volume limit). Conversely, the same volume gives less mass than expected. Density errors can leave you short of fuel mass or over a tank's volume capacity."},{"t":"Fuel and CG","b":"Fuel sits in tanks at particular arms (wings, centre, trim/tail tank), so loading and BURNING fuel moves the CG. Depending on tank layout and usage order, fuel burn can move CG forward OR aft. Planning must keep CG in limits not just at take-off but throughout the burn to landing."},{"t":"Wing fuel and structural relief","b":"Fuel in the WINGS relieves wing-bending in flight (the wings are loaded up by lift but down by fuel mass). This is why MZFM limits the non-wing load: with little wing fuel, more bending stress falls on the structure. Burning wing fuel last preserves this relief."},{"t":"Trim/tail tanks & CofG control","b":"Some large aircraft pump fuel to a TAIL (trim) tank in cruise to move the CG AFT, reducing tail download and trim drag for efficiency, then transfer it forward before descent. This active CG management squeezes out fuel savings but must always keep CG within limits."},{"t":"Unusable fuel & tankering","b":"UNUSABLE fuel (trapped, below the pickup) is part of the basic empty mass, not usable load. TANKERING — carrying extra fuel to avoid buying expensive fuel downroute — raises take-off mass, burn and CG considerations; it's an economic trade-off that still must respect every mass and CG limit."}],"quiz":[{"q":"Fuel mass is calculated from volume using:","o":["Mass = volume × density","Mass = volume ÷ density","Mass = volume × temperature","Mass = volume only"],"a":0,"e":"Loaded by volume, planned by mass — convert with the actual fuel density."},{"q":"Warmer fuel is:","o":["Less dense, so a given volume is less mass","More dense","The same density","Unusable"],"a":0,"e":"Density falls with temperature; a fixed volume of warm fuel weighs less."},{"q":"If actual fuel density is lower than assumed, a required fuel MASS:","o":["Needs more volume (may hit a tank volume limit)","Needs less volume","Cannot be loaded","Weighs more"],"a":0,"e":"Lower density means more litres for the same kilograms — possibly exceeding tank capacity."},{"q":"Burning fuel during flight:","o":["Moves the CG (forward or aft, depending on tanks)","Never affects CG","Always moves CG forward","Only affects mass, never CG"],"a":0,"e":"Tanks are at specific arms, so fuel use shifts CG — it must stay in limits throughout."},{"q":"Fuel in the wings is significant because it:","o":["Relieves wing-bending stress in flight","Increases wing-bending","Has no structural effect","Raises the stall speed"],"a":0,"e":"Wing fuel offsets lift-induced bending — the basis of the MZFM limit on non-wing load."},{"q":"Pumping fuel to a tail trim tank in cruise is done to:","o":["Move CG aft, cutting trim drag for efficiency","Increase the stall speed","Move CG forward","Empty the wings first"],"a":0,"e":"An aft (legal) CG reduces tail download and trim drag — a fuel-saving technique, always within limits."}]},{"id":"trimsheet","title":"The Load & Trim Sheet","cards":[{"t":"Purpose of the load & trim sheet","b":"It is the working document that proves the aircraft is within ALL mass limits and the CG is in the envelope for take-off, zero-fuel and landing, and gives the take-off TRIM setting. It is built systematically and cross-checked before every departure."},{"t":"The index and DOI","b":"To avoid huge moment numbers, each item's moment is converted to an INDEX (scaled, offset to avoid negatives). The DRY OPERATING INDEX (DOI) is the index of the DOM. Loading adds each item's index to the DOI; the running total index, read against mass, gives the CG in %MAC."},{"t":"Building the sheet","b":"Start from DOM and DOI. Add traffic load by compartment/zone and passengers by seat row — each adds mass and index. This gives ZFM and its index (check ZFM ≤ MZFM and CG in limits). Add fuel to get TOM and its index (check TOM and CG). Subtract trip fuel to confirm LM and landing CG."},{"t":"Reading CG from the graph","b":"On the trim graph, plot the final index against the mass; the point's horizontal position gives the CG in %MAC, which must fall between the forward and aft limit lines AT THAT MASS. Three checks: zero-fuel, take-off and landing CG must all be inside the envelope."},{"t":"Deriving the trim setting","b":"The take-off CG (%MAC) is read across to the stabiliser/trim scale to give the take-off TRIM (stab) setting. This is set before take-off so the aircraft rotates correctly. A transposed figure or wrong ZFM corrupts the CG and trim — a known cause of mis-rotations and tail strikes."},{"t":"Checks and last-minute changes","b":"Sanity-check every limiting mass (ZFM, TOM, LM, ramp) and all three CG points. Small late changes are entered as a LAST-MINUTE CHANGE within the allowed limit, adjusting mass and index; larger changes need a fresh sheet. Electronic systems automate the arithmetic but the same checks apply."}],"quiz":[{"q":"The Dry Operating Index (DOI) is the index of the:","o":["Dry operating mass","Take-off mass","Traffic load","Fuel"],"a":0,"e":"Loading adds each item's index to the DOI; the running total gives CG in %MAC."},{"q":"An index is used on the trim sheet to:","o":["Convert moments into manageable scaled numbers","Replace the mass limits","Measure fuel volume","Set the flaps"],"a":0,"e":"Scaled (and offset) moments are easier to add; the method is identical to raw moments."},{"q":"On the trim graph, plotting final index against mass gives the:","o":["CG in %MAC","Stall speed","Fuel required","V2"],"a":0,"e":"The plotted point's position shows CG in %MAC, which must lie within the limits at that mass."},{"q":"Which CG points must be checked on the load sheet?","o":["Zero-fuel, take-off and landing","Take-off only","Landing only","Ramp only"],"a":0,"e":"All three must fall inside the envelope, since CG moves as fuel burns."},{"q":"The take-off trim (stabiliser) setting is derived from the:","o":["Take-off CG in %MAC","Fuel quantity","Flap setting","Outside air temperature"],"a":0,"e":"Read the take-off CG across to the trim scale; a wrong CG entry gives a wrong, hazardous trim."},{"q":"A small late change after the sheet is produced is handled as a:","o":["Last-minute change within the allowed limit","Reason to cancel the flight","Verbal note only","New aircraft weighing"],"a":0,"e":"LMCs adjust mass and index within limits; larger changes require a fresh load sheet."}]},{"id":"units","title":"Units & Conversions","cards":[{"t":"Mass units","b":"1 kilogram = 2.2046 pounds (≈ 2.2). 1 tonne = 1000 kg. To convert lb → kg divide by 2.2046; kg → lb multiply. Mixing units is a classic error: a load sheet in kg with a chart in lb must be converted before use, or the CG and limits will be wrong."},{"t":"Volume units","b":"1 US gallon = 3.785 litres; 1 Imperial gallon = 4.546 litres; 1 litre = 1000 cm³. US and Imperial gallons are NOT the same — always check which a chart uses. Fuel uplift is usually in litres or gallons (a volume), but planning is in kg (a mass)."},{"t":"Density & specific gravity","b":"Density = mass ÷ volume (kg/L). SPECIFIC GRAVITY (relative density) compares a fluid's density to water (1.000 kg/L). Jet A-1 has a density around 0.79–0.80 kg/L (SG ≈ 0.80). Avgas is lighter (≈ 0.72). Density falls as temperature rises."},{"t":"Volume → mass","b":"Fuel MASS = volume × density. Example: 5000 L of Jet A-1 at 0.80 kg/L = 4000 kg. If you only know SG, multiply litres by SG to get kg (since water is 1 kg/L). Always use the ACTUAL density of the day, not a fixed assumption."},{"t":"Mass → volume (capacity check)","b":"To find the volume needed for a required mass: volume = mass ÷ density. Example: 4000 kg at 0.78 kg/L = 5128 L — more litres than at 0.80. A lower density needs more volume, which might exceed tank capacity. Always confirm the required volume fits."},{"t":"Length, arm and moment units","b":"Arms are in metres or inches (1 inch = 0.0254 m; 1 m = 39.37 in). Moments are kg·m or lb·in — keep them consistent within one calculation. A common slip is mixing inches and metres, or kg·m with lb·in, which corrupts the CG. Decide the unit system first and stick to it."}],"quiz":[{"q":"1 kilogram is approximately:","o":["2.2 pounds","1.0 pound","3.8 pounds","0.45 pounds"],"a":0,"e":"1 kg ≈ 2.2046 lb; divide lb by 2.2 to get kg."},{"q":"5000 litres of fuel at density 0.80 kg/L is:","o":["4000 kg","6250 kg","5000 kg","4000 litres"],"a":0,"e":"Mass = volume × density = 5000 × 0.80 = 4000 kg."},{"q":"If fuel density is lower than assumed, the volume needed for a given mass:","o":["Increases","Decreases","Stays the same","Becomes zero"],"a":0,"e":"Volume = mass ÷ density; lower density means more litres for the same kilograms."},{"q":"Specific gravity compares a fluid's density to that of:","o":["Water","Air","Mercury","Jet fuel"],"a":0,"e":"Water = 1.000; Jet A-1 SG ≈ 0.80, so litres × SG ≈ kg."},{"q":"A US gallon and an Imperial gallon are:","o":["Different volumes (3.785 L vs 4.546 L)","Identical","Both 3.785 L","Both 4.546 L"],"a":0,"e":"Always check which gallon a chart uses — they differ by about 20%."},{"q":"To avoid CG errors, within one calculation you should:","o":["Keep all units consistent (e.g. all kg·m)","Mix inches and metres freely","Use lb for some items and kg for others","Ignore the arm units"],"a":0,"e":"Mixing kg·m with lb·in, or metres with inches, corrupts the result — choose one system."}]},{"id":"mbworked","title":"Worked Examples","cards":[{"t":"Finding the CG","b":"List each item's mass and arm, compute moments (mass×arm), sum both columns, divide. Empty 1200 kg @ 2.5 m = 3000; crew 160 kg @ 1.8 m = 288; fuel 300 kg @ 3.2 m = 960; cargo 200 kg @ 4.0 m = 800. Totals: 1860 kg, 5048 kg·m. CG = 5048 ÷ 1860 = 2.71 m. Then check against limits."},{"t":"Shifting a load","b":"CG shift = (mass moved × distance) ÷ total mass, CG moves the SAME way. Total 3000 kg; move 150 kg from arm 2.0 m to 5.0 m (3.0 m aft). Shift = (150 × 3.0) ÷ 3000 = 0.15 m AFT. If old CG was 2.60 m, new CG = 2.75 m."},{"t":"Adding mass","b":"CG shift = (mass added × (arm − old CG)) ÷ new total mass. Aircraft 2500 kg @ CG 2.8 m; add 250 kg @ 4.5 m. New mass 2750 kg. Shift = (250 × (4.5 − 2.8)) ÷ 2750 = (250 × 1.7) ÷ 2750 = 0.155 m AFT → new CG 2.955 m."},{"t":"Removing mass","b":"Same formula, mass is negative (or reverse the direction). Aircraft 2750 kg @ 2.96 m; remove 200 kg from arm 1.5 m. Shift = (−200 × (1.5 − 2.96)) ÷ 2550 = (−200 × −1.46) ÷ 2550 = +0.114 m AFT (removing forward load moves CG aft) → 3.07 m."},{"t":"Converting to %MAC","b":"%MAC = ((CG arm − LEMAC) ÷ MAC) × 100. CG 2.71 m, LEMAC 2.20 m, MAC 1.7 m → ((2.71 − 2.20) ÷ 1.7) × 100 = (0.51 ÷ 1.7) × 100 = 30% MAC. Compare with the limits, e.g. 15–35% MAC → in limits."},{"t":"Loading to a target","b":"To move CG by a needed amount, rearrange: mass to move = (total mass × required shift) ÷ distance. Need CG 0.10 m forward, total 3000 kg, can shift cargo 2.5 m forward: mass = (3000 × 0.10) ÷ 2.5 = 120 kg to relocate. Always re-check the new CG lands inside the envelope."}],"quiz":[{"q":"Totals: mass 1860 kg, moment 5048 kg·m. CG is:","o":["2.71 m","9.39 m","0.37 m","2.50 m"],"a":0,"e":"CG = total moment ÷ total mass = 5048 ÷ 1860 = 2.71 m."},{"q":"Total 3000 kg; move 150 kg 3.0 m aft. CG shift:","o":["0.15 m aft","0.45 m aft","0.05 m aft","1.5 m aft"],"a":0,"e":"(150 × 3.0) ÷ 3000 = 0.15 m, in the direction the load moved (aft)."},{"q":"2500 kg @ CG 2.8 m; add 250 kg @ 4.5 m. New CG ≈","o":["2.96 m","2.80 m","3.30 m","2.64 m"],"a":0,"e":"Shift = (250 × (4.5−2.8)) ÷ 2750 = 0.155 m aft → 2.955 ≈ 2.96 m."},{"q":"CG 2.71 m, LEMAC 2.20 m, MAC 1.7 m. %MAC is:","o":["30%","51%","16%","27%"],"a":0,"e":"((2.71−2.20) ÷ 1.7) × 100 = 30% MAC."},{"q":"Removing mass from FORWARD of the CG moves the CG:","o":["Aft","Forward","Nowhere","To the datum"],"a":0,"e":"Taking away forward load shifts the balance toward the tail (aft)."},{"q":"To shift CG 0.10 m using a 2.5 m relocation on a 3000 kg aircraft, move:","o":["120 kg","75 kg","300 kg","12 kg"],"a":0,"e":"mass = (total × shift) ÷ distance = (3000 × 0.10) ÷ 2.5 = 120 kg."}]}]},{"id":"perf","key":"atpl-perf-v1","title":"Performance","code":"032","modules":[{"id":"fundamentals","title":"Performance Fundamentals","cards":[{"t":"What 'performance' covers","b":"Performance is how well the aircraft accelerates, takes off, climbs, cruises, descends and lands — and whether it can do so safely within the available runway and obstacle environment. It's governed by the balance of thrust, drag, lift and weight, and by the air the aircraft operates in."},{"t":"Effect of mass (weight)","b":"Greater mass = more lift needed = higher speeds, longer take-off and landing distances, shallower climb gradient, lower ceiling and reduced range. Take-off and landing distances rise roughly with the SQUARE of the speed needed, so weight has a strong effect. Mass is usually the dominant performance variable the crew controls."},{"t":"Effect of density (altitude & temperature)","b":"Low air density (high airport elevation, high temperature, high humidity = high DENSITY ALTITUDE) reduces lift and engine thrust, so take-off/landing distances lengthen and climb degrades. The wing still stalls at the same IAS, but TAS and the ground run are higher. Hot-and-high airfields are performance-critical."},{"t":"Effect of wind","b":"A HEADWIND shortens the take-off and landing ground run and steepens the climb-out/approach path over the ground; a TAILWIND does the opposite and is heavily penalised. Regulations require factoring: typically only ~50% of a reported headwind may be credited, but 150% of a tailwind must be assumed — conservative both ways."},{"t":"Effect of runway slope & surface","b":"An UPSLOPE lengthens the take-off run (gravity opposes acceleration) but shortens the landing run; a downslope does the reverse. Surface matters: a wet or contaminated runway reduces braking and increases stopping distance, and contamination (slush/snow/water) also adds drag on take-off."},{"t":"Pressure altitude & the day's conditions","b":"Performance charts are entered with PRESSURE ALTITUDE (set 1013 to read it) and temperature (giving density altitude), plus mass, wind and slope. The same aircraft can be runway-limited on a hot day at a high, short, upsloping, tailwind runway and unrestricted on a cool day at a long sea-level one."}],"quiz":[{"q":"Increasing mass affects take-off distance how?","o":["Increases it","Decreases it","No effect","Halves it"],"a":0,"e":"More mass needs higher speeds and more lift; distances rise (roughly with the square of speed)."},{"q":"High density altitude (hot, high, humid):","o":["Reduces thrust and lift, lengthening distances","Improves climb performance","Shortens the take-off run","Lowers the stall IAS"],"a":0,"e":"Thin air cuts lift and thrust; TAS and ground run increase even though stall IAS is unchanged."},{"q":"For take-off performance, regulations typically allow crediting only:","o":["50% of the headwind, but assume 150% of any tailwind","100% of the headwind and tailwind","150% of the headwind","None of the wind"],"a":0,"e":"Conservative factoring: under-credit headwind, over-credit tailwind to build in margin."},{"q":"An upslope runway, for take-off:","o":["Lengthens the take-off run","Shortens the take-off run","Has no effect","Reduces the stall speed"],"a":0,"e":"Gravity opposes acceleration uphill — longer take-off run (but a shorter landing run)."},{"q":"Performance charts are entered using:","o":["Pressure altitude and temperature","Density only","Indicated altitude on QNH","True altitude"],"a":0,"e":"Pressure altitude (1013 set) plus temperature gives density altitude; add mass, wind, slope."},{"q":"A contaminated (slush/snow) runway on take-off:","o":["Adds drag and reduces braking, worsening performance","Improves acceleration","Has no effect if below MTOM","Shortens stopping distance"],"a":0,"e":"Contamination both retards acceleration (impingement drag) and degrades braking/stopping."}]},{"id":"classes","title":"Performance Classes","cards":[{"t":"Why performance classes","b":"Aircraft are grouped into PERFORMANCE CLASSES that set the regulatory requirements for take-off, climb, obstacle clearance and landing — scaled to the aircraft's capability and the consequences of an engine failure. The class determines how conservative the planning must be."},{"t":"Class A","b":"Multi-engine turbojets/large turboprops (broadly, aeroplanes with MTOM > 5700 kg or more than 9 passenger seats with turbine power). Class A demands the most rigorous rules: full account of ENGINE FAILURE at the critical point, net flight-path obstacle clearance, and the V1-based balanced/unbalanced field concept."},{"t":"Class B","b":"Smaller propeller aeroplanes (generally ≤ 9 passenger seats and MTOM ≤ 5700 kg). Requirements are simpler: single-engine failure after take-off is not guaranteed to be survivable in the same way, so planning uses factored take-off and landing distances and basic climb gradients with safety factors."},{"t":"Class C","b":"Large aeroplanes with PISTON engines (a small, mostly historical group — big recip airliners). It exists for completeness; few modern types fall here. The principles mirror Class A's rigour adapted to piston powerplants."},{"t":"Certification vs operating rules","b":"The AFM gives CERTIFIED performance (scheduled data demonstrated by the manufacturer). The OPERATING rules (the performance class requirements) then apply factors and obstacle criteria to that data for dispatch. You plan with the operating rules, reading from certified AFM charts."},{"t":"The engine-failure philosophy","b":"Class A is built around surviving the FAILURE OF THE CRITICAL ENGINE at the worst moment: the aircraft must be able to either stop or continue the take-off safely from V1, then climb away clearing obstacles on the remaining engine(s). This single idea shapes most Class A take-off rules."}],"quiz":[{"q":"Class A applies broadly to:","o":["Multi-engine turbine aeroplanes > 5700 kg or > 9 seats","Single-engine pistons only","Gliders","Light twins under 2000 kg"],"a":0,"e":"Large multi-engine turbine types — the most rigorous engine-failure and obstacle rules."},{"q":"Class B covers:","o":["Smaller propeller aeroplanes (≤ 9 seats, ≤ 5700 kg)","Large jets","Piston airliners","All turboprops"],"a":0,"e":"Simpler factored distances and climb requirements for small prop aeroplanes."},{"q":"The central philosophy of Class A take-off planning is:","o":["Surviving critical engine failure at the worst moment","Maximising passenger numbers","Minimising fuel only","Ignoring obstacles"],"a":0,"e":"Stop or go safely from V1, then climb clear on the remaining engines."},{"q":"Certified performance data comes from the:","o":["Aircraft Flight Manual (AFM)","METAR","Load sheet","NOTAMs"],"a":0,"e":"The AFM holds scheduled, demonstrated performance; operating rules then factor it for dispatch."},{"q":"Class C aeroplanes are:","o":["Large piston-engine types (a small group)","Modern jets","Microlights","Helicopters"],"a":0,"e":"Large recip airliners — mostly historical; few modern aircraft are Class C."},{"q":"Operating (dispatch) rules differ from certified data by:","o":["Applying factors and obstacle criteria to the AFM data","Ignoring the AFM","Using only TAS","Removing all safety margins"],"a":0,"e":"You plan by applying the class's factors and obstacle clearance to the certified AFM charts."}]},{"id":"takeoffspeeds","title":"Take-off Speeds & Distances","cards":[{"t":"The declared distances","b":"TORA: take-off run available (the runway). TODA: TORA + any CLEARWAY (a clear area beyond the runway the aircraft may fly over while climbing to screen height). ASDA: TORA + any STOPWAY (a paved area beyond the runway able to bear the aircraft during a rejected take-off). These define what's available to go or stop."},{"t":"V1 — the decision speed","b":"V1 is the maximum speed at which the FIRST action to STOP (brakes/thrust levers) must be taken to stop within the ASDA, AND the minimum speed from which the take-off can be CONTINUED to screen height within the TODA after an engine failure. Above V1 you GO; below V1 (and a problem) you STOP."},{"t":"VR, V2 and screen height","b":"VR (rotate): speed to begin rotation. V2 (take-off safety speed): the climb speed to be achieved by the SCREEN HEIGHT (35 ft dry / 15 ft wet for Class A) and maintained in the climb-out with an engine failed. The ordering is Vmcg ≤ V1 ≤ VR ≤ V2 (with V2 ≥ certain margins above stall/Vmca)."},{"t":"Vmcg and Vmca","b":"Vmcg (minimum control speed on the GROUND): the lowest speed at which directional control can be kept using the rudder alone after the critical engine fails during the take-off run. Vmca (minimum control speed in the AIR): the airborne equivalent. V1 cannot be below Vmcg; V2 must give a margin above Vmca/stall."},{"t":"Accelerate-stop & accelerate-go","b":"ACCELERATE-STOP DISTANCE: accelerate to V1, then reject and stop — must fit within ASDA. ACCELERATE-GO DISTANCE: accelerate, lose the critical engine at VEF, continue and reach screen height — must fit within TODA. The take-off must satisfy BOTH for the chosen V1."},{"t":"Balanced field length","b":"If V1 is chosen so the accelerate-stop distance EQUALS the accelerate-go distance, that common distance is the BALANCED FIELD LENGTH, and the V1 is the balanced V1. Where stopway/clearway differ, an UNBALANCED field may allow a higher mass — but balanced field is the classic concept and often the limiting case."}],"quiz":[{"q":"V1 is the speed at/above which, after an engine failure, you must:","o":["Continue the take-off (go)","Always stop","Retract the gear","Reduce to idle"],"a":0,"e":"At or above V1 you GO; below V1 you can STOP within the ASDA. V1 is the go/stop decision speed."},{"q":"TODA is:","o":["TORA plus clearway","TORA plus stopway","Just the runway","TORA minus stopway"],"a":0,"e":"Take-off distance available = runway + clearway (area to climb over to screen height)."},{"q":"ASDA is:","o":["TORA plus stopway","TORA plus clearway","TORA only","TODA plus clearway"],"a":0,"e":"Accelerate-stop distance available = runway + stopway (paved area to stop on during a reject)."},{"q":"The balanced field length occurs when:","o":["Accelerate-stop distance equals accelerate-go distance","V1 equals VR","There is no clearway","The runway is wet"],"a":0,"e":"Choosing V1 so stop distance = go distance gives the balanced field length and balanced V1."},{"q":"The correct speed ordering is:","o":["Vmcg ≤ V1 ≤ VR ≤ V2","V2 ≤ VR ≤ V1","VR ≤ V1 ≤ Vmcg","V1 ≤ Vmcg ≤ VR"],"a":0,"e":"V1 can't be below Vmcg; rotate at VR; achieve V2 by screen height."},{"q":"V2 must be achieved by the:","o":["Screen height (35 ft dry for Class A)","Start of the roll","End of the stopway","Top of climb"],"a":0,"e":"V2 is the take-off safety speed reached by screen height (35 ft dry / 15 ft wet) and held in the climb."}]},{"id":"climbsegments","title":"Climb Segments & Obstacles","cards":[{"t":"The net take-off flight path","b":"Class A obstacle clearance uses the NET flight path — the GROSS (actual demonstrated) climb gradient REDUCED by a mandated margin (e.g. 0.8% for a twin) — and the net path must clear obstacles by at least 35 ft. The gross path is what the aircraft really does; the net is the conservative planning path."},{"t":"First segment","b":"From screen height (35 ft) to gear fully UP. Speed V2, take-off thrust, one engine inoperative. The required gross gradient must simply be POSITIVE (> 0%). It's short — the gear is retracting and drag is high."},{"t":"Second segment","b":"From gear up to typically 400 ft (minimum) — the MOST DEMANDING segment. Speed V2, take-off thrust, one engine inoperative, flaps at take-off setting. Minimum required GROSS gradient: 2.4% (two-engine), 2.7% (three-engine), 3.0% (four-engine). Often the climb-limiting case for take-off mass."},{"t":"Third (acceleration) segment","b":"A level or shallow segment at/above ~400 ft where the aircraft ACCELERATES from V2 toward flap-retraction speed and the flaps are retracted. Thrust may be reduced to maximum continuous after the time limit on take-off thrust expires. Energy goes into speed rather than height here."},{"t":"Fourth (final) segment","b":"Clean configuration, flaps up, at final take-off speed, maximum continuous thrust, one engine inoperative, climbing to a safe en-route altitude (≥ 1500 ft). Minimum required gross gradient: 1.2% (two-engine), 1.5% (three-engine), 1.7% (four-engine)."},{"t":"Gradient, rate & obstacle domain","b":"CLIMB GRADIENT (% = height gained ÷ distance travelled) drives obstacle clearance; RATE of climb (ft/min) = gradient × groundspeed-related factor. Obstacles in the departure splay/domain are assessed against the NET path. If obstacles limit, take-off mass must be reduced until the net path clears them by 35 ft."}],"quiz":[{"q":"The most demanding take-off climb segment is the:","o":["Second segment","First segment","Third segment","Fourth segment"],"a":0,"e":"Gear up, V2, take-off flap, one engine out — the steepest required gross gradient (2.4% for a twin)."},{"q":"The minimum second-segment gross gradient for a TWO-engine aircraft is:","o":["2.4%","2.7%","3.0%","1.2%"],"a":0,"e":"2.4% (twin), 2.7% (three-engine), 3.0% (four-engine)."},{"q":"Obstacle clearance in Class A is assessed against the:","o":["Net flight path (gross reduced by a margin)","Gross flight path","Cruise ceiling","Landing path"],"a":0,"e":"The net path (gross minus a mandated reduction, e.g. 0.8% twin) must clear obstacles by ≥ 35 ft."},{"q":"During the first segment the required gross gradient must be:","o":["Positive (> 0%)","At least 2.4%","At least 3.0%","Zero or negative"],"a":0,"e":"From 35 ft to gear up the gradient need only be positive — drag is high with the gear retracting."},{"q":"The third (acceleration) segment is where the aircraft:","o":["Accelerates and retracts flaps, often near-level","Climbs steepest","Lands","Rotates"],"a":0,"e":"Energy goes into speed: accelerate from V2 to flap-retract speed and clean up, around 400 ft."},{"q":"If obstacles limit the departure, the response is to:","o":["Reduce take-off mass until the net path clears them","Increase V2 only","Ignore them below 1500 ft","Use the gross path instead"],"a":0,"e":"Lowering mass steepens the climb so the conservative net path clears the obstacle by 35 ft."}]},{"id":"climbcruise","title":"Climb & Cruise Performance","cards":[{"t":"Gradient vs rate of climb","b":"CLIMB GRADIENT (% — height per distance) depends on EXCESS THRUST and matters for obstacle clearance and terrain. RATE of climb (ft/min) depends on EXCESS POWER and matters for time to height. Vx (best angle) gives the steepest gradient; Vy (best rate) gives the fastest height gain. Both excesses shrink with altitude."},{"t":"Ceilings","b":"As you climb, excess thrust/power falls until climb performance runs out. ABSOLUTE ceiling: rate of climb = 0. SERVICE ceiling: rate falls to ~100 ft/min (jets often defined at 500 ft/min). Higher mass, higher temperature and (for some) humidity all LOWER the achievable ceiling and reduce climb performance."},{"t":"Optimum & maximum altitude","b":"OPTIMUM altitude gives the best fuel efficiency (best specific range) for the current mass — and RISES as fuel burns off and mass reduces (hence step climbs). MAXIMUM altitude is limited by climb capability or buffet (coffin corner). Cruising too high for the mass risks buffet and poor manoeuvre margin."},{"t":"Specific range & cruise techniques","b":"SPECIFIC RANGE = distance per unit fuel. It's maximised near the best-L/D speed (adjusted for engine efficiency and wind). LONG-RANGE CRUISE (LRC) trades a small range loss for more speed. Wind matters hugely: a strong headwind favours a higher cruise speed; tailwind favours slower."},{"t":"Endurance vs range","b":"MAX ENDURANCE (most time airborne, e.g. holding) is flown near minimum FUEL FLOW — for a jet roughly at Vmd; for a prop a bit slower. MAX RANGE is flown faster, near best specific range. They are different speeds — holding speed is slower than best-range cruise speed."},{"t":"Drift-down","b":"After an engine failure in the cruise, a twin may be unable to hold altitude, so it DRIFTS DOWN at the engine-out driftdown speed to a level it can maintain — which must clear terrain en route (the net driftdown path) and reach a suitable aerodrome. ETOPS and terrain planning hinge on driftdown capability."}],"quiz":[{"q":"Best climb GRADIENT (steepest angle) is flown at:","o":["Vx","Vy","Vne","Vmd only at sea level"],"a":0,"e":"Vx (best angle, from excess thrust) clears obstacles; Vy (best rate, excess power) gains height fastest."},{"q":"The optimum cruise altitude for fuel efficiency:","o":["Rises as fuel burns and mass reduces","Falls as fuel burns","Is fixed for the type","Equals the absolute ceiling"],"a":0,"e":"Lower mass → higher optimum altitude, which is why long flights use step climbs."},{"q":"Maximum endurance (longest time airborne) for a jet is flown:","o":["Near Vmd (minimum drag / low fuel flow)","At maximum speed","At Vne","At the stall"],"a":0,"e":"Minimum fuel flow gives most time aloft — slower than the best-range speed."},{"q":"Service ceiling is conventionally where the rate of climb falls to:","o":["About 100 ft/min (often 500 ft/min for jets)","Zero","1000 ft/min","2000 ft/min"],"a":0,"e":"Absolute ceiling is 0 ft/min; service ceiling uses a small residual rate."},{"q":"After an engine failure in cruise, an aircraft unable to hold level will:","o":["Drift down to a maintainable altitude clearing terrain","Climb to the ceiling","Maintain altitude indefinitely","Stall immediately"],"a":0,"e":"Driftdown at the engine-out speed to a sustainable level — the net path must clear terrain and reach an aerodrome."},{"q":"Climb gradient depends primarily on:","o":["Excess thrust","Excess power","Wing area","CG position"],"a":0,"e":"Excess THRUST sets gradient (angle); excess POWER sets rate of climb."}]},{"id":"landing","title":"Landing Performance","cards":[{"t":"Approach & landing speeds","b":"VREF is the reference landing speed at the threshold, typically about 1.23 × the stall speed in landing configuration (Vs0/Vsr). It rises with mass. The approach is flown at Vref plus a wind/gust additive. A higher Vref (heavy, contaminated, gusty) lengthens the landing distance."},{"t":"Landing distance required","b":"The LANDING DISTANCE is measured from the screen height (50 ft for Class A) over the threshold, through the flare and touchdown, to a full stop. It increases with mass, density altitude, tailwind, upslope (no — DOWNslope lengthens landing), and a wet/contaminated surface that reduces braking."},{"t":"Dispatch factors (the 60/70 rule)","b":"For dispatch, the required landing distance must fit within a FACTORED portion of the landing distance available (LDA). Class A turbojets: the demonstrated landing distance must be ≤ 60% of LDA on a DRY runway (i.e. ÷ 0.6); turboprops ≤ 70%. This builds a large margin for the actual day."},{"t":"Wet & contaminated runways","b":"On a WET runway, the required landing distance is increased — commonly by a further 15% over the dry factored figure (unless type-specific wet data shows otherwise). CONTAMINATED runways (standing water, slush, snow, ice) use specific contaminated landing data with much longer distances and AQUAPLANING risk."},{"t":"Aquaplaning","b":"On standing water the tyres can ride up on a water film, losing braking and steering. Dynamic aquaplaning onset speed ≈ 9 × √(tyre pressure in psi). Above it, braking is largely lost — a major wet-runway landing hazard, mitigated by grooved runways, good tyres and not landing fast/long."},{"t":"Factors at the destination & alternate","b":"Landing performance is assessed for the planned landing mass at destination and alternates, using forecast conditions. A change in wind, a wet runway, or a higher landing mass (e.g. an overweight diversion) can make a runway that was adequate become limiting — re-check whenever conditions change."}],"quiz":[{"q":"Vref is typically about:","o":["1.23 × the landing-configuration stall speed","1.0 × the stall speed","2.0 × the stall speed","Equal to V2"],"a":0,"e":"Reference landing speed ≈ 1.23 Vs0/Vsr; it rises with mass and adds a wind/gust margin."},{"q":"For a Class A turbojet, the landing distance must fit within what fraction of the LDA on a dry runway?","o":["60%","100%","70%","85%"],"a":0,"e":"Dry dispatch: demonstrated landing distance ≤ 60% of LDA (÷ 0.6) for turbojets; 70% for turboprops."},{"q":"On a wet runway the required landing distance is typically increased by a further:","o":["15%","60%","5%","0%"],"a":0,"e":"Commonly +15% on the dry factored distance unless approved wet data shows otherwise."},{"q":"Dynamic aquaplaning onset speed is approximately:","o":["9 × √(tyre pressure in psi)","Tyre pressure ÷ 9","Equal to Vref","9 × tyre pressure"],"a":0,"e":"≈ 9√P (psi) — above it the tyre rides on water with little braking or steering."},{"q":"The Class A landing distance is measured from a screen height of:","o":["50 ft","35 ft","15 ft","100 ft"],"a":0,"e":"Landing distance is from 50 ft over the threshold to a full stop (take-off screen is 35 ft dry)."},{"q":"Landing distance required increases with:","o":["Higher mass, density altitude, tailwind and a wet surface","Lower mass and a headwind","Cooler temperature only","Upslope only"],"a":0,"e":"All of mass, density altitude, tailwind, downslope and reduced braking lengthen the landing."}]},{"id":"classb","title":"Class B & Practical Application","cards":[{"t":"Class B framework","b":"For small propeller aeroplanes (≤ 9 seats, ≤ 5700 kg), performance planning is simpler but still factored. Take-off and landing distances from the AFM are multiplied by SAFETY FACTORS, and basic climb gradients must be met. There's no V1/balanced-field machinery, but obstacle and field-length checks still apply."},{"t":"Class B take-off & landing factors","b":"Typical factors (vary by reg/operation): take-off distance × 1.25; landing distance × 1.43 (i.e. ÷ 0.7) for public transport. Further multipliers apply for grass (e.g. ×1.15), slope, and wet conditions. The factored distance must fit the runway available — these stack multiplicatively."},{"t":"Class B climb requirements","b":"Minimum climb gradients are specified for the take-off and the balked-landing/go-around cases (e.g. a minimum gradient at a defined configuration and speed). Multi-engine Class B aircraft also have an engine-out climb consideration, though it's less demanding than Class A's segment structure."},{"t":"Reading performance charts","b":"Charts are entered with pressure altitude and temperature (often via a carpet/grid), then mass, then wind, then slope — following the chart's reference lines step by step in order. Read conservatively, interpolate carefully, and apply the regulatory factors AFTER the chart figure unless the chart already includes them."},{"t":"Common chart pitfalls","b":"Mistakes that cost marks (and safety): using indicated instead of pressure altitude, forgetting the wind/slope corrections, applying the wind credit the wrong way, missing the surface or contamination factor, and forgetting to apply the dispatch safety factor at the end. Always sanity-check the final distance against the runway."},{"t":"Putting it together","b":"A full check: compute the limiting take-off mass (lowest of field-length, climb, obstacle and structural limits); confirm en-route/driftdown capability; and confirm landing distance at destination and alternate for the forecast conditions. The most restrictive limit governs — performance is only adequate if EVERY check passes."}],"quiz":[{"q":"Class B applies to:","o":["Small propeller aeroplanes (≤ 9 seats, ≤ 5700 kg)","Large jets","Piston airliners","All multi-engine turbines"],"a":0,"e":"Simpler factored planning than Class A, but field-length, climb and obstacle checks still apply."},{"q":"A typical Class B public-transport take-off distance factor is:","o":["× 1.25","× 0.6","× 1.0","× 2.0"],"a":0,"e":"Take-off ×1.25; landing ×1.43 (÷0.7), with further factors for grass, slope and wet."},{"q":"Performance charts should be entered using:","o":["Pressure altitude and temperature","Indicated altitude on QNH","True altitude","Density only, ignoring temperature"],"a":0,"e":"Pressure altitude + temperature give density altitude; then apply mass, wind and slope in order."},{"q":"The limiting take-off mass is:","o":["The lowest of field, climb, obstacle and structural limits","Always the structural MTOM","The highest of all limits","Set by fuel only"],"a":0,"e":"Every limit must be met; the most restrictive governs the allowed take-off mass."},{"q":"A common chart error is to:","o":["Use indicated instead of pressure altitude","Use pressure altitude","Apply the correct wind credit","Interpolate carefully"],"a":0,"e":"Wrong altitude input, mis-applied wind/slope, or forgetting the dispatch factor all corrupt the result."},{"q":"Performance for a flight is adequate only when:","o":["Every required check passes","The take-off check passes","The landing check passes","Just the climb check passes"],"a":0,"e":"Take-off, climb, obstacle, en-route/driftdown and landing must ALL be satisfied — the most restrictive wins."}]},{"id":"tomlimits","title":"Take-off Mass Limits","cards":[{"t":"The competing limits","b":"The maximum take-off mass on the day is the LOWEST of several limits: the structural MTOM, the FIELD-LENGTH limit, the CLIMB (WAT) limit, the OBSTACLE limit, the TYRE-SPEED limit and the BRAKE-ENERGY limit. Each is checked; whichever gives the smallest mass governs."},{"t":"Field-length limit","b":"The mass at which the required take-off distance, accelerate-stop distance and take-off run exactly fill the available distances (TODA/ASDA/TORA) for the chosen V1. Affected by runway length, density altitude, wind, slope and contamination. Often the limiting case on short runways."},{"t":"Climb (WAT) limit","b":"WAT = Weight-Altitude-Temperature. The mass at which the aircraft can just meet the required SECOND-SEGMENT climb gradient (2.4% twin) with one engine inoperative at the airfield's pressure altitude and temperature. High/hot conditions lower the WAT-limited mass — frequently limiting at hot-and-high airports."},{"t":"Obstacle limit","b":"The mass at which the NET take-off flight path just clears all obstacles in the departure area by the required 35 ft (with the critical engine failed). Closer/higher obstacles reduce the obstacle-limited mass. A special departure procedure (turn) may improve it by avoiding the obstacle."},{"t":"Tyre-speed & brake-energy limits","b":"TYRE-SPEED limit: lift-off groundspeed must not exceed the tyres' rated speed (commonly ~204 kt) — limiting with strong tailwinds or high density altitude (high TAS/GS). BRAKE-ENERGY limit (Vmbe): a rejected take-off must not exceed the brakes' energy absorption — limiting at high mass, high density altitude, downslope or tailwind."},{"t":"Putting the limits together","b":"Compute each limiting mass, take the lowest as the regulated take-off mass, then choose a V1 satisfying the field/stop case (and ≥ Vmcg). If the result is below the planned mass, you must offload, wait for better conditions, or use a longer/different runway. Reduced thrust may be used only once limits are met at full thrust."}],"quiz":[{"q":"The regulated take-off mass is:","o":["The lowest of the field, climb, obstacle, tyre, brake and structural limits","Always the structural MTOM","The climb limit only","The field limit only"],"a":0,"e":"Every limit is checked; the most restrictive governs the allowed take-off mass."},{"q":"The WAT limit ensures the aircraft can meet the required:","o":["Second-segment climb gradient, one engine out","Field length","Tyre speed","Brake energy"],"a":0,"e":"Weight-Altitude-Temperature limit guarantees the OEI climb gradient — often limiting hot-and-high."},{"q":"The tyre-speed limit is most likely to bite with:","o":["Strong tailwind / high density altitude (high groundspeed)","Strong headwind","Low temperature","A long runway"],"a":0,"e":"Tyres have a rated speed (~204 kt); high TAS/GS at lift-off can exceed it."},{"q":"The brake-energy limit (Vmbe) is most restrictive with:","o":["High mass, high density altitude, downslope or tailwind","Low mass and a headwind","Cool, sea-level conditions","A short, upsloping runway only"],"a":0,"e":"More kinetic energy to absorb in a reject — high mass/density altitude/downslope/tailwind all raise it."},{"q":"The obstacle-limited mass is the mass at which the:","o":["Net flight path just clears obstacles by 35 ft","Gross path clears by 50 ft","Climb gradient is zero","Tyres reach rated speed"],"a":0,"e":"Obstacle clearance uses the conservative net path with a 35 ft margin, critical engine failed."},{"q":"Reduced (flex) thrust may be used:","o":["Only when all limits are already met at full thrust","To exceed the field limit","To beat the WAT limit","Whenever the crew wishes regardless of limits"],"a":0,"e":"Reduced thrust is permitted only when performance limits are satisfied — it never buys extra margin you don't have."}]},{"id":"reducedthrust","title":"Reduced & Derated Thrust","cards":[{"t":"Why reduce thrust","b":"When the runway and conditions allow take-off at LESS than full thrust, using reduced thrust lowers engine wear, maintenance cost and (sometimes) noise. It's permitted only when all performance requirements are met at the reduced thrust — it never compromises safety margins."},{"t":"The assumed (flex) temperature method","b":"FLEX/assumed-temperature take-off tells the engines to produce the lower thrust that would be needed on a HOTTER (assumed) day. The hotter the assumed temperature, the less thrust. The actual mass must satisfy all limits at that reduced thrust. Maximum reduction is typically capped (commonly 25% below full thrust)."},{"t":"Derated thrust","b":"A DERATE fixes a lower CERTIFIED thrust rating (a permanent, selectable lower rating), which also LOWERS the associated Vmcg/Vmca (since less asymmetric thrust). Derate and flex can be combined. Unlike flex, a derate changes the limiting speeds and is treated as a different thrust rating."},{"t":"Flex vs derate — the key difference","b":"FLEX (assumed temp) keeps the full thrust available if needed and does NOT change Vmcg/Vmca limits. DERATE is a lower certified rating that DOES reduce Vmcg/Vmca. Flex is not allowed on contaminated runways or with certain anti-skid/system issues; derate may be required in some such cases."},{"t":"When reduced thrust is NOT allowed","b":"Reduced thrust (especially flex) is generally PROHIBITED on contaminated runways, with windshear reported, with anti-skid inoperative, or where special procedures require full thrust. In these cases full (or a fixed derate) thrust is used. Crews can always firewall the thrust if needed during the take-off."},{"t":"Benefits and the trade-off","b":"Benefit: large savings in engine life and maintenance over a fleet's life, plus lower noise. Trade-off: longer ground roll and shallower initial climb (still within limits). The technique is standard airline practice on adequate runways — but the crew must apply full thrust if performance becomes marginal."}],"quiz":[{"q":"The assumed (flex) temperature method produces:","o":["The lower thrust needed on a hotter assumed day","More than full thrust","Thrust set by mass alone","A fixed certified derate"],"a":0,"e":"Commanding thrust for a hotter assumed temperature reduces it — capped (often 25%) and only if limits are met."},{"q":"A key difference of DERATE versus flex is that derate:","o":["Lowers the Vmcg/Vmca limits","Keeps full thrust instantly available","Cannot be combined with flex","Increases thrust"],"a":0,"e":"A derate is a lower certified rating with less asymmetric thrust, so the minimum control speeds reduce."},{"q":"Reduced (flex) thrust is generally NOT permitted on:","o":["Contaminated runways","Long dry runways","Cool days","Sea-level airports"],"a":0,"e":"Flex is prohibited on contaminated runways, with windshear, or anti-skid inoperative."},{"q":"Reduced thrust may be used only when:","o":["All performance requirements are met at that thrust","The crew wants to save fuel regardless","It beats the WAT limit","The runway is short"],"a":0,"e":"It never reduces required margins — every limit must still be satisfied at the reduced thrust."},{"q":"A consequence of reduced-thrust take-off is:","o":["A longer ground roll and shallower initial climb (within limits)","A shorter ground roll","A steeper climb","Higher Vmcg with flex"],"a":0,"e":"Less thrust means more runway used and a gentler climb — acceptable because limits are still met."},{"q":"The main benefit of routine reduced-thrust take-offs is:","o":["Reduced engine wear and maintenance cost","Shorter runways needed","Higher take-off mass","Better obstacle clearance"],"a":0,"e":"Lower operating temperatures extend engine life and cut costs across the fleet."}]},{"id":"landingclimb","title":"Approach & Landing Climb","cards":[{"t":"Two go-around climb requirements","b":"Class A landing has two climb gradient requirements for a balked approach/landing: the APPROACH CLIMB (one engine inoperative, approach configuration) and the LANDING CLIMB (all engines, landing configuration). Both must be met at the landing mass — they can limit the landing mass via a WAT check."},{"t":"Approach climb gradient","b":"Flown ONE ENGINE INOPERATIVE in the approach configuration (gear up, approach flap), at approach climb speed, go-around thrust. Minimum gross gradients: 2.1% (two-engine), 2.4% (three-engine), 2.7% (four-engine). It models a single-engine go-around — often the limiting landing case at high/hot airfields."},{"t":"Landing climb gradient","b":"Flown with ALL ENGINES operating in the LANDING configuration (gear down, landing flap), at a speed near Vref, go-around thrust available within a set time. Minimum gross gradient: 3.2% for all aircraft. It models a baulked landing with everything still hanging out."},{"t":"The landing WAT limit","b":"Just as take-off has a climb (WAT) limit, landing has one: the mass must be low enough to meet the approach-climb and landing-climb gradients at the destination's pressure altitude and temperature. Hot-and-high destinations can be WAT-limited for landing as well as take-off."},{"t":"Landing field-length limit","b":"Separately, the landing distance required must fit the factored landing distance available (60%/70% dry, +15% wet, contaminated data as applicable). The landing mass is limited by the MORE restrictive of the field-length limit and the climb (WAT) limit — plus the structural MLM."},{"t":"Quick reference","b":"Take-off climb minimums (2nd seg): 2.4/2.7/3.0% (2/3/4 eng). Final seg: 1.2/1.5/1.7%. APPROACH climb: 2.1/2.4/2.7% (2/3/4 eng). LANDING climb: 3.2% all. Knowing which gradient applies to which case and engine count is heavily examined — learn the four sets."}],"quiz":[{"q":"The approach climb gradient (two-engine) minimum is:","o":["2.1%","2.4%","3.2%","1.2%"],"a":0,"e":"Approach climb (one engine out, approach config): 2.1% twin, 2.4% tri, 2.7% four."},{"q":"The landing climb gradient minimum (all engines) is:","o":["3.2%","2.4%","2.1%","1.2%"],"a":0,"e":"Landing climb in the landing configuration, all engines: 3.2% for all aircraft."},{"q":"The approach climb is flown:","o":["One engine inoperative, approach configuration","All engines, landing configuration","All engines, clean","Two engines out"],"a":0,"e":"It models a single-engine go-around: OEI, gear up, approach flap, go-around thrust."},{"q":"The landing climb is flown:","o":["All engines, landing configuration","One engine out, clean","One engine out, approach config","Engines at idle"],"a":0,"e":"All engines, gear down, landing flap — a baulked landing with everything extended."},{"q":"A hot-and-high destination may limit landing mass via the:","o":["Climb (WAT) limit","Tyre-speed limit only","Brake-energy limit only","Stall speed"],"a":0,"e":"Meeting the approach/landing climb gradients at high pressure altitude and temperature can cap the landing mass."},{"q":"The allowed landing mass is the more restrictive of:","o":["Field-length limit, climb (WAT) limit and structural MLM","Field limit only","WAT limit only","Tyre and brake limits"],"a":0,"e":"Landing field length, the landing WAT limit, and the structural maximum landing mass all apply."}]},{"id":"enroute","title":"En-route, Driftdown & ETOPS","cards":[{"t":"En-route obstacle clearance","b":"After take-off, the aircraft must still clear terrain EN ROUTE if an engine fails. Rules require the net one-engine-inoperative flight path to clear terrain/obstacles within a corridor either side of track by a vertical margin (commonly 1000 ft), or to be able to drift down and divert safely."},{"t":"Driftdown","b":"If a twin can't hold its cruise level on one engine, it DRIFTS DOWN at the driftdown speed (near best L/D for the engine-out case) to the level it can maintain. The NET driftdown path must clear terrain by the required margin; planning ensures a safe diversion to an adequate aerodrome."},{"t":"Two-engine-inoperative (4-engine aircraft)","b":"For four-engine aircraft on long sectors, rules also consider TWO engines inoperative en route, with its own (lower) driftdown level and terrain-clearance corridor. The aircraft must still be able to reach a suitable aerodrome from the critical point on the route."},{"t":"Point of no return & equal-time point","b":"PNR (point of no return): the furthest point you can fly and still return to the departure (or a chosen) aerodrome with required reserves — beyond it you must continue. ETP/CP (equal-time/critical point): the point from which it takes the same time to reach either of two aerodromes — used to plan diversions after a failure or depressurisation."},{"t":"ETOPS basics","b":"ETOPS (extended operations) lets twins fly routes taking them further than a set time from an adequate diversion aerodrome (e.g. 120 or 180 minutes at the one-engine-out speed). It requires approved aircraft/engine reliability, suitable en-route alternates within the threshold time, and extra dispatch and fuel considerations."},{"t":"Adequate vs suitable aerodromes","b":"An ADEQUATE aerodrome meets the physical/performance requirements (runway, etc.) for the aircraft. A SUITABLE aerodrome is an adequate one whose weather and conditions are forecast to be acceptable at the expected time of use. ETOPS and diversion planning hinge on having suitable alternates within range."}],"quiz":[{"q":"After an engine failure in the cruise, an aircraft unable to hold level will:","o":["Drift down to a maintainable level clearing terrain","Climb to the ceiling","Maintain altitude indefinitely","Stall"],"a":0,"e":"Driftdown at the engine-out speed; the net path must clear terrain and reach an adequate aerodrome."},{"q":"The point of no return (PNR) is the furthest point at which you can:","o":["Still return to a chosen aerodrome with required reserves","Reach the destination fastest","Begin driftdown","Start ETOPS"],"a":0,"e":"Beyond the PNR you must continue, as returning would breach fuel reserves."},{"q":"The equal-time point (ETP/critical point) is where:","o":["It takes the same time to reach either of two aerodromes","Fuel is exhausted","The climb ends","The PNR always is"],"a":0,"e":"Used to plan the best diversion after a failure or depressurisation; wind shifts it from the midpoint."},{"q":"ETOPS permits a twin to operate:","o":["Further than a set time from an adequate diversion aerodrome","With no diversion planning","Only over land","Without reliability approval"],"a":0,"e":"E.g. 120/180-minute rules, requiring approved reliability and suitable en-route alternates within the threshold."},{"q":"A 'suitable' aerodrome is an adequate aerodrome that also:","o":["Has acceptable forecast weather/conditions at the time of use","Has the longest runway","Is the departure field","Is closest to the PNR"],"a":0,"e":"Adequate = physically capable; suitable = adequate plus acceptable forecast conditions when needed."},{"q":"En-route one-engine-out terrain clearance typically requires a vertical margin of about:","o":["1000 ft within a corridor either side of track","35 ft","500 ft","2000 ft above the ceiling"],"a":0,"e":"The net OEI path must clear terrain within the route corridor by the required margin (commonly 1000 ft), or drift down and divert."}]},{"id":"descent","title":"Descent, Diversion & Holding","cards":[{"t":"The descent","b":"An idle (or near-idle) descent trades height for distance efficiently. DESCENT GRADIENT = height lost ÷ distance. A steeper descent needs speedbrakes or a lower speed; a shallow one covers more ground. Descent performance sets the top-of-descent point and the fuel/time to the destination."},{"t":"The 3× rule of thumb","b":"A handy planning rule: distance to lose a given height (in thousands of ft) ≈ 3 × height. To descend 30,000 ft, start about 90 NM out (30 × 3). Add miles for tailwind or high speed, subtract for headwind. It approximates a 3° (≈ 5.2%) descent path."},{"t":"Speed and wind in the descent","b":"Descending into a HEADWIND steepens the path over the ground (less distance covered) — start later; a TAILWIND shallows it — start earlier. Higher mass needs a slightly higher descent speed. Emergency descents (depressurisation) use high speed and speedbrakes to lose height fast to a safe level."},{"t":"Diversion performance","b":"A diversion to an alternate must be planned for fuel and performance at the diversion mass and conditions. The aircraft may be heavier than a normal arrival (less fuel burned), so landing distance and the landing WAT limit at the alternate must still be satisfied — re-check, don't assume."},{"t":"Holding","b":"Holding is flown near the speed for MAXIMUM ENDURANCE (minimum fuel flow) — for a jet roughly the minimum-drag speed, giving the most time aloft per kg of fuel. Holding burns into reserves, so excessive holding can force a diversion. Maximum holding speeds are also published for containment within the holding pattern."},{"t":"Fuel planning links","b":"Performance feeds fuel planning: trip fuel (climb-cruise-descent), contingency, alternate (diversion) fuel, final reserve (holding at 1500 ft, ~30 min), and any extra/tankering. Each phase's performance — climb burn, cruise specific range, descent, hold — determines the fuel required and thus the take-off mass."}],"quiz":[{"q":"Using the 3× rule, to descend 24,000 ft you begin descent about:","o":["72 NM out","24 NM out","240 NM out","8 NM out"],"a":0,"e":"Distance ≈ 3 × height in thousands = 3 × 24 = 72 NM (adjust for wind/speed)."},{"q":"Descending into a strong headwind, you should start the descent:","o":["Later (the path steepens over the ground)","Earlier","At the same point","Not at all"],"a":0,"e":"A headwind reduces groundspeed, steepening the path — less distance is covered, so begin later."},{"q":"Holding is flown near the speed for:","o":["Maximum endurance (minimum fuel flow)","Maximum range","Vne","Best climb"],"a":0,"e":"Minimum fuel flow gives the most time aloft per kg — important as holding eats into reserves."},{"q":"Descent gradient is:","o":["Height lost ÷ distance travelled","Distance ÷ height","Speed × time","Height × distance"],"a":0,"e":"Gradient (%) = height lost ÷ horizontal distance; a 3° path ≈ 5.2%."},{"q":"When diverting, landing performance at the alternate must be:","o":["Re-checked at the actual diversion mass and conditions","Assumed adequate","Ignored if fuel is sufficient","Based on the destination figures"],"a":0,"e":"A heavier-than-normal arrival mass and the alternate's conditions can make landing distance/WAT limiting."},{"q":"Final reserve fuel typically covers:","o":["About 30 minutes holding at 1500 ft","The whole diversion","Taxi only","The climb"],"a":0,"e":"Final reserve is roughly 30 min holding at 1500 ft above the alternate — never to be planned into normal use."}]},{"id":"rangecruise","title":"Range, Endurance & Cruise Control","cards":[{"t":"Specific range","b":"SPECIFIC RANGE (SR) = distance flown per unit of fuel (NM/kg). Maximising SR maximises still-air range. It depends on aerodynamic efficiency (best L/D region), engine efficiency, mass, altitude and wind. The best-range speed is a bit faster than the minimum-drag speed for a jet."},{"t":"Effect of mass and altitude","b":"As fuel burns and MASS falls, the best-range speed reduces and the optimum altitude RISES — hence STEP CLIMBS to stay near the optimum. Flying at the optimum altitude for the current mass gives the best specific range; too low or too high both cost fuel."},{"t":"Effect of wind","b":"Range over the GROUND depends on wind. In a HEADWIND, flying a little FASTER than best still-air range improves ground range (less time exposed to the headwind); in a TAILWIND, flying a little SLOWER is better. Flight management systems optimise this automatically."},{"t":"Maximum range vs long-range cruise","b":"MAXIMUM RANGE CRUISE gives the most miles per kg but is slow and speed-unstable. LONG-RANGE CRUISE (LRC) accepts ~1% less range for a useful speed increase and better handling — the traditional airline compromise. Both are flown as a schedule of speed/Mach versus mass and altitude."},{"t":"Cost index","b":"COST INDEX (CI) balances FUEL cost against TIME cost. CI = 0 flies for minimum fuel (max range). A high CI flies faster (minimum time) burning more fuel. The FMS computes the ECON speed for the selected CI, weather and mass — the modern way to manage cruise economically."},{"t":"Endurance vs range speeds","b":"MAX ENDURANCE (most time airborne — holding) is flown near minimum fuel flow (≈ Vmd for a jet). MAX RANGE is flown faster (best specific range). They are DIFFERENT speeds — a frequent exam point. Propeller aircraft fly both a little slower than equivalent jets due to differing efficiency curves."}],"quiz":[{"q":"Specific range is:","o":["Distance flown per unit of fuel","Fuel per hour","Time per unit fuel","Distance per hour"],"a":0,"e":"NM per kg — maximise it for best
