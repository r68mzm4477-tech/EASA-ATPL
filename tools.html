 still-air range."},{"q":"As fuel burns off, the optimum cruise altitude:","o":["Rises (hence step climbs)","Falls","Stays fixed","Equals the ceiling"],"a":0,"e":"Lower mass → higher optimum altitude → step climbs to track it."},{"q":"In a strong headwind, best ground range is achieved by flying:","o":["A little faster than best still-air range","Much slower","At the stall","At Vne"],"a":0,"e":"Speeding up slightly reduces time exposed to the headwind, improving ground range."},{"q":"A cost index of zero commands:","o":["Minimum-fuel (maximum-range) speed","Maximum speed","Holding speed","Vne"],"a":0,"e":"CI = 0 ignores time cost → fly for minimum fuel; high CI flies faster for minimum time."},{"q":"Long-range cruise (LRC) trades about 1% range for:","o":["A useful speed increase and better handling","Lower altitude","More fuel burn with no benefit","A higher stall speed"],"a":0,"e":"LRC is the classic compromise — slightly less range, more speed and stability than max-range cruise."},{"q":"Maximum-endurance speed compared with maximum-range speed is:","o":["Slower","Faster","The same","Always Vne"],"a":0,"e":"Endurance (min fuel flow, ≈Vmd) is slower than best-range cruise — a common exam distinction."}]},{"id":"contaminated","title":"Wet & Contaminated Runways","cards":[{"t":"Runway states","b":"DRY: no moisture effect. WET: surface visibly damp/water but no significant depth (≤ 3 mm). CONTAMINATED: more than 25% covered by standing water, slush, snow or ice (or water/slush > 3 mm). Each state has its own performance data — distances grow from dry → wet → contaminated."},{"t":"Effect on take-off","b":"Contamination hurts BOTH ways: a layer of water/slush adds IMPINGEMENT (displacement) DRAG that retards acceleration, AND reduces wheel braking for a reject. So the accelerate-go is slower to build speed and the accelerate-stop is longer. Take-off mass is often reduced on contaminated runways."},{"t":"V1 and screen height","b":"On wet/contaminated runways a LOWER V1 is often used to keep the accelerate-stop distance within limits (less braking available). The take-off screen height is reduced to 15 ft (from 35 ft dry) on a wet runway, reflecting the reduced go margin. Some operations require full thrust (no flex) when contaminated."},{"t":"Effect on landing","b":"Reduced friction lengthens the LANDING distance: wet adds ~15% to the dry factored figure, and contaminated runways use specific (much longer) data. Reverse thrust and spoilers become more important as wheel braking is degraded. Plan landing distance for the actual reported runway state."},{"t":"Aquaplaning","b":"On standing water the tyre can ride on a water film. DYNAMIC aquaplaning onset ≈ 9 × √(tyre pressure psi); above it braking and steering are largely lost. VISCOUS aquaplaning occurs on a thin film over smooth surfaces at lower speeds. REVERTED-RUBBER aquaplaning from a locked, skidding tyre boiling the water can persist to low speed."},{"t":"Braking action & friction","b":"Reported braking action (GOOD → POOR, the GRF runway condition code 6→0) and measured friction guide performance. As friction falls, stopping distance rises steeply. Crosswind handling also degrades on slippery runways. Always cross-check the reported runway condition against your landing/abort performance."}],"quiz":[{"q":"A runway is 'contaminated' when more than what fraction is covered?","o":["25%","10%","50%","75%"],"a":0,"e":"More than 25% covered by water/slush/snow/ice (or >3 mm depth) = contaminated."},{"q":"Contamination affects take-off by:","o":["Adding impingement drag AND reducing braking","Improving acceleration","Only helping the climb","Reducing the stall speed"],"a":0,"e":"Slush/water retards acceleration and degrades reject braking — both lengthen the required distances."},{"q":"The take-off screen height on a WET runway is:","o":["15 ft","35 ft","50 ft","0 ft"],"a":0,"e":"Reduced to 15 ft (from 35 ft dry) to reflect the smaller go margin."},{"q":"A wet runway typically ad         , React.createElement(BigBtn, { onClick: start,}, "Study 20 cards →"   )
      )
    );
  }

  if (phase === "done") {
    return (
      React.createElement('div', { style: { background: C.panel, border: `1px solid ${C.line}`, borderTop: `4px solid ${C.good}`, borderRadius: 3, padding: "24px 18px", textAlign: "center" },}

        , React.createElement('div', { style: { fontSize: 36, fontWeight: 800, color: C.good, margin: "6px 0" },}, done, " cards" )
        , React.createElement('p', { style: { color: C.sub, fontSize: 14, margin: "0 0 16px" },}, "Progress saved. Come back to keep them warm."       )
        , React.createElement(BigBtn, { onClick: () => setPhase("config"),}, "Done")
      )
    );
  }

  const card = queue[pos];
  const box = boxes[card.id] || 1;
