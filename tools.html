<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" /><meta name="apple-mobile-web-app-capable" content="yes" /><meta name="mobile-web-app-capable" content="yes" /><meta name="apple-mobile-web-app-status-bar-style" content="black" /><meta name="theme-color" content="#16222C" /><link rel="manifest" href="manifest.webmanifest" /><link rel="apple-touch-icon" href="icon-180.png" /><title>ATPL Study Tools</title><script src="vendor-react.js"></script><style>html,body{margin:0;padding:0;background:#E9EEF2;-webkit-text-size-adjust:100%;}#root{min-height:100vh;}</style></head><body><div id="root"></div><script>window.__DATA__=[{"id":"met","key":"atpl-met-v1","title":"Meteorology","code":"050","modules":[{"id":"atmosphere","title":"The Atmosphere & ISA","cards":[{"t":"Composition of dry air","b":"By volume: 78% nitrogen, 21% oxygen, ~1% argon and ~0.04% CO2. These proportions stay constant up to about 60 km. Water vapour varies from 0–4% and is the single most important variable gas — nearly all weather happens because of it."},{"t":"Layers & the tropopause","b":"Almost all weather is in the troposphere, where temperature falls with height. The tropopause is HIGHER and COLDER over the equator (~16–18 km, about −75°C) and LOWER and WARMER over the poles (~8 km, about −45 to −50°C). Above it lies the stratosphere, containing the ozone layer."},{"t":"ISA sea-level values","b":"Temperature +15°C, pressure 1013.25 hPa, density 1.225 kg/m³. Memorise all three — they appear constantly in exam questions and performance calculations."},{"t":"ISA temperature profile","b":"Temperature falls at 1.98°C per 1000 ft (0.65°C/100 m) up to 36,090 ft (11 km), where it reaches −56.5°C. From 11 km to 20 km it is ISOTHERMAL (constant −56.5°C), then it increases slowly in the upper stratosphere."},{"t":"Pressure with height","b":"Near MSL, pressure falls about 1 hPa per 27 ft. The rate of fall DECREASES with altitude (air gets less dense). Pressure roughly halves every 18,000 ft: ~500 hPa at FL180, ~300 hPa at FL300, ~200 hPa near FL390."},{"t":"Density","b":"Density is proportional to pressure ÷ temperature. It always decreases with altitude. Moist (humid) air is LESS dense than dry air, because water vapour molecules are lighter than N2/O2. High temperature + high humidity + low pressure = high density altitude = poor aircraft performance."},{"t":"ISA deviation","b":"ISA temperature at altitude = 15 − (2 × altitude in 1000s of ft). Example: ISA at FL350 = 15 − 70 = −55°C. ISA deviation = actual OAT minus ISA temperature. OAT −45°C at FL350 → ISA +10."}],"quiz":[{"q":"The ISA sea-level values are:","o":["15°C, 1013.25 hPa, 1.225 kg/m³","15°C, 1023 hPa, 1.013 kg/m³","10°C, 1013.25 hPa, 1.225 kg/m³","15°C, 1013.25 hPa, 1.013 kg/m³"],"a":0,"e":"The three figures to memorise: +15°C, 1013.25 hPa, 1.225 kg/m³."},{"q":"Compared with the poles, the tropopause over the equator is:","o":["Higher and colder","Higher and warmer","Lower and colder","Lower and warmer"],"a":0,"e":"Strong tropical convection pushes the tropopause to ~16–18 km, where it is about −75°C — higher AND colder than over the poles."},{"q":"Near mean sea level, a pressure change of 1 hPa corresponds to approximately:","o":["27 ft","8 ft","50 ft","100 ft"],"a":0,"e":"1 hPa ≈ 27 ft near MSL. The ft-per-hPa figure grows with altitude as air thins (≈50 ft/hPa at 18,000 ft)."},{"q":"The ISA temperature at FL350 is:","o":["−55°C","−50°C","−56.5°C","−70°C"],"a":0,"e":"15 − (2 × 35) = 15 − 70 = −55°C. (−56.5°C is only reached at 36,090 ft.)"},{"q":"Compared with dry air at the same temperature and pressure, moist air is:","o":["Less dense","More dense","The same density","Denser only above the freezing level"],"a":0,"e":"H2O molecules (mass 18) are lighter than N2 (28) and O2 (32), so humid air is less dense — performance suffers on humid days."},{"q":"In the ISA, the layer between 11 km and 20 km is:","o":["Isothermal at −56.5°C","Cooling at 2°C/1000 ft","Warming at 1°C/1000 ft","Isothermal at −45°C"],"a":0,"e":"Above the ISA tropopause (11 km / 36,090 ft) temperature stays constant at −56.5°C up to 20 km."}]},{"id":"altimetry","title":"Altimetry","cards":[{"t":"The pressure datums","b":"QFE set: altimeter reads HEIGHT above the aerodrome (zero on the runway). QNH set: altimeter reads ALTITUDE above mean sea level (QFE reduced to MSL using ISA). QFF: actual MSL pressure used on synoptic charts. 1013.25 hPa set: altimeter reads PRESSURE ALTITUDE — the basis of flight levels."},{"t":"High to low, look out below","b":"Altimeters are calibrated to ISA. Flying towards LOWER pressure without resetting QNH, or flying in air COLDER than ISA, makes your TRUE altitude LOWER than indicated. Both errors put you closer to terrain than the needle suggests."},{"t":"Temperature error — the 4% rule","b":"True altitude changes about 4% per 10°C of ISA deviation. Colder than ISA → true altitude lower than indicated; warmer → higher. This is why cold-temperature corrections are applied to minimum altitudes in winter."},{"t":"Density altitude","b":"Density altitude = pressure altitude corrected for non-standard temperature: DA ≈ PA + 120 × (OAT − ISA temp). Example: PA 3000 ft, OAT +21°C. ISA at 3000 ft = +9°C, deviation +12 → DA ≈ 3000 + 1440 = 4440 ft."},{"t":"QNH vs QFF","b":"For an aerodrome ABOVE sea level: when colder than ISA, QFF is HIGHER than QNH; when warmer than ISA, QFF is LOWER than QNH. At ISA conditions, or at a sea-level aerodrome, they are equal. (Reverse the rule for aerodromes below sea level.)"},{"t":"Transition altitude & level","b":"Climbing through the TRANSITION ALTITUDE you set 1013 and fly flight levels; descending through the TRANSITION LEVEL you set QNH and fly altitudes. The layer between them is the transition layer — not used for level flight."}],"quiz":[{"q":"You fly from an area of high pressure to low pressure without resetting the altimeter. Your true altitude is:","o":["Lower than indicated","Higher than indicated","Equal to indicated","Unpredictable"],"a":0,"e":"High to low, look out below — the altimeter over-reads, so you are actually lower than indicated."},{"q":"With QFE set, an altimeter on the aerodrome reads:","o":["Zero","Aerodrome elevation","Pressure altitude","Density altitude"],"a":0,"e":"QFE is aerodrome-level pressure, so on the ground the altimeter shows ~0 ft; in flight it shows height above the aerodrome."},{"q":"Flying at an indicated altitude of 2000 ft on a correct QNH in air much colder than ISA, your true altitude is:","o":["Lower than 2000 ft","Higher than 2000 ft","Exactly 2000 ft","Only affected if QNH is wrong"],"a":0,"e":"Cold air is denser and pressure levels are squeezed together — true altitude is lower than indicated even with the correct QNH."},{"q":"Pressure altitude 3000 ft, OAT +21°C. Density altitude is approximately:","o":["4440 ft","3000 ft","3360 ft","5500 ft"],"a":0,"e":"ISA at 3000 ft = +9°C → deviation +12°C. DA = 3000 + (120 × 12) ≈ 4440 ft."},{"q":"An aerodrome is well above sea level and the air is colder than ISA. Compared with QNH, QFF is:","o":["Higher","Lower","Equal","Cannot be determined"],"a":0,"e":"QNH reduces to MSL assuming ISA; reducing through real, colder (denser) air adds more pressure, so QFF > QNH. Remember: above MSL + cold → QFF higher."},{"q":"By approximately how much does true altitude differ from indicated per 10°C of ISA deviation?","o":["4%","1%","10%","0.4%"],"a":0,"e":"The 4% rule: roughly 4% of indicated altitude per 10°C deviation from ISA."}]},{"id":"wind","title":"Wind","cards":[{"t":"Forces on the air","b":"The pressure gradient force (PGF) acts from HIGH to LOW pressure, perpendicular to the isobars. The Coriolis force deflects moving air to the RIGHT in the northern hemisphere, LEFT in the southern — zero at the equator, maximum at the poles."},{"t":"Geostrophic wind","b":"Above the friction layer (~2000–3000 ft) PGF and Coriolis balance, giving a wind that blows PARALLEL to the isobars. It is stronger where isobars are closer together, and — for the same pressure gradient — stronger at LOWER latitudes (inversely proportional to sin latitude)."},{"t":"Gradient wind","b":"Around curved isobars, centripetal force modifies the balance: around a LOW the wind is SLOWER than geostrophic; around a HIGH it is FASTER. So for the same isobar spacing, expect stronger wind around an anticyclone."},{"t":"Surface friction (NH)","b":"Friction slows the wind and reduces Coriolis, so the surface wind BACKS relative to the 2000 ft wind and slows: over land roughly 30° backed and ~50% of the speed; over the sea about 10° backed and ~70%. (Southern hemisphere: it veers instead.) Climbing out, expect the wind to VEER and INCREASE in the NH."},{"t":"Buys Ballot's law","b":"Stand with your BACK to the wind in the northern hemisphere and the LOW pressure is on your LEFT (right in the southern hemisphere). A classic, frequently examined rule of thumb."},{"t":"Local winds","b":"Sea breeze: day, blows from sea to land (onshore). Land breeze: night, offshore, weaker. Anabatic: daytime upslope, weak. Katabatic: night downslope drainage, can be strong. Föhn: air forced over mountains arrives warm and dry on the lee side, with excellent visibility but turbulence."},{"t":"Jet streams","b":"Narrow bands of strong wind (by convention ≥60 kt at the core) just BELOW the tropopause, at breaks between tropopause levels. The polar front jet (40–60° lat) lies on the COLD/polar side above the polar front; the subtropical jet sits near 30°. In the NH, looking downwind, the cold air is on your LEFT."},{"t":"Clear air turbulence","b":"CAT is strongest near jet cores, especially on the COLD (polar) side of the jet, and in curving flow around sharp upper troughs. It is invisible, gives no radar return, and is best escaped by changing level or moving towards the warm side."}],"quiz":[{"q":"Buys Ballot's law (NH): with your back to the wind, low pressure is:","o":["On your left","On your right","Behind you","Ahead of you"],"a":0,"e":"Back to wind in the NH → low on the LEFT. In the SH it is on the right."},{"q":"In the NH, compared with the 2000 ft wind, the surface wind over land is typically:","o":["Backed ~30° and slower","Veered ~30° and slower","Backed ~30° and faster","Veered ~10° and faster"],"a":0,"e":"Friction slows the wind, weakening Coriolis, so it backs ~30° over land (only ~10° over the smoother sea)."},{"q":"Geostrophic wind blows:","o":["Parallel to the isobars","Perpendicular to the isobars towards low pressure","Perpendicular to the isobars towards high pressure","At 45° to the isobars"],"a":0,"e":"PGF and Coriolis balance, leaving a wind parallel to straight isobars — low pressure on the left in the NH."},{"q":"For the same isobar spacing, the gradient wind around a high is:","o":["Faster than geostrophic","Slower than geostrophic","Equal to geostrophic","Always calm"],"a":0,"e":"Around a high, Coriolis must exceed PGF to curve the flow, which requires a faster wind. Around a low it is slower."},{"q":"The polar front jet stream core is found:","o":["Just below the tropopause on the cold air side of the front","At the surface position of the polar front","Well above the tropopause in warm air","In the centre of the warm sector at FL100"],"a":0,"e":"Jets form at tropopause breaks; the PFJ core sits just below the tropopause, in or above the cold air on the polar side."},{"q":"A sea breeze blows:","o":["From sea to land by day","From land to sea by day","From sea to land by night","Only when a front passes"],"a":0,"e":"Land heats faster by day, air rises over it, and cooler maritime air flows in — an onshore wind, strongest mid-afternoon."}]},{"id":"thermo","title":"Thermodynamics & Stability","cards":[{"t":"The three lapse rates","b":"DALR (dry adiabatic): 3°C per 1000 ft — unsaturated rising air. SALR (saturated adiabatic): ~1.8°C per 1000 ft on average, because condensation releases latent heat. ELR (environmental): what the real atmosphere is actually doing; ISA average is 2°C per 1000 ft."},{"t":"Stability rules","b":"Compare the ELR with the adiabatic rates. ELR < SALR (e.g. 1°C/1000 ft): ABSOLUTELY STABLE. ELR > DALR (e.g. 3.5°C/1000 ft): ABSOLUTELY UNSTABLE. ELR between SALR and DALR: CONDITIONALLY UNSTABLE — stable while dry, unstable once saturated."},{"t":"What stability means for flight","b":"Stable air: stratiform cloud, steady precipitation, smooth flight, but poor visibility trapped near the surface. Unstable air: cumuliform cloud, showers, turbulence, but good visibility outside the showers."},{"t":"Inversions","b":"Temperature INCREASING with height — extremely stable. Radiation inversion: clear calm nights near the surface. Subsidence inversion: sinking, warming air in anticyclones, traps haze. Frontal inversion: warm air overrunning cold at a front. Expect wind shear and trapped poor visibility beneath any inversion."},{"t":"Humidity & dew point","b":"Warm air can hold more water vapour. Relative humidity = actual vapour ÷ maximum possible at that temperature. Cool the air and RH rises with no added moisture. The DEW POINT is the temperature to which air must cool (at constant pressure) to become saturated."},{"t":"Temperature/dew point spread","b":"A small spread means the air is close to saturation: expect low cloud bases, mist or fog. Cumulus cloud base can be estimated: base (ft) ≈ 400 × (temperature − dew point) — a 5°C spread suggests a base near 2000 ft."}],"quiz":[{"q":"The dry adiabatic lapse rate is:","o":["3°C per 1000 ft","1.8°C per 1000 ft","2°C per 1000 ft","1°C per 1000 ft"],"a":0,"e":"DALR = 3°C/1000 ft. SALR averages ~1.8, and the ISA ELR is 2."},{"q":"An ELR of 1.5°C per 1000 ft means the atmosphere is:","o":["Absolutely stable","Absolutely unstable","Conditionally unstable","Neutral"],"a":0,"e":"1.5 is less than the SALR (~1.8), so a rising parcel is always colder than its surroundings — absolutely stable."},{"q":"Conditional instability exists when the ELR is:","o":["Between the SALR and the DALR","Greater than the DALR","Less than the SALR","Exactly equal to the DALR"],"a":0,"e":"The parcel is stable while unsaturated but becomes unstable once condensation begins."},{"q":"An inversion is a layer in which temperature:","o":["Increases with height","Decreases at more than 3°C/1000 ft","Remains exactly constant","Equals the dew point"],"a":0,"e":"Temperature rising with height = inversion: very stable, with wind shear and trapped haze/fog beneath it."},{"q":"Air cools overnight with no change in moisture content. Relative humidity:","o":["Increases","Decreases","Stays constant","Falls to zero"],"a":0,"e":"Cooler air can hold less vapour, so the same moisture is a larger fraction of the maximum — RH rises, which is why fog forms near dawn."},{"q":"Surface temperature +20°C, dew point +12°C. The approximate cumulus cloud base is:","o":["3200 ft","1200 ft","8000 ft","400 ft"],"a":0,"e":"Base ≈ 400 × spread = 400 × 8 = 3200 ft."}]},{"id":"clouds","title":"Clouds & Fog","cards":[{"t":"How cloud forms","b":"Air cools to its dew point and condenses onto condensation nuclei. Cooling is usually by lifting: convection (heated surface), orographic (forced over hills), frontal (warm air over cold), convergence (air flowing together), or turbulent mixing under an inversion."},{"t":"The ten genera by level (mid-latitudes)","b":"LOW (surface–6500 ft): stratus ST, stratocumulus SC, cumulus CU, cumulonimbus CB. MEDIUM (6500–23,000 ft): altostratus AS, altocumulus AC, nimbostratus NS (base low, great depth). HIGH (16,500–45,000 ft): cirrus CI, cirrostratus CS, cirrocumulus CC."},{"t":"Cumuliform vs stratiform","b":"Cumuliform = unstable air: showery precipitation, turbulence, good visibility between cells. Stratiform = stable air: continuous precipitation, smooth flight, poor visibility. This single distinction answers a surprising number of exam questions."},{"t":"CB and TCU","b":"Towering cumulus and cumulonimbus contain strong up/downdraughts, severe icing and turbulence, hail and lightning (CB). They are the only two cloud types specifically reported by type in METARs."},{"t":"Lenticular cloud","b":"Smooth lens-shaped altocumulus (ACSL) marks standing MOUNTAIN WAVES. The cloud itself may be smooth, but rotor zones beneath the wave crests, marked by ragged rotor cloud, hold the most violent turbulence."},{"t":"Radiation fog","b":"Forms over LAND on clear nights with light winds (about 2–8 kt) and moist air: the ground radiates heat away, the air above cools to its dew point, and the light wind mixes the fog into a layer. Cleared by the sun heating the ground or the wind strengthening."},{"t":"Advection fog","b":"Warm moist air flows over a COLDER surface (sea or snow-covered land) and is cooled to saturation. Unlike radiation fog it can form day or night, over sea or land, and can PERSIST with winds up to ~15 kt. Cause of sea fog."},{"t":"Other fogs, mist & haze","b":"Steaming fog (arctic smoke): very cold air over warm water. Frontal fog: ahead of a warm front as rain saturates the cold air. Definitions: FOG = visibility below 1000 m; MIST = 1000–5000 m with high humidity; HAZE = dry particles."}],"quiz":[{"q":"Conditions favouring radiation fog are:","o":["Clear night, light wind 2–8 kt, moist air over land","Overcast night, strong wind, dry air","Warm air flowing over a cold sea","Daytime heating with strong convection"],"a":0,"e":"Clear skies allow radiative cooling, light wind mixes the cooled layer, and moist air saturates quickly — classic radiation fog recipe."},{"q":"Advection fog differs from radiation fog in that it:","o":["Can persist with moderate winds and form over the sea","Only forms at night","Requires clear skies","Never reduces visibility below 1000 m"],"a":0,"e":"Advection fog needs warm moist air moving over a cold surface — it survives winds up to ~15 kt and is the usual sea fog."},{"q":"By definition, fog is present when visibility is below:","o":["1000 m","5000 m","1500 m","3000 m"],"a":0,"e":"Vis < 1000 m = fog. 1000–5000 m with high humidity = mist (BR)."},{"q":"Continuous, prolonged moderate rain most likely falls from:","o":["Nimbostratus","Cumulus","Cirrostratus","Stratocumulus"],"a":0,"e":"NS is the deep, dark, layered rain cloud of warm fronts — continuous precipitation, not showers."},{"q":"Lenticular clouds indicate:","o":["Standing mountain waves","An approaching warm front","Strong surface convection","Imminent thunderstorms"],"a":0,"e":"ACSL forms at the crests of standing waves downwind of ridges — expect wave activity and rotor turbulence below."},{"q":"Which group contains only LOW-level cloud types?","o":["ST, SC, CU, CB","AS, AC, NS","CI, CS, CC","ST, AS, CI"],"a":0,"e":"Low étage (surface–6500 ft): stratus, stratocumulus, cumulus, cumulonimbus. CI/CS/CC are high; AS/AC are medium."}]},{"id":"precip","title":"Precipitation","cards":[{"t":"Bergeron (ice-crystal) process","b":"In mid-latitude clouds, supercooled water droplets and ice crystals coexist below 0°C. Because saturation vapour pressure is lower over ice, crystals grow at the droplets' expense, then fall and grow further. The dominant rain process outside the tropics."},{"t":"Coalescence process","b":"In warm tropical clouds with no ice, larger droplets fall faster, collide with and absorb smaller ones until heavy drops fall out. Explains heavy rain from clouds entirely warmer than 0°C."},{"t":"Match the precipitation to the cloud","b":"Drizzle (DZ): stratus. Continuous rain/snow: nimbostratus or thick altostratus (frontal). Showers (SH): cumulus or cumulonimbus — showers ALWAYS mean convective cloud. Hail (GR): cumulonimbus only."},{"t":"Freezing rain","b":"Rain falls from warm air aloft (typically ahead of a warm front in winter) into sub-zero air below, becoming supercooled. It freezes on impact as CLEAR ICE — the most dangerous airframe icing. The give-away: rain with surface temperatures at or below 0°C."},{"t":"Hail & virga","b":"Hail needs the violent updraughts of a CB to carry stones through repeated freezing cycles — large hail means a severe storm. Virga is precipitation evaporating before reaching the ground; the evaporative cooling beneath can produce strong downdraughts."},{"t":"Snow facts","b":"Snow is most likely with surface temperatures around +1°C or below. Wet snow near 0°C sticks to airframes; dry snow at lower temperatures generally does not adhere."}],"quiz":[{"q":"Showery precipitation always indicates:","o":["Convective (cumuliform) cloud","Stratiform cloud","An inversion","Cirrus layers"],"a":0,"e":"Showers come from CU/CB. Continuous precipitation comes from stratiform cloud — a core exam distinction."},{"q":"Freezing rain encountered in flight produces:","o":["Rapid clear ice accretion","Light rime icing","Hoar frost","No icing if airspeed is high"],"a":0,"e":"Large supercooled drops spread before freezing — fast-building clear ice, the most hazardous form. Escape it promptly."},{"q":"The Bergeron process requires:","o":["Ice crystals and supercooled droplets coexisting","Cloud entirely warmer than 0°C","Strong surface winds","Dry air aloft"],"a":0,"e":"Vapour deposits preferentially onto ice (lower saturation vapour pressure over ice), so crystals grow at the droplets' expense."},{"q":"Drizzle typically falls from:","o":["Stratus","Cumulonimbus","Altocumulus","Cirrostratus"],"a":0,"e":"Tiny droplets can only survive the short fall from low stratus; deeper cloud produces proper rain."},{"q":"Large hail is direct evidence of:","o":["Very strong updraughts in a CB","A stable atmosphere","Warm-front nimbostratus","High-level cirrus"],"a":0,"e":"Only powerful CB updraughts can recirculate stones long enough to grow large hail — treat it as a severe-storm marker."},{"q":"Freezing rain ahead of a winter warm front tells you that:","o":["Warmer air (above 0°C) lies above the cold surface layer","The whole atmosphere is below 0°C","The front has already passed","Only rime ice is possible"],"a":0,"e":"The rain must have formed as liquid in warm air aloft and fallen into the sub-zero layer below — a classic warm-front-in-winter signature."}]},{"id":"fronts","title":"Air Masses & Fronts","cards":[{"t":"Air masses","b":"Classified by moisture (maritime m / continental c) and source latitude (arctic A, polar P, tropical T). mP air warming from below over sea becomes unstable: cumulus and showers, good visibility. mT air cooling from below becomes stable: stratus, drizzle, poor visibility, advection fog."},{"t":"The warm front","b":"Warm air overruns cold at a shallow slope of about 1:150. Cloud lowers in sequence: CI → CS → AS → NS, with cirrus appearing up to ~600 NM ahead and continuous rain in the last ~200 NM. Pressure falls steadily ahead; wind veers (NH) and the rain eases as it passes."},{"t":"The cold front","b":"Cold air undercuts warm at a steep ~1:50 slope and moves faster than the warm front. Expect a narrow band of CB, heavy showers and possibly thunderstorms. On passage: wind VEERS sharply (NH), pressure RISES quickly, temperature drops, visibility improves dramatically behind."},{"t":"The warm sector & occlusion","b":"Between the fronts lies the warm sector: mild, humid, stratiform cloud, drizzle. Because the cold front travels faster it eventually catches the warm front, lifting the warm sector off the ground — an OCCLUSION (cold occlusion if the air behind is colder than the air ahead; warm occlusion if less cold)."},{"t":"Polar front depressions","b":"Mid-latitude lows form as waves on the polar front, deepen, occlude and fill — typically travelling east/northeast, steered roughly parallel to the warm-sector isobars. They arrive in families, each low slightly further south than the last."},{"t":"Recognising frontal passage from the cockpit","b":"Warm front: long cloud lowering sequence, steady rain, gradual veer. Cold front: short sharp event — CB line, squalls, marked veer, rapid pressure rise, colder clearer air. In the SH winds BACK on frontal passage instead."}],"quiz":[{"q":"The cloud sequence observed as a warm front approaches is:","o":["CI, CS, AS, NS","CB, NS, AS, CI","CU, SC, ST, CB","NS, AS, CS, CI"],"a":0,"e":"High cirrus first (~600 NM ahead), thickening and lowering through cirrostratus and altostratus to rain-bearing nimbostratus."},{"q":"As a cold front passes in the northern hemisphere:","o":["Wind veers and pressure rises rapidly","Wind backs and pressure falls","Wind veers and pressure falls","Wind is unchanged"],"a":0,"e":"The sharp veer plus a rapid pressure rise (and a temperature drop) is the textbook NH cold-front passage."},{"q":"The typical slope of a warm front is about:","o":["1:150","1:50","1:10","1:500"],"a":0,"e":"Warm fronts are shallow (~1:150) giving the long cloud sequence; cold fronts are steeper (~1:50) giving a narrow violent band."},{"q":"An occlusion forms when:","o":["The cold front catches up with the warm front","The warm front accelerates away","Two highs merge","The polar front jet descends to the surface"],"a":0,"e":"The faster cold front overtakes the warm front, lifting the warm sector air clear of the surface."},{"q":"Maritime polar air moving south over a warm sea becomes:","o":["Unstable, with cumulus, showers and good visibility","Stable, with stratus and drizzle","Saturated, with widespread fog","Cloudless and calm"],"a":0,"e":"Heating from below steepens the lapse rate: convection, CU/CB, showers — but excellent visibility between them."},{"q":"A family of polar front depressions generally moves:","o":["East to northeast, parallel to the warm sector isobars","West, against the upper winds","Directly north along the front","It remains stationary"],"a":0,"e":"Mid-latitude lows are steered by the upper westerlies, tracking roughly with the warm-sector isobars."}]},{"id":"pressure","title":"Pressure Systems","cards":[{"t":"Depressions (lows)","b":"Air converges at the surface and RISES, cooling adiabatically: cloud, precipitation, generally poor flying weather. Winds circulate anticlockwise around a low in the NH (clockwise SH), strengthening towards the centre where isobars tighten."},{"t":"Anticyclones (highs)","b":"Air SUBSIDES and diverges at the surface: warming, drying, cloud suppressed — usually fine, settled weather with light winds, circulating clockwise in the NH. But subsidence creates an inversion that traps moisture and pollutants below it."},{"t":"Anticyclonic gloom","b":"In winter highs, the subsidence inversion traps haze, stratus and fog for days: poor surface visibility despite the 'good weather' system. Summer highs give hot clear days, possibly with haze. A favourite exam trap: highs do NOT guarantee good visibility."},{"t":"Ridges, troughs and cols","b":"Ridge: elongated extension of high pressure — brief fine weather between systems. Trough: elongated extension of low pressure — lifting, cloud and showers, often marking a front or a line of CB. Col: the quiet, slack region between two highs and two lows — light winds, fog in winter, thunderstorms possible in summer."},{"t":"Secondary lows & thermal lows","b":"Secondary depressions form within the circulation of a parent low, often on a trailing cold front, and can deepen rapidly. Thermal lows form by summer surface heating (e.g. over Iberia) — afternoon thunderstorms; monsoon lows are the large-scale version."},{"t":"Blocking highs","b":"A large, slow-moving warm anticyclone can 'block' the westerlies, deflecting depressions around it and locking the same weather in place for a week or more — persistent heat in summer, persistent freezing fog in winter."}],"quiz":[{"q":"Around a low in the northern hemisphere, the surface wind circulates:","o":["Anticlockwise, slightly across the isobars towards the centre","Clockwise, parallel to the isobars","Anticlockwise, away from the centre","Clockwise, towards the centre"],"a":0,"e":"NH lows: anticlockwise flow, with friction angling the surface wind slightly inwards (convergence — hence the rising air)."},{"q":"Visibility in a winter anticyclone is often poor because:","o":["A subsidence inversion traps haze and fog near the surface","Strong winds raise dust","Continuous frontal rain falls","Convection lifts moisture to high levels"],"a":0,"e":"Sinking air warms aloft and forms an inversion lid — anticyclonic gloom: fog, haze and stratus trapped below."},{"q":"A trough of low pressure is typically associated with:","o":["Lifting air, cloud and showers","Subsidence and clear skies","Calm winds and fog only","No weather significance"],"a":0,"e":"Troughs concentrate convergence and lifting, often marking fronts or organised lines of showers/CB."},{"q":"A col is:","o":["The slack area between two highs and two lows","The centre of an occluding depression","An upper-level jet core","A rapidly deepening secondary low"],"a":0,"e":"Light, variable winds: fog-prone in winter, thunder-prone in summer heat."},{"q":"In an anticyclone, the air at altitude is generally:","o":["Subsiding and warming adiabatically","Rising and cooling adiabatically","Saturated and unstable","Stationary"],"a":0,"e":"Subsidence is the defining process of a high — it dries the air, suppresses cloud, and builds the inversion."},{"q":"A blocking high typically results in:","o":["The same weather persisting for many days","A rapid succession of fronts","Daily thunderstorms in winter","Strong steady westerlies"],"a":0,"e":"It diverts the depression track, so whatever weather it brings — summer heat or winter fog — persists."}]},{"id":"climo","title":"Climatology","cards":[{"t":"Global circulation","b":"Hadley cells: air rises at the equator, descends near 30° (subtropical highs/desert belts). Between them blow the TRADE WINDS: northeasterly in the NH, southeasterly in the SH. Poleward of the subtropical highs lie the mid-latitude westerlies and the polar front."},{"t":"The ITCZ","b":"The Inter-Tropical Convergence Zone is where the trade winds meet: a belt of massive CB clusters, heavy showers and thunderstorms reaching above FL500. It migrates seasonally, following the overhead sun with a lag — further north in July, further south in January, moving more over land than sea."},{"t":"Monsoons","b":"Seasonal wind reversal driven by differential heating of land and ocean. India: the SW monsoon (roughly June–September) brings humid oceanic air and torrential rain; the winter NE monsoon brings dry continental air. Similar regimes affect SE Asia and West Africa."},{"t":"Tropical revolving storms — formation","b":"Require sea surface temperature of about 26–27°C or more through a deep layer, a latitude beyond ~5° (enough Coriolis to spin), high humidity and weak vertical wind shear. They form in late summer/autumn over the western sides of oceans and weaken rapidly over land."},{"t":"TRS names & regions","b":"Same phenomenon, regional names: HURRICANE (North Atlantic & NE Pacific), TYPHOON (NW Pacific), CYCLONE (Indian Ocean & Australia). Structure: a calm, warm, often clear EYE surrounded by the eye wall — the most violent winds and weather."},{"t":"Local winds worth knowing","b":"Harmattan: dry, dusty NE wind over West Africa (haze, poor vis). Mistral: strong, cold N wind funnelling down the Rhône valley. Bora: cold, violent NE wind on the Adriatic coast. Sirocco: hot southerly from the Sahara towards the Mediterranean."}],"quiz":[{"q":"The trade winds in the northern hemisphere blow from the:","o":["Northeast","Southwest","Southeast","Northwest"],"a":0,"e":"Air flowing from the subtropical highs towards the equatorial low is deflected right in the NH → NE trades (SE in the SH)."},{"q":"The ITCZ:","o":["Migrates seasonally, following the overhead sun","Is fixed on the geographic equator","Only exists over the Atlantic","Is a zone of subsiding dry air"],"a":0,"e":"It follows the thermal equator with a lag, shifting much further over land — bringing the wet seasons with it."},{"q":"The Indian SW monsoon (June–September) brings:","o":["Humid oceanic air and heavy rain","Dry continental air and clear skies","Cold polar outbreaks","Light easterly winds and drought"],"a":0,"e":"Intense heating over Asia draws moist Indian Ocean air across the subcontinent — the wet monsoon."},{"q":"Tropical revolving storms require:","o":["SST ≥ ~27°C and latitude beyond about 5°","Cold ocean currents and strong shear","A position exactly on the equator","Continental desert surfaces"],"a":0,"e":"Warm deep ocean water for energy, plus enough Coriolis (>~5° latitude) to organise rotation; strong shear tears them apart."},{"q":"A severe TRS in the northwest Pacific is called a:","o":["Typhoon","Hurricane","Willy-willy","Mistral"],"a":0,"e":"NW Pacific = typhoon; N Atlantic/NE Pacific = hurricane; Indian Ocean/Australia = cyclone."},{"q":"The Harmattan affects West Africa with:","o":["Dry, dusty NE winds and poor visibility","Heavy monsoon rain","Freezing katabatic flow","Coastal sea fog"],"a":0,"e":"A dry, dust-laden wind off the Sahara — visibility can fall dramatically in haze, a real operational factor in the region."}]},{"id":"hazards","title":"Flight Hazards","cards":[{"t":"Airframe icing — types","b":"CLEAR ICE: large supercooled drops, 0 to −10°C, in CB/CU or freezing rain — heavy, strong, spreads back, hardest to remove, MOST dangerous. RIME ICE: small droplets, roughly −10 to −40°C, in stratiform cloud — brittle, opaque, forms on leading edges. MIXED ice combines both. HOAR FROST: deposition on a cold-soaked airframe in clear humid air (or on the ground)."},{"t":"Where icing is worst","b":"The greatest supercooled water content is found between 0 and about −15°C, especially in cumuliform cloud with strong updraughts. Freezing rain beneath a winter warm front gives the most rapid accretion of all. Below about −40°C nearly everything is already ice crystals — little airframe icing."},{"t":"Carburettor icing","b":"Can occur with OAT as high as +25 to +30°C, whenever humidity is high — fuel evaporation and venturi expansion can drop the carb temperature by over 20°C. Greatest risk: high humidity, low power settings (descent)."},{"t":"Thunderstorm requirements & stages","b":"Three ingredients: instability through a deep layer, sufficient moisture, and a lifting trigger (heating, front, orography, convergence). Life cycle — CUMULUS stage: updraughts only. MATURE stage: updraughts AND downdraughts, precipitation begins, ALL hazards at maximum. DISSIPATING stage: downdraughts only, anvil spreads."},{"t":"Thunderstorm hazards & avoidance","b":"Severe turbulence and icing, hail (can be thrown out under the anvil), lightning, heavy rain, wind shear, microbursts, tornadoes. Avoid severe CB by at least 10 NM (more if the radar picture is severe), never fly beneath the cell or under the anvil, and don't rely on overflying unless clearance is generous."},{"t":"Microbursts","b":"An intense, concentrated downdraught (less than ~4 km across, lasting ~5–15 minutes) beneath convective cloud — sometimes from virga with no rain at the surface. On approach the sequence is: HEADWIND gain → strong DOWNDRAUGHT → TAILWIND and sink. Performance-increasing shear first, then a severe performance loss. Go around early."},{"t":"Turbulence types","b":"Convective/thermal: sunny days, low level. Mechanical: friction and obstacles in strong wind. CAT: near jet streams and sharp upper troughs — invisible, no radar echo. Mountain waves: lee of ridges with strong perpendicular wind and a stable layer; worst turbulence in ROTORS below the wave crests. Wake turbulence: behind heavy, slow, clean aircraft."},{"t":"Wind shear","b":"A sudden change of wind speed/direction over a short distance — most dangerous on approach and departure. Sources: thunderstorms and microbursts, frontal passages, low-level inversions (including nocturnal jets above radiation inversions), terrain, and sea-breeze fronts. Report and respond immediately: full thrust, follow the escape manoeuvre."}],"quiz":[{"q":"Clear ice forms most readily:","o":["In large supercooled drops between 0 and −10°C","In tiny droplets at −30°C","In ice-crystal cloud at −45°C","Only on the ground"],"a":0,"e":"Large drops spread before freezing into a heavy transparent sheet — typical of CB, CU and freezing rain. Rime forms at colder temperatures from small droplets."},{"q":"All thunderstorm hazards reach maximum intensity during the:","o":["Mature stage","Cumulus stage","Dissipating stage","Anvil stage"],"a":0,"e":"The mature stage has coexisting up- and downdraughts, the onset of precipitation, the worst turbulence, icing, hail and shear."},{"q":"Flying through a microburst on approach, the sequence experienced is:","o":["Headwind gain, downdraught, tailwind and sink","Tailwind, updraught, headwind","Steady crosswind throughout","Updraught only"],"a":0,"e":"The outflow gives an initial performance GAIN (headwind), then the core downdraught, then a tailwind with serious performance loss — the classic accident trap."},{"q":"Clear air turbulence is most likely:","o":["Near a jet stream core, on its cold side","Inside a CB","Under a sea-breeze front","In the centre of a winter high"],"a":0,"e":"CAT concentrates around jet cores and sharp upper troughs — invisible and not detectable by weather radar."},{"q":"Carburettor icing is possible:","o":["At OATs up to about +30°C in humid air","Only below 0°C","Only in cloud","Only with water in the fuel"],"a":0,"e":"Evaporation plus venturi expansion can cool the carburettor by 20°C or more — descent power in humid air is the classic scenario."},{"q":"A severe cumulonimbus should be avoided laterally by at least:","o":["10 NM","1 NM","3 NM","100 NM"],"a":0,"e":"10 NM minimum for severe cells — hail can be ejected well beyond the visible cloud, especially downwind under the anvil."},{"q":"The most violent turbulence in a mountain wave system is found:","o":["In rotor zones beneath the wave crests","In the smooth lenticular cloud","At the tropopause","On the windward slope only"],"a":0,"e":"Rotors — sometimes marked by ragged cloud below the lenticulars — can exceed aircraft structural limits at low level."}]},{"id":"codes","title":"METAR, TAF & Met Information","cards":[{"t":"The documents","b":"METAR: routine actual report, every 30 or 60 minutes. SPECI: special report on significant change. TAF: aerodrome forecast (9, 24 or 30 hr validity). TREND: 2-hour landing forecast appended to a METAR (BECMG/TEMPO/NOSIG). SIGMET: en-route hazardous weather warning. VOLMET/ATIS: broadcast met information."},{"t":"METAR walk-through","b":"EIDW 111330Z 24015G27KT 200V280 9999 -SHRA SCT018 BKN030CB 14/09 Q1008 — Dublin, 11th 1330 UTC, wind 240°/15 kt gusting 27, varying 200–280°, visibility 10 km+, light rain showers, scattered cloud 1800 ft, broken CB at 3000 ft, temperature 14, dew point 9, QNH 1008."},{"t":"Weather codes","b":"Intensity: '-' light, none = moderate, '+' heavy. Descriptors: SH showers, TS thunderstorm, FZ freezing, MI shallow, BC patches. Phenomena: RA rain, DZ drizzle, SN snow, GR hail, GS small hail, BR mist, FG fog, HZ haze, FU smoke, VA volcanic ash, SQ squall, FC funnel cloud. So −FZDZ = light freezing drizzle."},{"t":"Cloud & CAVOK","b":"Cloud amount in oktas: FEW 1–2, SCT 3–4, BKN 5–7, OVC 8, heights in hundreds of feet, with CB or TCU appended. CAVOK replaces visibility, weather and cloud when ALL of: visibility ≥10 km, no cloud below 5000 ft or below the highest minimum sector altitude (whichever is greater), no CB or TCU at any height, and no significant weather."},{"t":"TAF change groups","b":"FM (from): rapid, lasting change — everything after it applies. BECMG: gradual change to new conditions within the period given, then persisting. TEMPO: temporary fluctuations lasting less than one hour at a time (and in total less than half the period). PROB30/PROB40: 30% or 40% probability — never PROB50 or higher."},{"t":"Warnings","b":"SIGMET: thunderstorm areas, severe turbulence or icing, mountain waves, dust/sandstorms, volcanic ash, TRS — valid usually up to 4 hours (6 for ash/TRS). AIRMET: lower-intensity en-route weather for low-level flights. Aerodrome warnings cover hazards to parked aircraft; wind shear warnings cover the climb-out/approach paths."}],"quiz":[{"q":"CAVOK requires, among other things:","o":["Visibility ≥10 km and no cloud below 5000 ft or MSA, whichever is higher","Visibility ≥5 km and no cloud below 2000 ft","Sky clear at all levels and any visibility","No wind above 10 kt"],"a":0,"e":"Vis ≥10 km, no cloud below 5000 ft/highest MSA, no CB or TCU anywhere, no significant weather — all four must hold."},{"q":"In a TAF, TEMPO indicates fluctuations that:","o":["Last less than one hour at a time and under half the period in total","Persist for the rest of the validity","Are certain to occur exactly once","Apply only to wind"],"a":0,"e":"TEMPO = temporary fluctuations, each spell under an hour, totalling less than half the quoted period; lasting changes use BECMG or FM."},{"q":"BKN030CB in a METAR means:","o":["5–7 oktas of cumulonimbus with base 3000 ft","1–2 oktas of cloud at 30,000 ft","8 oktas at 3000 ft","Broken cloud at 300 ft"],"a":0,"e":"BKN = 5–7 oktas; 030 = 3000 ft above aerodrome level; CB identifies the cloud type."},{"q":"The code −FZDZ decodes as:","o":["Light freezing drizzle","Heavy frozen drizzle","Light fog and drizzle","Freezing dust"],"a":0,"e":"'−' light, FZ freezing, DZ drizzle — expect clear icing at the surface and on approach."},{"q":"A SIGMET is issued for:","o":["En-route hazards such as severe turbulence, severe icing or thunderstorm areas","Routine hourly observations","Any rain at an aerodrome","Runway surface conditions"],"a":0,"e":"SIGMETs warn of significant en-route weather: TS areas, severe turbulence/icing, mountain waves, ash, TRS."},{"q":"Q1008 in a METAR gives:","o":["QNH 1008 hPa","QFE 1008 hPa","QFF 1008 hPa","Pressure altitude 1008 ft"],"a":0,"e":"The Q group is always QNH in whole hectopascals — set it and the altimeter reads altitude AMSL."},{"q":"Probability groups in a TAF may only be:","o":["PROB30 or PROB40","PROB10 to PROB90","PROB50 only","PROB25 or PROB75"],"a":0,"e":"Below 30% it is omitted; at 50% or more the forecaster must commit with BECMG/TEMPO/FM instead."}]},{"id":"charts","title":"SigWx & Upper Wind Charts","cards":[{"t":"The significant weather chart (SWC)","b":"High-level SIGWX charts (typically FL250–FL630) show forecast en-route hazards: CB areas, jet streams, tropopause heights, CAT areas, fronts, volcanic ash and tropical cyclones. Scalloped lines enclose areas of significant cloud or weather, with vertical extent given as top-over-base flight levels (XXX over the base means the top is above the chart's upper limit)."},{"t":"CB coverage terms","b":"ISOL (isolated): individual cells, coverage less than 50% of the area. OCNL (occasional): well-separated cells, 50–75%. FRQ (frequent): little or no separation, more than 75%. EMBD: CB embedded in other cloud layers — you cannot see or visually avoid them. On high-level charts only CB is shown by type."},{"t":"CB implies the rest","b":"A forecast of CB on a SIGWX chart automatically implies moderate or severe icing, turbulence and hail — so these are NOT marked separately inside CB areas. Separate icing or turbulence symbols on the chart therefore always refer to areas OUTSIDE the CBs."},{"t":"Jet streams on the chart","b":"A heavy solid line with an arrowhead shows the jet axis. Wind speed at the core is shown with pennants (50 kt), full feathers (10 kt) and half feathers (5 kt), plus the core flight level. A double bar across the axis marks a significant change (≥20 kt) in speed along the jet. Vertical extent may be given, e.g. FL340 with limits showing the depth of strong winds."},{"t":"Tropopause & CAT boxes","b":"Tropopause heights appear as flight levels inside small rectangles at spot points; H in a polygon marks a local high point, L a local low point of the tropopause. CAT areas are enclosed by heavy dashed lines and numbered, with a legend giving the affected flight levels and intensity."},{"t":"Upper wind & temperature charts","b":"Wind arrows fly WITH the wind: pennant = 50 kt, full feather = 10 kt, half = 5 kt. Temperatures at grid points are in whole degrees Celsius and are NEGATIVE unless prefixed PS (plus). Charts are issued for standard levels, e.g. FL050, 100, 180, 240, 300, 340, 390."},{"t":"Using wind charts for planning","b":"Read the spot wind nearest your route, interpolate between levels and points as needed. Remember the strongest westerly jets sit near FL300–FL340 in mid-latitudes — eastbound flights ride them, westbound flights route to avoid the core, and the strongest shear (CAT) lies on the cold/polar side."}],"quiz":[{"q":"On a high-level SIGWX chart, OCNL CB means coverage of:","o":["50–75% with well-separated cells","Less than 25%","More than 75% with no separation","Exactly one cell"],"a":0,"e":"ISOL <50%, OCNL 50–75%, FRQ >75%. EMBD means hidden in other cloud layers."},{"q":"A CB area forecast on a SIGWX chart implies:","o":["Moderate/severe icing, turbulence and hail without separate symbols","Light icing only","No turbulence outside the cloud","Good visibility at all levels"],"a":0,"e":"CB automatically includes its hazards, so separate icing/turbulence symbols always refer to areas outside the CBs."},{"q":"On a wind arrow, a pennant, a full feather and a half feather represent:","o":["50, 10 and 5 kt","100, 50 and 10 kt","25, 10 and 5 kt","50, 25 and 5 kt"],"a":0,"e":"Pennant 50 kt, feather 10 kt, half-feather 5 kt — add them up for the spot wind speed."},{"q":"A temperature of 45 printed without prefix on an upper-level chart means:","o":["−45°C","+45°C","45°F","ISA +45"],"a":0,"e":"Upper-air temperatures are negative unless prefixed PS (plus) — at cruising levels they almost always are."},{"q":"A rectangle containing 380 on a SIGWX chart indicates:","o":["Tropopause height FL380 at that point","A CB top at FL380","Minimum safe altitude 38,000 ft","QNH 380 hPa"],"a":0,"e":"Spot tropopause heights are boxed; H and L mark local high and low points of the tropopause."},{"q":"EMBD CB is particularly hazardous because:","o":["The cells are hidden in other cloud and cannot be visually avoided","It never contains hail","It only occurs at night","It indicates dissipating storms"],"a":0,"e":"Embedded CBs hide inside layered cloud — weather radar becomes essential for avoidance."}]},{"id":"snowtam","title":"SNOWTAM & Runway Reports","cards":[{"t":"The Global Reporting Format (GRF)","b":"Since November 2021, runway surface conditions are reported using the GRF: a Runway Condition Report (RCR) produced by the aerodrome, giving a Runway Condition Code (RWYCC) for EACH THIRD of the runway, plus contaminant type, depth and coverage. Distributed via SNOWTAM, ATIS and ATC."},{"t":"Runway condition codes","b":"RWYCC scale 6 to 0: 6 = dry. 5 = frost, or wet/slush/dry snow/wet snow up to 3 mm deep. 4 = compacted snow at OAT −15°C or below. 3 = wet ('slippery wet') runway, dry/wet snow over 3 mm, or compacted snow above −15°C. 2 = standing water or slush deeper than 3 mm. 1 = ice. 0 = wet ice, water on compacted snow — braking minimal to non-existent."},{"t":"Braking action terms","b":"Pilot reports (AIREPs) use: GOOD (5), GOOD TO MEDIUM (4), MEDIUM (3), MEDIUM TO POOR (2), POOR (1), LESS THAN POOR (0). A pilot report of braking poorer than the published RWYCC can trigger a downgrade of the code."},{"t":"Contamination figures","b":"A runway is considered CONTAMINATED when more than 25% of the surface area (within the reported length and width) is covered. Coverage is reported in steps: 25, 50, 75 and 100%. Depth is reported in millimetres for water, slush and snow."},{"t":"SNOWTAM essentials","b":"A SNOWTAM is a special series NOTAM giving the surface condition report. Maximum validity: 8 hours, and a new one is issued whenever conditions change significantly. The aircraft performance section (for each third) is what your performance calculations use."},{"t":"Operational use","b":"Match the reported RWYCC to your aircraft's landing performance tables (TALPA-based). Remember the runway thirds are reported in the direction of the lower runway designator — check which third is your touchdown zone for the runway in use."}],"quiz":[{"q":"A runway is officially contaminated when coverage exceeds:","o":["25%","10%","50%","75%"],"a":0,"e":"More than 25% coverage (within reported length/width) = contaminated; coverage is then reported as 25, 50, 75 or 100%."},{"q":"RWYCC 6 corresponds to:","o":["A dry runway","Wet ice","Standing water","Compacted snow"],"a":0,"e":"The scale runs 6 (dry) down to 0 (wet ice / minimal braking)."},{"q":"RWYCC 1 corresponds to:","o":["Ice","Frost","A damp runway","Dry snow up to 3 mm"],"a":0,"e":"1 = ice; 0 is even worse — wet ice or water on compacted snow."},{"q":"Runway condition codes are reported:","o":["For each third of the runway","As a single average value","Only for the touchdown zone","Only when snow is falling"],"a":0,"e":"The RCR gives a RWYCC per third, plus contaminant type, depth and coverage."},{"q":"The maximum validity of a SNOWTAM is:","o":["8 hours","24 hours","1 hour","Until the next METAR"],"a":0,"e":"8 hours maximum, with a replacement issued whenever the surface condition changes significantly."},{"q":"A pilot braking action report of MEDIUM equates to RWYCC:","o":["3","5","1","6"],"a":0,"e":"GOOD=5, GOOD TO MEDIUM=4, MEDIUM=3, MEDIUM TO POOR=2, POOR=1, LESS THAN POOR=0."}]},{"id":"space","title":"Space Weather","cards":[{"t":"What space weather is","b":"Disturbances from the Sun — solar flares, solar energetic particle events and coronal mass ejections (CMEs) — that affect aviation through HF communications, GNSS accuracy and radiation dose. A required topic in the current EASA syllabus."},{"t":"Solar flares → HF blackout","b":"A flare's X-ray burst reaches Earth in about 8 minutes and ionises the dayside ionosphere: sudden absorption of HF radio on the SUNLIT side of the Earth, lasting minutes to a couple of hours. No warning time — effects are essentially immediate."},{"t":"Radiation (proton) storms","b":"Energetic particles arrive from tens of minutes to hours after a major event. Effects: increased radiation dose for crew and passengers (worst at HIGH latitudes and HIGH altitudes, where the geomagnetic field gives least protection), possible single-event upsets in avionics, and degraded HF at the poles (polar cap absorption)."},{"t":"Geomagnetic storms → GNSS trouble","b":"A CME takes roughly 1–3 days to arrive. The disturbed ionosphere degrades GNSS accuracy and availability (scintillation), disrupts HF — especially at high latitudes — and produces aurora. RAIM and SBAS performance can suffer."},{"t":"Advisories & who issues them","b":"ICAO designated global Space Weather Centres (consortiums such as PECASUS, the US SWPC-led group and ACFJ) issue SPACE WEATHER ADVISORIES for three effect areas: HF COM, GNSS, and RADIATION, with intensities MOD (moderate) or SEV (severe), similar in format to volcanic ash advisories."},{"t":"Mitigation on polar routes","b":"Operators flying polar or high-latitude routes respond by descending to lower flight levels (less radiation), re-routing to lower latitudes, ensuring SATCOM/CPDLC alternatives to HF, and applying GNSS-degradation procedures. Pregnant crew dose limits make radiation events a real rostering issue."}],"quiz":[{"q":"The X-ray burst from a solar flare causes:","o":["HF blackout on the sunlit side, almost immediately","GNSS failure three days later","Engine icing","Increased VHF range"],"a":0,"e":"X-rays travel at light speed (~8 min) and ionise the dayside D-layer — sudden HF absorption with no usable warning."},{"q":"Radiation dose from a solar particle event is greatest:","o":["At high latitudes and high altitudes","At the equator at low level","Over the oceans only","At night"],"a":0,"e":"The geomagnetic field funnels particles towards the poles, and less atmosphere overhead means less shielding at altitude."},{"q":"A coronal mass ejection typically reaches Earth in:","o":["About 1–3 days","8 minutes","Less than an hour","Two weeks"],"a":0,"e":"Flares: ~8 min (X-rays). Particles: tens of minutes to hours. CME plasma cloud: ~1–3 days — driving geomagnetic storms."},{"q":"ICAO space weather advisories cover the effect areas:","o":["HF COM, GNSS and radiation","Icing, turbulence and ash","Only satellite TV","Runway condition and braking"],"a":0,"e":"Advisories address HF communications, GNSS-based navigation/surveillance, and radiation at flight levels, graded MOD or SEV."},{"q":"A common mitigation during a severe radiation event on a polar route is:","o":["Descend and/or re-route to lower latitudes","Climb to be above the radiation","Switch off weather radar","Accelerate to minimise exposure time"],"a":0,"e":"Lower altitude adds atmospheric shielding; lower latitude adds geomagnetic shielding. You cannot out-climb cosmic radiation."},{"q":"During a geomagnetic storm, GNSS performance:","o":["Can degrade due to ionospheric scintillation","Always improves","Is unaffected","Fails only below FL100"],"a":0,"e":"Ionospheric disturbance causes ranging errors and signal scintillation — RAIM/SBAS integrity can be affected, especially at high latitudes."}]},{"id":"routes","title":"Route Climatology","cards":[{"t":"North Atlantic — winter","b":"The season of vigorous polar front depressions tracking towards Iceland (the Icelandic low), with a strong westerly jet often exceeding 150 kt. Eastbound flights are much faster; expect CAT near the jet, en-route icing and turbulence, and Atlantic lows sweeping fronts across Ireland and the UK every couple of days."},{"t":"North Atlantic — summer","b":"The Azores high strengthens and ridges north: weaker, less frequent depressions, a weaker jet displaced poleward, and a higher chance of advection sea fog off Newfoundland (warm Gulf Stream air over the cold Labrador current). Hurricanes recurving northeast can disturb the western Atlantic in late summer/autumn."},{"t":"Europe & Ireland/UK specifics","b":"Dominated by maritime air masses off the Atlantic. mP air: showery, good visibility. mT air: stratus, drizzle, hill fog and advection fog — the classic 'warm sector' weather. Winter anticyclones bring radiation fog and freezing fog inland; summer continental highs bring heat and afternoon thunderstorms."},{"t":"The Mediterranean","b":"Winter: an active secondary depression area — the Genoa low forms in the lee of the Alps, bringing heavy rain and thunderstorms; local winds matter: Mistral (cold N wind, Rhône valley), Bora (violent NE wind, Adriatic), Sirocco (hot, dusty southerly off the Sahara). Summer: subsidence under the subtropical high — hot, dry and settled."},{"t":"Polar routes","b":"Extreme cold (fuel freeze point management), sparse alternates, magnetic compass unreliability, HF/satcom dependence and space-weather exposure. Weather itself is often clear and stable in the cold high-pressure interior, but coastal zones produce blowing snow, whiteout, and steep frontal contrasts."},{"t":"Tropical routes","b":"Plan around the ITCZ — a band of EMBD CB to above FL500 that must be crossed using radar at its weakest sector. Know the TRS seasons: North Atlantic hurricanes Jun–Nov (peak Sep); NW Pacific typhoons all year (peak late summer); Indian Ocean cyclones around the monsoon transitions (Apr–Jun and Oct–Dec)."}],"quiz":[{"q":"Compared with summer, the North Atlantic westerly jet in winter is:","o":["Stronger and further south","Weaker and further north","Unchanged","Easterly"],"a":0,"e":"The winter temperature contrast is greatest, so the polar front and its jet strengthen and shift equatorward — great for eastbound flights."},{"q":"Summer fog off Newfoundland is mainly:","o":["Advection fog from warm air over the cold Labrador current","Radiation fog from clear nights","Steam fog from warm water","Frontal fog from cold fronts"],"a":0,"e":"Warm, moist Gulf Stream air flowing over the cold Labrador current is the textbook advection (sea) fog factory."},{"q":"The Genoa low forms:","o":["In the lee of the Alps, mainly in winter","Over the Sahara in summer","Over the Azores","Only during the monsoon"],"a":0,"e":"Lee cyclogenesis south of the Alps creates active winter depressions — heavy rain and thunderstorms in the Gulf of Genoa region."},{"q":"The Mistral is:","o":["A strong, cold northerly wind funnelling down the Rhône valley","A hot, dusty southerly over Egypt","A katabatic wind in Norway","A sea breeze in Greece"],"a":0,"e":"Cold air funnels between the Alps and Massif Central down the Rhône — severe low-level turbulence in the western Mediterranean."},{"q":"A key operational concern unique to polar routes is:","o":["Fuel freeze point and space-weather radiation exposure","Daily thunderstorms","Tropical cyclones","Monsoon rain"],"a":0,"e":"Extreme cold soak (fuel freeze), sparse alternates, HF/GNSS vulnerability and radiation during solar events define polar operations."},{"q":"The North Atlantic hurricane season peaks in:","o":["September","January","May","December"],"a":0,"e":"The season runs roughly June–November with a sharp peak in early September, when sea temperatures are highest."}]},{"id":"temperature","title":"Temperature & Heat Transfer","cards":[{"t":"How the atmosphere is heated","b":"The air is warmed mainly FROM BELOW, not directly by the sun. Incoming solar radiation (insolation) heats the SURFACE, which then warms the air in contact with it. This is why the lowest layers are usually warmest and why surface type matters so much."},{"t":"The four transfer modes","b":"RADIATION: energy as electromagnetic waves (sun to ground, ground to space at night). CONDUCTION: molecule-to-molecule, only the thin layer touching the surface. CONVECTION: warm air rises, carrying heat upward (the main vertical transport). ADVECTION: horizontal transport of heat by wind."},{"t":"Diurnal (daily) variation","b":"Land heats and cools quickly; sea barely changes. So diurnal temperature range is LARGE over land (especially dry, clear, calm interiors) and SMALL over the sea. Cloud reduces the range (blanket effect): cloudy nights stay mild, cloudy days stay cooler. Minimum temperature occurs just after dawn."},{"t":"Factors affecting surface temperature","b":"Latitude/sun angle, time of day and year, surface type (water vs land, vegetation, snow), cloud cover, and wind. ALBEDO — the reflectivity of a surface — matters: snow reflects most insolation (high albedo, stays cold); dark ground and water absorb more."},{"t":"Advection effects","b":"Wind importing air of a different temperature changes conditions without any local heating. WARM advection over a cold surface stabilises the air (stratus, advection fog). COLD advection over a warm surface destabilises it (convection, showers). Recognising the advection type predicts the weather."},{"t":"Lapse rates & inversions recap","b":"Temperature normally falls with height (ELR ~2°C/1000 ft). An INVERSION reverses this. Radiation inversions form on clear, calm nights as the ground cools; subsidence inversions form aloft in highs; both trap moisture and pollutants, giving poor visibility and stable, smooth but murky air."}],"quiz":[{"q":"The atmosphere is heated mainly by:","o":["The warmed surface heating the air above it","Direct absorption of sunlight by the air","Compression at altitude","Friction of the wind"],"a":0,"e":"Insolation heats the surface, which then warms the air from below — hence the warmest air is usually near the ground."},{"q":"The diurnal temperature range is greatest over:","o":["Dry land under clear, calm skies","The open ocean","A cloudy coastline","A windy sea area"],"a":0,"e":"Land heats and cools fast; clear calm skies maximise both daytime heating and nighttime radiative cooling."},{"q":"Horizontal transport of heat by the wind is called:","o":["Advection","Conduction","Radiation","Convection"],"a":0,"e":"Advection moves heat sideways; convection moves it vertically; conduction and radiation are the surface exchanges."},{"q":"Warm air advected over a colder surface tends to become:","o":["Stable, with stratus or fog","Unstable, with showers","Turbulent with CB","Drier and clearer"],"a":0,"e":"Cooling from below stabilises the air — stratus, drizzle and advection fog are typical."},{"q":"A surface with high albedo, such as fresh snow:","o":["Reflects most insolation and stays cold","Absorbs most insolation and warms","Has no effect on temperature","Increases the diurnal range over the sea"],"a":0,"e":"High reflectivity means little absorbed heat, so snow surfaces remain cold and chill the air above."},{"q":"The minimum daily temperature usually occurs:","o":["Shortly after dawn","At midnight","In mid-afternoon","At sunset"],"a":0,"e":"The ground keeps radiating heat all night, so the air is coldest just after sunrise, before insolation takes over."}]},{"id":"humidity","title":"Atmospheric Humidity & Water","cards":[{"t":"Water in the air","b":"Water vapour is invisible gas; cloud and fog are visible liquid droplets or ice crystals. The amount of vapour air can hold rises sharply with TEMPERATURE — warm air holds far more than cold. Humidity is the single most important variable in weather."},{"t":"Relative humidity & dew point","b":"Relative humidity (RH) = actual vapour ÷ maximum the air could hold at that temperature, as a percentage. Cooling air raises RH with no extra moisture. The DEW POINT is the temperature to which air must be cooled (at constant pressure) to reach saturation (RH 100%)."},{"t":"The temperature/dew point spread","b":"A small spread means the air is near saturation — expect low cloud, mist or fog. Cloud base can be estimated: base (ft) ≈ 400 × (temp − dew point). As air rises and cools to its dew point, condensation begins — this is the lifting condensation level, the cloud base."},{"t":"Changes of state & latent heat","b":"Evaporation and melting ABSORB heat (cooling the surroundings); condensation and freezing RELEASE latent heat (warming the surroundings). The latent heat released when vapour condenses inside a cloud is what powers thunderstorms and keeps rising saturated air warmer (the SALR)."},{"t":"Sublimation & deposition","b":"Water can change directly between solid and vapour: SUBLIMATION (ice → vapour) and DEPOSITION (vapour → ice, e.g. hoar frost, cirrus crystals). At sub-zero temperatures, deposition onto nuclei forms ice clouds; supercooled droplets can also exist as liquid well below 0°C."},{"t":"Condensation nuclei","b":"Vapour needs tiny particles (dust, salt, smoke) — condensation nuclei — to condense onto. Without them, air can become supersaturated. Abundant nuclei (industrial/maritime air) promote haze and cloud formation at lower humidity; hygroscopic nuclei like salt attract water especially readily."}],"quiz":[{"q":"As air is cooled with no change in moisture content, its relative humidity:","o":["Increases","Decreases","Stays the same","Falls to zero"],"a":0,"e":"Cooler air holds less vapour, so the same moisture becomes a larger fraction of the maximum — RH rises toward saturation."},{"q":"The dew point is the temperature at which air becomes:","o":["Saturated (RH 100%)","Unstable","Frozen","Isothermal"],"a":0,"e":"Cool air to its dew point and condensation begins — the basis of cloud, mist and fog formation."},{"q":"When water vapour condenses inside a cloud, it:","o":["Releases latent heat, warming the air","Absorbs heat, cooling the air","Has no thermal effect","Freezes instantly"],"a":0,"e":"Released latent heat keeps rising saturated air warmer than dry air (the SALR) and fuels thunderstorm convection."},{"q":"Surface temperature +18°C, dew point +10°C. The estimated cloud base is about:","o":["3200 ft","1000 ft","8000 ft","400 ft"],"a":0,"e":"Base ≈ 400 × spread = 400 × 8 = 3200 ft above the surface."},{"q":"The direct change from vapour to ice (e.g. hoar frost) is called:","o":["Deposition","Sublimation","Condensation","Evaporation"],"a":0,"e":"Deposition is vapour → solid; sublimation is the reverse (ice → vapour)."},{"q":"Water vapour generally requires what in order to condense?","o":["Condensation nuclei","Strong wind","An inversion","High pressure"],"a":0,"e":"Tiny particles (dust, salt, smoke) give vapour a surface to condense onto; salt nuclei are especially hygroscopic."}]},{"id":"icing","title":"Aircraft Icing (In Depth)","cards":[{"t":"What causes airframe icing","b":"SUPERCOOLED water droplets (liquid below 0°C) strike the airframe and freeze. Two ingredients are needed: visible moisture (cloud, rain) AND a surface/air temperature at or below 0°C. The worst liquid-water content is between 0 and about −15°C, especially in cumuliform cloud."},{"t":"Clear (glaze) ice","b":"From LARGE supercooled drops (CB, CU, freezing rain): the drop spreads before freezing, forming a clear, hard, heavy sheet that follows the contour and spreads back over the wing. The most dangerous type — strong, hard to remove, and it ruins the aerofoil shape. Freezing rain gives the fastest accretion of all."},{"t":"Rime ice","b":"From SMALL supercooled droplets that freeze on impact, trapping air: opaque, white, brittle, building forward on leading edges as a rough deposit. Common in stratiform cloud at roughly −10 to −20°C. Lighter than clear ice and more easily shed, but it spoils aerofoil performance and blocks sensors."},{"t":"Mixed ice, frost & severity","b":"MIXED ice combines clear and rime. HOAR FROST forms by deposition on a cold airframe in clear air (e.g. descending into warmer moist air, or overnight on the ground) — must be removed before flight as it disrupts airflow. Severity is reported trace/light/moderate/severe by accretion rate and effect."},{"t":"Effects of icing","b":"Ice increases WEIGHT and DRAG, reduces LIFT and thrust, raises the STALL SPEED (and lowers the stall angle), can jam controls, block pitot/static and engine intakes, and unbalance propellers/rotors. Even small amounts of leading-edge or upper-surface contamination sharply degrade performance — the clean aircraft concept is mandatory."},{"t":"Engine & induction icing","b":"IMPACT ice blocks intakes/filters. CARBURETTOR ice (piston engines) forms from fuel-vaporisation and venturi cooling — possible at OATs up to +25 to +30°C in HIGH HUMIDITY, worst at low power/descent. Turbine engines suffer intake and fan icing. Use carb heat/anti-ice promptly; expect icing whenever moisture and near-freezing temperatures coincide."}],"quiz":[{"q":"Airframe icing requires:","o":["Visible moisture and temperature at or below 0°C","Clear air below 0°C","High humidity above +10°C","Only sub-zero temperatures"],"a":0,"e":"Supercooled droplets must be present (visible moisture) AND the surface at/below freezing."},{"q":"The most dangerous airframe icing, from large supercooled drops, is:","o":["Clear (glaze) ice","Rime ice","Hoar frost","Mixed ice"],"a":0,"e":"Large drops spread before freezing into a hard, heavy, clear sheet — typical of CB, CU and freezing rain."},{"q":"Rime ice typically forms:","o":["From small droplets in stratiform cloud, around −10 to −20°C","From large drops in CB","By deposition in clear air","Only above 0°C"],"a":0,"e":"Small droplets freeze on contact trapping air — opaque, brittle, building forward on leading edges."},{"q":"The greatest supercooled liquid water content is generally found between:","o":["0 and about −15°C","−30 and −40°C","0 and +10°C","−40 and −50°C"],"a":0,"e":"Below about −40°C almost everything is ice crystals; the dangerous liquid band is 0 to ~−15°C, worst in cumuliform cloud."},{"q":"Carburettor icing is possible at outside air temperatures up to about:","o":["+25 to +30°C in humid air","0°C only","−10°C only","+50°C"],"a":0,"e":"Fuel vaporisation plus venturi cooling can drop carb temperature 20°C+; humid descents at low power are the classic trap."},{"q":"Hoar frost on a parked aircraft must be removed before flight because it:","o":["Disrupts the airflow and degrades performance","Adds useful weight","Improves lift","Only affects the windscreen"],"a":0,"e":"Even thin frost spoils the boundary layer, cutting CLmax and raising stall speed — the clean aircraft concept applies."}]},{"id":"metservices","title":"Met Services & Documentation","cards":[{"t":"The forecasting chain","b":"Surface and upper-air OBSERVATIONS (stations, ships, buoys, radiosondes, aircraft, satellites) feed NUMERICAL WEATHER PREDICTION models, which a forecaster interprets and refines into the products pilots use. The chain runs observation → analysis → model → forecaster → dissemination."},{"t":"Actual reports & forecasts","b":"METAR/SPECI give actual aerodrome weather; TAF forecasts it (9/24/30 h). For the EN-ROUTE picture there are AREA forecasts, ROUTE forecasts, and significant weather (SIGWX) plus upper wind/temperature charts. GAMET is a low-level area forecast for flights below FL100 (or FL150 in mountainous areas)."},{"t":"Hazard warnings","b":"SIGMET warns of en-route hazards (thunderstorms, severe turbulence/icing, mountain waves, dust/sandstorms, volcanic ash, tropical cyclones), valid up to 4 h (6 h ash/TRS). AIRMET covers lower-intensity weather for low-level flight. AERODROME and WIND SHEAR warnings cover the airfield and its approach/climb-out paths."},{"t":"Broadcasts","b":"VOLMET: continuous HF/VHF broadcast of METARs/TAFs/SIGMETs for groups of aerodromes. ATIS: recorded aerodrome information (weather, runway, NOTAM essentials) freeing the frequency. D-ATIS and D-VOLMET provide the same by datalink. These let crews get weather without tying up ATC."},{"t":"Pre-flight briefing & documentation","b":"Operators provide a met briefing package: charts, TAFs/METARs for departure, destination and alternates, SIGWX and wind/temp charts for the route, and warnings. Self-briefing terminals and online systems are standard. The crew must obtain and assess all relevant met before flight."},{"t":"Reading the products together","b":"Good planning cross-references several products: SIGWX for hazards and freezing levels, upper-wind charts for the cruise wind/temperature, TAFs for terminal conditions, and SIGMETs for live hazards — building one coherent picture of the flight rather than reading each in isolation."}],"quiz":[{"q":"GAMET is a forecast for flights:","o":["At low level, below FL100 (FL150 in mountains)","Above FL250 only","In the cruise above FL300","Only for transatlantic routes"],"a":0,"e":"GAMET is the low-level area forecast supporting flights below FL100 (or FL150 over high ground)."},{"q":"A continuous broadcast of METARs and TAFs for several aerodromes is called:","o":["VOLMET","SIGMET","GAMET","ATIS"],"a":0,"e":"VOLMET broadcasts grouped aerodrome reports/forecasts on HF/VHF; ATIS covers a single aerodrome."},{"q":"A SIGMET for volcanic ash or a tropical cyclone is typically valid for up to:","o":["6 hours","1 hour","12 hours","24 hours"],"a":0,"e":"Most SIGMETs are valid up to 4 h; ash and tropical-cyclone SIGMETs extend to 6 h."},{"q":"The first link in the forecasting chain is:","o":["Observations","The forecaster's judgement","The NWP model output","Dissemination"],"a":0,"e":"Observations feed the model and the forecaster; without good data the whole chain degrades."},{"q":"ATIS exists primarily to:","o":["Provide routine aerodrome information without tying up the frequency","Replace the TAF","Issue SIGMETs","Forecast upper winds"],"a":0,"e":"A recorded broadcast of current aerodrome conditions and essentials frees ATC frequency time."},{"q":"Low-intensity en-route weather for low-level flights is warned by:","o":["AIRMET","SIGMET","VOLMET","TAF"],"a":0,"e":"AIRMET covers weather below SIGMET thresholds affecting low-level operations."}]},{"id":"thunderstorms","title":"Thunderstorms (In Depth)","cards":[{"t":"Requirements & triggers","b":"A thunderstorm needs three things: INSTABILITY through a deep layer, sufficient MOISTURE, and a LIFTING TRIGGER. Triggers: surface heating (airmass/thermal storms), frontal lifting (especially cold fronts), orographic ascent, and low-level convergence. Remove any one ingredient and the storm doesn't form."},{"t":"The life cycle","b":"CUMULUS (building) stage: updraughts throughout, cloud growing, no precipitation yet. MATURE stage: updraughts AND downdraughts coexist, precipitation begins, and ALL hazards peak. DISSIPATING stage: downdraughts dominate, the storm rains itself out and the anvil spreads. The mature stage is the dangerous one."},{"t":"Storm organisation","b":"SINGLE-CELL (airmass) storms are short-lived. MULTICELL clusters have cells at different life stages. SQUALL LINES are organised lines of storms along or ahead of a cold front — continuous and hard to circumnavigate. SUPERCELLS have a single rotating updraught (mesocyclone), are long-lived and produce the most violent weather and tornadoes."},{"t":"The hazards","b":"Severe turbulence, severe icing, HAIL (can be thrown out of the anvil into clear air), lightning, heavy rain and reduced visibility, windshear and the GUST FRONT, MICROBURSTS, and tornadoes. The gust front and downburst outflow are major low-level windshear threats near a storm even before you reach the cloud."},{"t":"Electrical effects","b":"Lightning can cause temporary blindness, hearing damage, minor structural pitting and avionics upset, though aircraft are generally protected. ST ELMO'S FIRE (corona discharge) on extremities often precedes a discharge and signals a highly charged environment — a cue to expect static and possible strikes."},{"t":"Avoidance","b":"Avoid severe cells by at least 10 NM (more downwind, under the anvil where hail is thrown). Never fly beneath a cell (microburst/hail) or attempt to overfly unless clearance is generous. Use weather radar to find the weakest sector, but remember radar shows precipitation, not turbulence — give a wide berth."}],"quiz":[{"q":"All thunderstorm hazards reach maximum intensity during the:","o":["Mature stage","Cumulus stage","Dissipating stage","Anvil stage"],"a":0,"e":"Coexisting up- and downdraughts, precipitation onset and peak turbulence/hail/shear define the mature stage."},{"q":"The most violent, long-lived storm with a rotating updraught is a:","o":["Supercell","Single-cell airmass storm","Dissipating cell","Orographic shower"],"a":0,"e":"A supercell's mesocyclone sustains it for hours and spawns the worst hail, windshear and tornadoes."},{"q":"A severe cumulonimbus should be avoided laterally by at least:","o":["10 NM","1 NM","3 NM","100 NM"],"a":0,"e":"10 NM minimum — more downwind, since hail can be ejected from the anvil into clear air."},{"q":"Three ingredients are required for a thunderstorm:","o":["Instability, moisture and a lifting trigger","Cold air, high pressure and calm","An inversion, dry air and subsidence","Fog, frost and light wind"],"a":0,"e":"Deep instability, moisture and a trigger (heating, front, orography, convergence) — remove one and no storm."},{"q":"St Elmo's fire indicates:","o":["A highly charged environment, with discharge possible","Engine fire","Imminent icing only","The storm has dissipated"],"a":0,"e":"Corona discharge on extremities signals strong static charge — expect possible lightning and interference."},{"q":"A squall line is:","o":["An organised line of storms, often along/ahead of a cold front","A single dissipating cell","A layer of stratus","A fog bank"],"a":0,"e":"Continuous and difficult to circumnavigate — a serious planning consideration on frontal days."}]},{"id":"mountainwaves","title":"Mountain Waves & Orographic Effects","cards":[{"t":"Wave formation conditions","b":"Standing (lee) waves form when: wind blows roughly PERPENDICULAR to a ridge at sufficient strength (often quoted ~15–25 kt+ at the crest), wind speed INCREASES with height, and there is a STABLE layer near the crest with less stable air above and below. The airflow oscillates downwind of the ridge."},{"t":"Wave structure & cloud","b":"Downwind, the air rises and sinks in a train of waves of fixed wavelength. Clouds mark them where air is moist: smooth LENTICULAR (ACSL) clouds at the crests, a CAP cloud over the ridge, and ragged ROTOR cloud beneath the crests. The clouds appear stationary even in strong wind."},{"t":"The hazards","b":"Severe to extreme TURBULENCE, worst in the ROTOR zone beneath the wave crests (can exceed structural limits at low level). Strong up/downdraughts cause large altitude excursions — significant terrain-clearance risk. Add possible icing in the cloud. Waves can extend high into the stratosphere and far downwind."},{"t":"The föhn / chinook effect","b":"Air forced over a mountain loses moisture as cloud/precipitation on the windward side, then descends the lee side warmed (by latent heat release and compression) and DRY — giving warm, dry, clear conditions on the lee side, but often turbulent. Local names: Föhn (Alps), Chinook (Rockies)."},{"t":"Slope & valley winds","b":"ANABATIC: gentle daytime upslope flow as sunlit slopes warm. KATABATIC: nighttime downslope DRAINAGE of cold dense air, which can be strong and reach gale force off ice sheets. Valley winds blow up-valley by day, down-valley by night — all important for mountain aerodrome operations."},{"t":"Other orographic effects","b":"Upslope cooling produces hill fog and orographic cloud/rain on windward slopes; rain shadow leaves the lee drier. Venturi effects accelerate wind through gaps and valleys. Mountain weather changes fast and locally — terrain massively modifies the synoptic-scale picture."}],"quiz":[{"q":"Standing mountain waves require wind that is:","o":["Roughly perpendicular to the ridge and increasing with height, with a stable layer","Parallel to the ridge and calm","Decreasing with height","Below 5 kt"],"a":0,"e":"Perpendicular strong wind, increasing with height, plus a stable layer near the crest sets up lee waves."},{"q":"The most violent turbulence in a wave system is found in the:","o":["Rotor zone beneath the wave crests","Smooth lenticular cloud","Cap cloud","Clear air above the tropopause"],"a":0,"e":"Rotors — marked by ragged cloud below the lenticulars — can exceed aircraft structural limits."},{"q":"Lenticular (ACSL) clouds:","o":["Are smooth and appear stationary at wave crests","Move rapidly downwind","Indicate fog","Form only at night"],"a":0,"e":"They form and dissipate in place at the wave crests, appearing static despite strong winds aloft."},{"q":"Air descending the lee side in a föhn/chinook is:","o":["Warm and dry","Cold and wet","Saturated and foggy","Unchanged"],"a":0,"e":"Moisture is lost on the windward side; descent warms and dries the air — warm, dry, clear but turbulent lee conditions."},{"q":"Katabatic wind is:","o":["Nighttime downslope drainage of cold dense air","Daytime upslope flow","A sea breeze","A warm front wind"],"a":0,"e":"Cold dense air drains downslope at night and can become strong, especially off ice fields."},{"q":"Standing waves can be hazardous to terrain clearance because:","o":["Strong up/downdraughts cause large altitude excursions","They always reduce wind to calm","They only occur above FL400","They remove all turbulence"],"a":0,"e":"Powerful vertical currents can push an aircraft well off altitude near high terrain."}]},{"id":"visibility","title":"Visibility & Obscurations","cards":[{"t":"Defining visibility","b":"Meteorological visibility is the greatest horizontal distance at which a known object can be seen and identified. PREVAILING visibility is the value reached over at least half the horizon. RVR (runway visual range) is the distance a pilot can see runway markings/lights along the runway — used when visibility is low."},{"t":"Hydrometeors vs lithometeors","b":"Reductions are caused by water particles (HYDROMETEORS: fog FG, mist BR, cloud, precipitation) or dry particles (LITHOMETEORS: haze HZ, smoke FU, dust/sand, volcanic ash VA). Fog is water and clears w
